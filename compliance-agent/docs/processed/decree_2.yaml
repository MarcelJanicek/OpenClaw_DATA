  style: '24'
- paragraph_index: 393
  text: (3)    Povinná osoba v rámci zaznamenávání událostí podle odstavce 2 zaznamenává
  style: '21'
- paragraph_index: 394
  text: a)    přihlašování a odhlašování ke všem účtům, a to včetně neúspěšných pokusů,
