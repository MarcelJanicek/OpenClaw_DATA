  style: '11'
- paragraph_index: 268
  text: a)    stanoví metodiku pro provedení analýzy dopadů,
  style: '13'
- paragraph_index: 269
  text: b)    provádí analýzu dopadů, vyhodnocuje a dokumentuje možné dopady kybernetických bezpečnostních incidentů a zohlední hodnocení rizik podle § 8,
  style: '14'
- paragraph_index: 270
  text: c)    na základě výstupů analýzy dopadů a hodnocení rizik podle písmene b) stanoví cíle řízení kontinuity činností formou určení
  style: '15'
- paragraph_index: 271
  text: 1.    minimální úrovně poskytovaných služeb, která je přijatelná pro užívání, provoz a správu regulované služby,
  style: '18'
- paragraph_index: 272
  text: 2.    doby obnovení chodu, během které bude po kybernetickém bezpečnostním incidentu obnovena minimální úroveň poskytovaných služeb regulované služby, a
  style: '19'
- paragraph_index: 273
  text: 3.    bodu obnovení dat jako časové období, za které musí být zpětně obnovena data po kybernetickém bezpečnostním incidentu nebo po selhání technického aktiva,
  style: '20'
- paragraph_index: 274
  text: d)    stanoví politiku řízení kontinuity činností, která obsahuje naplnění cílů podle písmene c), a stanoví práva a povinnosti administrátorů a osob zastávajících bezpečnostní role,
  style: '13'
- paragraph_index: 275
  text: e)    vypracuje, aktualizuje a pravidelně testuje plány kontinuity činností a plány obnovy související s poskytováním regulované služby a
  style: '14'
- paragraph_index: 276
  text: f)    realizuje bezpečnostní opatření pro zvýšení odolnosti podle § 26.
  style: '15'
- paragraph_index: 277
  text: § 16
  style: '12'
- paragraph_index: 278
  text: Provádění auditu kybernetické bezpečnosti
  style: '10'
- paragraph_index: 279
  text: (1)    Povinná osoba stanoví plán provádění auditu kybernetické bezpečnosti.
  style: '28'
- paragraph_index: 280
  text: (2)    Povinná osoba při auditu kybernetické bezpečnosti
  style: '30'
