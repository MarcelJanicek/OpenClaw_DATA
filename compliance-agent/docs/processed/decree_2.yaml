  text: e)    povinné změny hesla v intervalu alespoň jednou za 18 měsíců a
  style: '23'
- paragraph_index: 343
  text: f)    neumožňující uživatelům a administrátorům
  style: '24'
- paragraph_index: 344
  text: 1.    zvolit si jednoduchá a často používaná hesla,
  style: '25'
- paragraph_index: 345
  text: 2.    tvořit hesla na základě mnohonásobně opakujících se znaků, přihlašovacího jména, adresy elektronické pošty, názvu systému nebo obdobným způsobem a
  style: '31'
- paragraph_index: 346
  text: 3.    opětovné použití dříve používaných hesel s pamětí alespoň 12 předchozích hesel.
  style: '26'
- paragraph_index: 347
  text: (5)    Povinná osoba v souladu s odstavcem 4 zajistí
  style: '21'
- paragraph_index: 348
  text: a)    bezodkladné vynucení změny výchozího hesla uživatelů a administrátorů po prvním přihlášení,
  style: '22'
- paragraph_index: 349
  text: b)    bezodkladné vynucení změny výchozího hesla technického aktiva,
  style: '23'
- paragraph_index: 350
  text: c)    vytváření hesla účtu technického aktiva složeného z náhodného řetězce malých a velkých písmen, číslic a speciálních znaků,
  style: '23'
- paragraph_index: 351
  text: d)    bezodkladné vynucení změny přístupového hesla v případě důvodného podezření na narušení jeho důvěrnosti,
  style: '23'
- paragraph_index: 352
  text: e)    vytvoření náhodného výchozího hesla nebo identifikátoru sloužícího k vytvoření nebo k obnovení přístupu a zajistí jeho důvěrnost a
  style: '23'
- paragraph_index: 353
  text: f)    bezodkladné zneplatnění hesla nebo identifikátoru sloužícího k vytvoření nebo k obnovení přístupu po jeho prvním použití nebo uplynutí nejvýše 24 hodin od jeho vytvoření.
  style: '24'
- paragraph_index: 354
  text: (6)    Povinná osoba u administrátorského účtu zejména určeného pro případ obnovy po kybernetickém bezpečnostním incidentu musí zajistit
  style: '21'
- paragraph_index: 355
  text: a)    bezodkladnou změnu výchozího hesla,
  style: '22'
- paragraph_index: 356
  text: b)    vytvoření hesla náhodným řetězcem složeným z malých a velkých písmen, číslic a speciálních znaků,
  style: '23'
