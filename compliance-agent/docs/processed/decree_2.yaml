  style: '21'
- paragraph_index: 331
  text: a)    využívá autentizační mechanismus, který je založen na vícefaktorové autentizaci s alespoň dvěma různými typy faktorů, nebo využívá autentizační mechanismus, který je založen na aktuálně odolné kontinuální autentizaci založené na modelu nulové důvěry, a
  style: '22'
- paragraph_index: 332
  text: b)    do doby splnění požadavků podle písmene a) využívá autentizaci pomocí kryptografických klíčů nebo certifikátů.
  style: '24'
- paragraph_index: 333
  text: (3)    Povinná osoba do doby splnění požadavků podle odstavce 2 písm. a) vede evidenci technických aktiv, účtů a autentizačních mechanismů, které tyto požadavky nesplňují, a to včetně odůvodnění.
  style: '28'
- paragraph_index: 334
  text: (4)    Povinná osoba do doby splnění požadavku podle odstavce 2 využívá nástroj založený na autentizaci pomocí identifikátoru účtu a hesla, kdy tento nástroj musí vynucovat pravidlo
  style: '30'
- paragraph_index: 335
  text: a)    délky hesla alespoň
  style: '27'
- paragraph_index: 336
  text: 1.    12 znaků pro účty uživatelů,
  style: '25'
- paragraph_index: 337
  text: 2.    17 znaků pro účty administrátorů,
  style: '31'
- paragraph_index: 338
  text: 3.    22 znaků pro účty technických aktiv,
  style: '26'
- paragraph_index: 339
  text: b)    umožňující zadat heslo o délce alespoň 64 znaků,
  style: '22'
- paragraph_index: 340
  text: c)    neomezující použití malých a velkých písmen, číslic a speciálních znaků,
  style: '23'
- paragraph_index: 341
  text: d)    umožňující uživatelům a administrátorům změnu hesla, přičemž období mezi dvěma změnami hesla nesmí být kratší než 30 minut,
  style: '23'
