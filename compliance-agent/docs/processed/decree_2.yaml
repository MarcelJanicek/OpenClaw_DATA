- paragraph_index: 506
  text: Příloha č. 1
  style: '34'
- paragraph_index: 507
  text: Hodnocení aktiv
  style: '35'
- paragraph_index: 508
  text: (1)    Povinná osoba pro hodnocení aktiv používá stupnici alespoň o čtyřech úrovních uvedených v tabulkách č. 1, 2 a 3 a posuzuje se, jaký dopad by mělo narušení bezpečnosti informací u jednotlivých aktiv.
  style: '28'
- paragraph_index: 509
  text: (2)    Povinná osoba může hodnotící úrovně aktiv ve stupnici přizpůsobit svým bezpečnostním potřebám. Povinná osoba může používat odlišný počet úrovní pro hodnocení aktiv, než jaký je uveden v této příloze, dodrží-li jednoznačné vazby mezi jimi používaným způsobem hodnocení aktiv a stupnicemi a úrovněmi pro hodnocení aktiv, které jsou uvedeny v této příloze.
  style: '29'
- paragraph_index: 510
  text: (3)    U primárních aktiv je zároveň nutné zohlednit alespoň oblasti uvedené v tabulce č. 4 - Oblasti hodnocení primárních aktiv.
  style: '29'
- paragraph_index: 511
  text: (4)    Při hodnocení podpůrných aktiv je nutné zohlednit zejména vazby mezi podpůrnými a primárními aktivy.
  style: '30'
- paragraph_index: 512
  text: 'Tab. č. 1: Stupnice pro hodnocení důvěrnosti'
  style: '35'
- paragraph_index: 513
  text: Pro klasifikaci důvěrnosti informací a dat pro účely jejich sdílení lze využít aktuální verzi mezinárodního standardu tzv. Traffic Light Protocol (TLP)3).
  style: '11'
- paragraph_index: 514
  text: ''
  style: '11'
- paragraph_index: 515
  text: 'Tab. č. 2: Stupnice pro hodnocení integrity'
  style: '35'
- paragraph_index: 516
  text: ''
  style: '11'
- paragraph_index: 517
  text: 'Tab. č. 3: Stupnice pro hodnocení dostupnosti'
  style: '35'
- paragraph_index: 518
  text: ''
  style: '11'
- paragraph_index: 519
  text: Tab. č. 4 Oblasti hodnocení primárních aktiv
  style: '35'
- paragraph_index: 520
  text: Při hodnocení primárních aktiv je potřeba posoudit alespoň relevantní z následujících oblastí
  style: '11'
- paragraph_index: 521
  text: ''
  style: '11'
- paragraph_index: 522
  text: ''
  style: '1'
- paragraph_index: 523
  text: Příloha č. 2
  style: '34'
- paragraph_index: 524
  text: Likvidace informací a dat
  style: '35'
- paragraph_index: 525
  text: (1)    Tato příloha udává povinnosti povinné osoby k definování způsobů likvidace informací a dat, jejich kopií a technických aktiv, která jsou nosiči informací a dat, s ohledem na jejich hodnocení a úroveň podle přílohy č. 1 k této vyhlášce.
  style: '28'
- paragraph_index: 526
  text: (2)    Povinná osoba stanoví pravidla a postupy pro způsoby likvidace informací a dat, jejich kopií a technických aktiv, která jsou nosiči informací a dat, v souladu s touto přílohou. Tím nejsou dotčeny povinnosti podle jiných právních předpisů.
  style: '29'
- paragraph_index: 527
  text: (3)    Pravidla a postupy pro likvidaci informací a dat, jejich kopií a technických aktiv, která jsou nosiči informací a dat, musí být stanovena přiměřeně podle hodnocení a úrovně aktiv a měla by zejména zohledňovat
  style: '30'
- paragraph_index: 528
  text: a)    hodnotu aktiva (zejména z pohledu důvěrnosti),
  style: '22'
- paragraph_index: 529
  text: b)    technologii (typy nosičů informací a dat),
  style: '23'
- paragraph_index: 530
  text: c)    zda se nosiče informací a dat nachází pod přímou kontrolou povinné osoby či nikoliv,
  style: '23'
- paragraph_index: 531
  text: d)    zda jsou nosiče informací a dat součástí dedikovaného nebo sdíleného prostředí,
  style: '23'
- paragraph_index: 532
  text: e)    jaká osoba bude likvidaci informací a dat provádět (například interní zaměstnanec nebo dodavatel),
  style: '23'
- paragraph_index: 533
  text: f)    dostupnost zdrojů potřebných pro likvidaci (například časové, lidské, finanční, technické),
  style: '23'
- paragraph_index: 534
  text: g)    možné způsoby likvidace informací a dat nebo jejich nosičů a
  style: '23'
- paragraph_index: 535
  text: h)    stavu nosiče informací a dat (například při poškození nosiče nebude možné použít variantu přepisu informací a dat, ale některý ze způsobů fyzické likvidace).
  style: '24'
- paragraph_index: 536
  text: '(4)    Způsoby likvidace informací a dat, jejich kopií a technických aktiv, která jsou nosiči informací a dat:'
  style: '21'
- paragraph_index: 537
  text: a)    Odstranění
  style: '27'
- paragraph_index: 538
  text: 1.    Způsob likvidace nosičů informací a dat tak, aby byla nedostupná (například odstranění datového souboru, vyhození nosiče do odpadu).
  style: '25'
- paragraph_index: 539
  text: 2.    V případě získání nosiče informací a dat je možné s vynaložením určitého úsilí informace a data obnovit.
  style: '31'
- paragraph_index: 540
  text: 3.    Tato metoda není vhodná pro nosiče informací a dat neumožňující opětovný zápis.
  style: '31'
- paragraph_index: 541
  text: '4.    Použitelný způsob pro úroveň důvěrnosti aktiva (vychází z přílohy č. 1 k této vyhlášce): Nízká.'
  style: '26'
- paragraph_index: 542
  text: b)    Přepsání
  style: '27'
- paragraph_index: 543
  text: 1.    Způsob likvidace spočívá v opakovaném přepsání informací a dat náhodnými hodnotami.
  style: '25'
- paragraph_index: 544
  text: 2.    Volně dostupné nástroje neumožňují obnovení po násobném přepsání informací a dat.
  style: '31'
- paragraph_index: 545
  text: 3.    Přepsání může být nahrazeno nebo kombinováno s bezpečnou likvidací kryptografických klíčů k zašifrovaným informacím a datům.
  style: '31'
- paragraph_index: 546
  text: 4.    Tato metoda není vhodná pro poškozené nosiče, nosiče neumožňující opětovný zápis, případně pro nosiče s velkou paměťovou kapacitou.
  style: '31'
- paragraph_index: 547
  text: '5.    Použitelný způsob pro úroveň důvěrnosti aktiva (vychází z přílohy č. 1 k této vyhlášce): Nízká až Vysoká.'
  style: '26'
- paragraph_index: 548
  text: c)    Fyzická likvidace
  style: '27'
- paragraph_index: 549
  text: 1.    Způsob likvidace spočívající ve zničení nosiče informací a dat, popřípadě v rozebrání nosiče a následného zničení (například mechanickým nebo chemickým působením vč. tepelného).
  style: '25'
- paragraph_index: 550
  text: 2.    Nosič informací a dat po fyzické likvidaci nelze znovu použít. Informace a data není možné z tohoto nosiče obnovit ani při vynaložení značného množství prostředků a úsilí.
  style: '31'
- paragraph_index: 551
  text: '3.    Použitelný způsob likvidace pro úroveň důvěrnosti aktiva (vychází z přílohy č. 1 k této vyhlášce): nízká až kritická.'
  style: '26'
- paragraph_index: 552
  text: ''
  style: '1'
- paragraph_index: 553
  text: Příloha č. 3
  style: '34'
- paragraph_index: 554
  text: Zranitelnosti a hrozby
  style: '35'
- paragraph_index: 555
  text: Tato příloha obsahuje kategorie zranitelností a hrozeb, které musí povinná osoba zvážit při určování rizik, pokud jsou pro dané aktivum relevantní. Povinná osoba nad rámec níže uvedených kategorií zranitelností a hrozeb může určit konkrétní hrozby a zranitelnosti podle svých bezpečnostních potřeb.
  style: '11'
- paragraph_index: 556
  text: Zranitelnosti
  style: '35'
- paragraph_index: 557
  text: 1.    Nedostatečná údržba aktiv,
  style: '36'
- paragraph_index: 558
  text: 2.    zastaralost aktiv,
  style: '37'
- paragraph_index: 559
  text: 3.    nedostatečná ochrana perimetru,
  style: '37'
- paragraph_index: 560
  text: 4.    nedostatečné bezpečnostní povědomí uživatelů, administrátorů, osob zastávajících bezpečnostní role, dodavatelů a vrcholného vedení,
  style: '37'
- paragraph_index: 561
  text: 5.    nedostatečné zálohování,
  style: '37'
- paragraph_index: 562
  text: 6.    nevhodné nastavení přístupových oprávnění,
  style: '37'
- paragraph_index: 563
  text: 7.    nedostatečné postupy a procesy pro detekování kybernetických bezpečnostních událostí a identifikování kybernetických bezpečnostních incidentů,
  style: '37'
- paragraph_index: 564
  text: 8.    nedostatečné monitorování činnosti uživatelů a administrátorů a neschopnost odhalit činnost, která může mít vliv na bezpečnost regulované služby,
  style: '37'
- paragraph_index: 565
  text: 9.    nedostatečné stanovení bezpečnostních pravidel a postupů, nepřesné nebo nejednoznačné vymezení práv a povinností uživatelů, administrátorů, osob zastávajících bezpečnostní role, dodavatelů a vrcholného vedení,
  style: '37'
- paragraph_index: 566
  text: 10.    nedostatečná ochrana aktiv,
  style: '37'
- paragraph_index: 567
  text: 11.    nevhodně navržená bezpečná architektura,
  style: '37'
- paragraph_index: 568
  text: 12.    nedostatečná míra nezávislé kontroly,
  style: '37'
- paragraph_index: 569
  text: 13.    neschopnost včasného odhalení pochybení ze strany uživatelů, administrátorů, osob zastávajících bezpečnostní role, dodavatelů a vrcholného vedení,
  style: '37'
- paragraph_index: 570
  text: 14.    nedostatek zaměstnanců s potřebnou odbornou úrovní znalostí,
  style: '37'
- paragraph_index: 571
  text: 15.    umístění aktiva mimo fyzickou kontrolu (například na území cizího státu),
  style: '37'
- paragraph_index: 572
  text: 16.    umístění aktiva na území státu, o jehož právním prostředí nemá povinná osoba dostatečné povědomí, a
  style: '37'
- paragraph_index: 573
  text: 17.    zranitelnosti odhalené při skenování zranitelností a penetračním testování.
  style: '38'
- paragraph_index: 574
  text: Hrozby
  style: '35'
- paragraph_index: 575
  text: 1.    Porušení bezpečnostní politiky, provedení neoprávněných činností, zneužití oprávnění ze strany uživatelů, administrátorů, osob zastávajících bezpečnostní role, dodavatelů a vrcholného vedení,
  style: '36'
- paragraph_index: 576
  text: 2.    poškození nebo selhání technického anebo programového vybavení,
  style: '37'
- paragraph_index: 577
  text: 3.    zneužití identity,
  style: '37'
- paragraph_index: 578
  text: 4.    užívání programového vybavení v rozporu s licenčními podmínkami,
  style: '37'
- paragraph_index: 579
  text: 5.    škodlivý kód,
  style: '37'
- paragraph_index: 580
  text: 6.    narušení fyzické bezpečnosti,
  style: '37'
- paragraph_index: 581
  text: 7.    přerušení poskytování služeb elektronických komunikací, družicových služeb nebo dodávek elektrické energie nebo jiných důležitých služeb,
  style: '37'
- paragraph_index: 582
  text: 8.    narušení dostupnosti primárních nebo podpůrných aktiv umístěných mimo území České republiky,
  style: '37'
- paragraph_index: 583
  text: 9.    zneužití nebo neoprávněná modifikace informací,
  style: '37'
- paragraph_index: 584
  text: 10.    ztráta, odcizení nebo poškození aktiva,
  style: '37'
- paragraph_index: 585
  text: 11.    nedodržení smluvního závazku ze strany dodavatele,
  style: '37'
- paragraph_index: 586
  text: 12.    pochybení ze strany uživatelů, administrátorů, osob zastávajících bezpečnostní role, dodavatelů a vrcholného vedení,
  style: '37'
- paragraph_index: 587
  text: 13.    zneužití vnitřních prostředků, sabotáž,
  style: '37'
- paragraph_index: 588
  text: 14.    dlouhodobé přerušení poskytování služeb elektronických komunikací, družicových služeb, dodávky elektrické energie nebo jiných důležitých služeb,
  style: '37'
- paragraph_index: 589
  text: 15.    zaměstnanci s nedostatečnou odbornou úrovní znalostí,
  style: '37'
- paragraph_index: 590
  text: 16.    cílený kybernetický útok pomocí sociálního inženýrství, použití špionážních technik,
  style: '37'
- paragraph_index: 591
  text: 17.    zneužití vyměnitelných technických nosičů dat,
  style: '37'
- paragraph_index: 592
  text: 18.    napadení (odposlech, modifikace, podvržení) elektronické komunikace, družicových služeb nebo jiných důležitých služeb,
  style: '37'
- paragraph_index: 593
  text: 19.    závislost na dodavateli,
  style: '37'
- paragraph_index: 594
  text: 20.    zneužití cizí státní moci pro přístup k aktivům,
  style: '37'
- paragraph_index: 595
  text: 21.    zpřístupnění nebo předání aktiv na základě žádosti jiného státu.
  style: '38'
- paragraph_index: 596
  text: ''
  style: '1'
- paragraph_index: 597
  text: Příloha č. 4
  style: '34'
- paragraph_index: 598
  text: Hodnocení rizik
  style: '35'
- paragraph_index: 599
  text: (1)    Jednoznačné stanovení funkce pro určení rizika je nezbytnou součástí metodiky pro hodnocení rizik podle § 8.
  style: '28'
- paragraph_index: 600
  text: (2)    Hodnota rizika je nejčastěji vyjádřena jako funkce, kterou ovlivňuje hodnota aktiva, hrozba a zranitelnost.
  style: '29'
- paragraph_index: 601
  text: '(3)    Pro hodnocení rizik lze použít funkci: Riziko = hodnota aktiva × hrozba × zranitelnost, případně jinou funkci obdobného významu.'
  style: '29'
- paragraph_index: 602
  text: (4)    Hodnota aktiva je v tomto případě odvozena z hodnocení aktiv podle přílohy č. 1 k této vyhlášce.
  style: '29'
- paragraph_index: 603
  text: (5)    V případě, že povinná osoba využívá na základě § 8 odst. 3 metodu pro hodnocení rizik, která nerozlišuje hodnocení hrozby a zranitelnosti, je možné stupnice pro hodnocení hrozeb a zranitelností sloučit, například vytvořit scénáře kombinující hrozbu a zranitelnost. Sloučení stupnic by nemělo vést ke ztrátě schopnosti rozlišení úrovně hrozby a zranitelnosti. Za tímto účelem lze použít například komentář, který zřetelně vyjádří jak úroveň hrozby, tak i úroveň zranitelnosti. Obdobně se postupuje i v případech, kdy povinná osoba používá jiný počet úrovní pro hodnoty aktiv, hrozeb, zranitelností a rizik.
  style: '30'
- paragraph_index: 604
  text: 'Tab. č. 1: Stupnice pro hodnocení hrozeb'
  style: '39'
- paragraph_index: 605
  text: ''
  style: '40'
- paragraph_index: 606
  text: 'Tab. č. 2: Stupnice pro hodnocení zranitelností'
  style: '39'
- paragraph_index: 607
  text: ''
  style: '40'
- paragraph_index: 608
  text: 'Tab. č. 3: Stupnice pro hodnocení rizik'
  style: '39'
- paragraph_index: 609
  text: ''
  style: '40'
- paragraph_index: 610
  text: (6)    Pokud je hodnota rizika vyšší než hranice akceptovatelnosti, je třeba implementovat vhodná bezpečnostní opatření, snížit hodnotu rizika nebo eliminovat riziko a zajistit požadovanou úroveň bezpečnosti informací Metody pro zvládání rizik jsou zejména následující
  style: '21'
- paragraph_index: 611
  text: a)    akceptace rizika,
  style: '22'
- paragraph_index: 612
  text: b)    redukce rizika,
  style: '23'
- paragraph_index: 613
  text: c)    eliminace rizika,
  style: '23'
- paragraph_index: 614
  text: d)    vyhnutí se riziku, nebo
  style: '23'
- paragraph_index: 615
  text: e)    přenesení nebo sdílení rizika.
  style: '24'
- paragraph_index: 616
  text: ''
  style: '1'
- paragraph_index: 617
  text: Příloha č. 5
  style: '34'
- paragraph_index: 618
  text: Řízení dodavatelů – bezpečnostní opatření pro smluvní vztahy
  style: '35'
- paragraph_index: 619
  text: 'Obsah smlouvy uzavírané s významnými dodavateli musí obsahovat relevantní ustanovení z níže uvedených:'
  style: '11'
- paragraph_index: 620
  text: a)    ustanovení o bezpečnosti informací z pohledu důvěrnosti (včetně ustanovení o mlčenlivosti), integrity a dostupnosti,
  style: '13'
- paragraph_index: 621
  text: b)    ustanovení o oprávnění užívat data,
  style: '14'
- paragraph_index: 622
  text: c)    ustanovení o autorství programového kódu, popřípadě o programových licencích,
  style: '14'
- paragraph_index: 623
  text: d)    ustanovení o kontrole zavedených bezpečnostních opatření (pravidla zákaznického auditu),
  style: '14'
- paragraph_index: 624
  text: e)    ustanovení upravující řetězení dodavatelů, přičemž musí být zajištěno, že subdodavatelé se zaváží dodržovat v plném rozsahu ujednání mezi povinnou osobou a dodavatelem a nebudou v rozporu s požadavky povinné osoby na dodavatele,
  style: '14'
- paragraph_index: 625
  text: f)    ustanovení o povinnosti dodavatele dodržovat bezpečnostní politiky povinné osoby nebo ustanovení o odsouhlasení bezpečnostních politik dodavatele (nebo odsouhlasení pro dodavatelský vztah relevantních částí bezpečnostních politik) povinnou osobou,
  style: '14'
- paragraph_index: 626
  text: g)    ustanovení o řízení změn,
  style: '14'
- paragraph_index: 627
  text: h)    ustanovení o souladu smluv s obecně závaznými právními předpisy,
  style: '14'
- paragraph_index: 628
  text: i)    ustanovení o povinnosti dodavatele informovat povinnou osobu o
  style: '15'
- paragraph_index: 629
  text: 1.    kybernetických bezpečnostních incidentech souvisejících s plněním smlouvy,
  style: '18'
- paragraph_index: 630
  text: 2.    způsobu řízení rizik na straně dodavatele a o zbytkových rizicích souvisejících s plněním smlouvy,
  style: '19'
- paragraph_index: 631
  text: 3.    významné změně ovládání tohoto dodavatele podle zákona o obchodních korporacích nebo změně vlastnictví zásadních aktiv, popřípadě změně oprávnění nakládat s těmito aktivy, využívaných tímto dodavatelem k plnění podle smlouvy s povinnou osobou,
  style: '19'
- paragraph_index: 632
  text: 4.    žádosti cizozemského orgánu o zpřístupnění nebo předání dat zpracovávaných na území cizího státu, vyjma situace, kdy by takové informování bylo v rozporu s právním řádem, v jehož působnosti dochází ke zpracování dat nebo podle kterého byla žádost podána,
  style: '19'
- paragraph_index: 633
  text: 5.    fyzických osobách přicházejících do kontaktu s důvěrnými informacemi povinné osoby (jedná se například o osoby zastávající bezpečnostní role, penetrační testery a administrátory),
  style: '20'
- paragraph_index: 634
  text: j)    specifikace podmínek z pohledu bezpečnosti při ukončení smlouvy, tzv. exit strategie (například přechodné období při ukončení spolupráce, kdy je třeba ještě udržovat službu před nasazením nového řešení, migrace dat a podobně),
  style: '13'
- paragraph_index: 635
  text: k)    specifikace podmínek pro řízení kontinuity činností v souvislosti s dodavateli zahrnutí dodavatelů do plánů obnovy, plánů kontinuity, úkoly dodavatelů při aktivaci řízení kontinuity činností apod.),
  style: '14'
- paragraph_index: 636
  text: l)    specifikace náležitosti smlouvy o úrovni služeb (SLA) a způsobu a úrovni realizace bezpečnostních opatření.
  style: '14'
- paragraph_index: 637
  text: m)    ustanovení o dodržování pravidel bezpečného vývoje,
  style: '14'
- paragraph_index: 638
  text: n)    specifikace podmínek pro formát předání dat a informací po vyžádání povinnou osobou,
  style: '14'
- paragraph_index: 639
  text: o)    pravidla pro likvidaci dat,
  style: '14'
- paragraph_index: 640
  text: p)    ustanovení o právu jednostranně odstoupit od smlouvy nebo smlouvu vypovědět bez výpovědní doby v případě významné změny kontroly nad dodavatelem nebo změny kontroly nad zásadními aktivy využívanými dodavatelem k plnění podle smlouvy,
  style: '14'
- paragraph_index: 641
  text: q)    ustanovení o sankcích za porušení povinností a
  style: '14'
- paragraph_index: 642
  text: r)    ustanovení o zpřístupnění nebo předání dat na základě žádosti cizozemského orgánu o zpřístupnění nebo předání dat zpracovávaných na území cizího státu
  style: '15'
- paragraph_index: 643
  text: 1.    až po provedení přezkoumání zákonnosti žádosti,
