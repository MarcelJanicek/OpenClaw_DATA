  text: f)    detekci kybernetických bezpečnostních událostí technických aktiv a
  style: '23'
- paragraph_index: 381
  text: g)    detekci kybernetických bezpečnostních událostí na základě chování technických aktiv, administrátorů a uživatelů.
  style: '24'
- paragraph_index: 382
  text: (3)    Povinná osoba provádí pravidelnou a bezodkladnou aktualizaci nástroje používaného podle odstavců 1 a 2, a to včetně jeho nastavení a detekčních pravidel.
  style: '21'
