paragraphs:
- paragraph_index: 0
  text: ''
  style: Normal
- paragraph_index: 1
  text: ''
  style: '1'
- paragraph_index: 2
  text: ''
  style: '1'
- paragraph_index: 3
  text: '409'
  style: '2'
- paragraph_index: 4
  text: VYHLÁŠKA
  style: '3'
- paragraph_index: 5
  text: ze dne 26. září 2025
  style: '4'
- paragraph_index: 6
  text: o bezpečnostních opatřeních poskytovatele regulované služby v režimu vyšších povinností
  style: '5'
- paragraph_index: 7
  text: 'Národní úřad pro kybernetickou a informační bezpečnost stanoví podle § 13 odst. 3 zákona č. 264/2025 Sb., o kybernetické bezpečnosti, (dále jen „zákon“):'
  style: '6'
- paragraph_index: 8
  text: ''
  style: '1'
- paragraph_index: 9
  text: ČÁST PRVNÍ
  style: '7'
- paragraph_index: 10
  text: ÚVODNÍ USTANOVENÍ
  style: '8'
- paragraph_index: 11
  text: § 1
  style: '9'
- paragraph_index: 12
  text: Předmět právní úpravy
  style: '10'
- paragraph_index: 13
  text: Tato vyhláška zapracovává příslušný předpis Evropské unie1) a pro poskytovatele regulované služby v režimu vyšších povinností (dále jen „povinná osoba“) upravuje obsah bezpečnostních opatření a způsob jejich zavádění a provádění.
  style: '11'
- paragraph_index: 14
  text: § 2
  style: '12'
- paragraph_index: 15
  text: Vymezení pojmů
  style: '10'
- paragraph_index: 16
  text: Pro účely této vyhlášky se rozumí
  style: '11'
- paragraph_index: 17
  text: a)    uživatelem fyzická nebo právnická osoba anebo orgán veřejné moci, který využívá aktiva,
  style: '13'
- paragraph_index: 18
  text: b)    privilegovaným uživatelem uživatel nebo jiná osoba, jejíž činnost na technickém aktivu může mít významný dopad na bezpečnost regulované služby,
  style: '14'
- paragraph_index: 19
  text: c)    administrátorem privilegovaný uživatel nebo jiná osoba zajišťující správu, provoz, užívání, údržbu a bezpečnost technického aktiva,
  style: '14'
- paragraph_index: 20
  text: d)    bezpečnostní politikou soubor zásad a pravidel, která určují způsob zajištění ochrany aktiv,
  style: '14'
- paragraph_index: 21
  text: e)    hodnocením rizik proces určování, analýzy a vyhodnocení rizik,
  style: '14'
- paragraph_index: 22
  text: f)    řízením rizik proces zahrnující hodnocení rizik, zavádění bezpečnostních opatření ke zvládání rizik a komunikaci rizik,
  style: '14'
- paragraph_index: 23
  text: g)    systémem řízení bezpečnosti informací část systému řízení povinné osoby založená na přístupu k rizikům, zahrnující způsob ustanovení, zavádění, provozování, monitorování, přezkoumání, udržování a zlepšování bezpečnosti informací a
  style: '14'
- paragraph_index: 24
  text: h)    významným dodavatelem ten, kdo povinné osobě poskytuje plnění, které je významné z hlediska zajištění kybernetické bezpečnosti regulované služby.
  style: '15'
- paragraph_index: 25
  text: ČÁST DRUHÁ
  style: '7'
- paragraph_index: 26
  text: BEZPEČNOSTNÍ OPATŘENÍ
  style: '8'
- paragraph_index: 27
  text: HLAVA I
  style: '16'
- paragraph_index: 28
  text: Organizační opatření
  style: '17'
- paragraph_index: 29
  text: § 3
  style: '9'
- paragraph_index: 30
  text: Systém řízení bezpečnosti informací
  style: '10'
- paragraph_index: 31
  text: Povinná osoba v rámci systému řízení bezpečnosti informací
  style: '11'
- paragraph_index: 32
  text: a)    stanoví cíle systému řízení bezpečnosti informací směřující k zajištění kybernetické bezpečnosti regulované služby,
  style: '13'
- paragraph_index: 33
  text: b)    řídí rizika podle § 8,
  style: '14'
- paragraph_index: 34
  text: c)    zavede a provádí přiměřená bezpečnostní opatření směřující k zajištění kybernetické bezpečnosti regulované služby na základě cílů systému řízení bezpečnosti informací, bezpečnostních potřeb a řízení rizik,
  style: '14'
- paragraph_index: 35
  text: d)    stanoví bezpečnostní politiku a bezpečnostní dokumentaci ve vztahu k řízení kybernetické bezpečnosti, která obsahuje hlavní zásady, cíle systému řízení bezpečnosti informací, bezpečnostní potřeby, práva a povinnosti ve vztahu k řízení bezpečnosti informací, a na základě bezpečnostních potřeb a výsledků hodnocení rizik stanoví bezpečnostní politiku a bezpečnostní dokumentaci v dalších oblastech podle § 6,
  style: '14'
- paragraph_index: 36
  text: e)    zajistí provedení auditu kybernetické bezpečnosti podle § 16,
  style: '14'
- paragraph_index: 37
  text: f)    zajistí alespoň jednou ročně vyhodnocení účinnosti systému řízení bezpečnosti informací, které obsahuje
  style: '15'
- paragraph_index: 38
  text: 1.    vyhodnocení cílů systému řízení bezpečnosti informací směřujících k zajištění kybernetické bezpečnosti regulované služby,
  style: '18'
- paragraph_index: 39
  text: 2.    posouzení naplňování plánu zvládání rizik zpracovaného podle § 8 odst. 1 písm. g),
  style: '19'
- paragraph_index: 40
  text: 3.    hodnocení stavu systému řízení bezpečnosti informací včetně revize hodnocení rizik,
  style: '19'
- paragraph_index: 41
  text: 4.    posouzení výsledků provedených auditů kybernetické bezpečnosti a kontrol v oblasti kybernetické bezpečnosti,
  style: '19'
- paragraph_index: 42
  text: 5.    výsledky předchozího hodnocení účinnosti systému řízení bezpečnosti informací provedených podle tohoto písmene,
  style: '19'
- paragraph_index: 43
  text: 6.    posouzení dopadů kybernetických bezpečnostních incidentů na oblast kybernetické bezpečnosti a na poskytované služby podle § 15 a
  style: '19'
- paragraph_index: 44
  text: 7.    posouzení významných změn podle § 11,
  style: '20'
- paragraph_index: 45
  text: g)    zpracuje zprávu o přezkoumání systému řízení bezpečnosti informací na základě vyhodnocení účinnosti systému řízení bezpečnosti informací podle písmene f),
  style: '13'
- paragraph_index: 46
  text: h)    aktualizuje systém řízení bezpečnosti informací a relevantní dokumentaci na základě
  style: '15'
- paragraph_index: 47
  text: 1.    zjištění z auditů kybernetické bezpečnosti a kontrol v oblasti kybernetické bezpečnosti,
  style: '18'
- paragraph_index: 48
  text: 2.    výsledků vyhodnocení účinnosti systému řízení bezpečnosti informací,
  style: '19'
- paragraph_index: 49
  text: 3.    dopadů kybernetických bezpečnostních incidentů na poskytované služby a
  style: '19'
- paragraph_index: 50
  text: 4.    prováděných významných změn,
  style: '20'
- paragraph_index: 51
  text: i)    řídí provoz a zdroje systému řízení bezpečnosti informací a zaznamenává činnosti spojené se systémem řízení bezpečnosti informací a řízením rizik a
  style: '13'
- paragraph_index: 52
  text: j)    stanoví proces řízení výjimek z pravidel stanovených v bezpečnostní politice podle písmene d).
  style: '15'
- paragraph_index: 53
  text: § 4
  style: '12'
- paragraph_index: 54
  text: Požadavky na vrcholné vedení
  style: '10'
- paragraph_index: 55
  text: (1)    Statutární orgán povinné osoby nebo jiná osoba anebo skupina osob v obdobném řídícím postavení u povinné osoby (dále jen „vrcholné vedení“) s ohledem na systém řízení bezpečnosti informací
  style: '21'
- paragraph_index: 56
  text: a)    prokazatelně absolvuje školení podle § 10 odst. 3 písm. a),
  style: '22'
- paragraph_index: 57
  text: b)    zajistí stanovení bezpečnostní politiky a cílů systému řízení bezpečnosti informací podle § 3, slučitelných se strategickým směřováním povinné osoby,
  style: '23'
- paragraph_index: 58
  text: c)    zajistí integraci systému řízení bezpečnosti informací do procesů povinné osoby,
  style: '23'
- paragraph_index: 59
  text: d)    zajistí dostupnost zdrojů potřebných pro systém řízení bezpečnosti informací,
  style: '23'
- paragraph_index: 60
  text: e)    informuje zaměstnance a všechny dotčené osoby o významu systému řízení bezpečnosti informací a významu dosažení shody s jeho požadavky,
  style: '23'
- paragraph_index: 61
  text: f)    zajistí podporu k dosažení cílů systému řízení bezpečnosti informací,
  style: '23'
- paragraph_index: 62
  text: g)    vede a podporuje zaměstnance k rozvíjení efektivity systému řízení bezpečnosti informací,
  style: '23'
- paragraph_index: 63
  text: h)    se podílí na vypracování analýzy dopadů podle § 15,
  style: '23'
- paragraph_index: 64
  text: i)    zajistí testování plánů kontinuity činností, plánů obnovy a procesů spojených se zvládáním kybernetických bezpečnostních incidentů,
  style: '23'
- paragraph_index: 65
  text: j)    prosazuje neustálé zlepšování systému řízení bezpečnosti informací,
  style: '23'
- paragraph_index: 66
  text: k)    podporuje osoby zastávající bezpečnostní role při prosazování kybernetické bezpečnosti v oblastech jejich odpovědnosti,
  style: '23'
- paragraph_index: 67
  text: l)    zajistí stanovení pravidel pro určení administrátorů a osob, které budou zastávat bezpečnostní role,
  style: '23'
- paragraph_index: 68
  text: m)    zajistí, aby byla zachována mlčenlivost všech relevantních osob zejména administrátorů, osob zastávajících bezpečnostní role a dodavatelů, a
  style: '23'
- paragraph_index: 69
  text: n)    zajistí pro osoby zastávající bezpečnostní role pravomoci potřebné pro naplňování jejich rolí a zdroje, včetně rozpočtových prostředků k naplňování jejich rolí a plnění souvisejících úkolů.
  style: '24'
- paragraph_index: 70
  text: (2)    Vrcholné vedení se prokazatelně seznamuje
  style: '21'
- paragraph_index: 71
  text: a)    se zprávou o přezkoumání systému řízení bezpečnosti informací,
  style: '22'
- paragraph_index: 72
  text: b)    se zprávou o hodnocení rizik,
  style: '23'
- paragraph_index: 73
  text: c)    s plánem zvládání rizik,
  style: '23'
- paragraph_index: 74
  text: d)    s výsledky analýzy dopadů a
  style: '23'
- paragraph_index: 75
  text: e)    s výsledky auditů kybernetické bezpečnosti a kontrol v oblasti kybernetické bezpečnosti.
  style: '24'
- paragraph_index: 76
  text: (3)    Vrcholné vedení zřídí výbor pro řízení kybernetické bezpečnosti a určí jeho členy, přičemž
  style: '21'
- paragraph_index: 77
  text: a)    zajistí, že členem výboru pro řízení kybernetické bezpečnosti bude alespoň 1 člen vrcholného vedení nebo jím pověřená osoba a manažer kybernetické bezpečnosti,
  style: '22'
- paragraph_index: 78
  text: b)    určí práva a povinnosti výboru pro řízení kybernetické bezpečnosti a jeho členů, související se systémem řízení bezpečnosti informací,
  style: '23'
- paragraph_index: 79
  text: c)    zajistí konání pravidelných jednání výboru pro řízení kybernetické bezpečnosti alespoň jednou ročně,
  style: '23'
- paragraph_index: 80
  text: d)    zajistí vyhotovení záznamu o průběhu jednání výboru pro řízení kybernetické bezpečnosti a
  style: '23'
- paragraph_index: 81
  text: e)    zajistí, že výbor pro řízení kybernetické bezpečnosti je složen z osob s pravomocemi a odbornou způsobilostí pro celkové řízení a rozvoj systému řízení bezpečnosti informací a osob významně se podílejících na řízení a koordinaci činností spojených s kybernetickou bezpečností.
  style: '24'
- paragraph_index: 82
  text: (4)    Vrcholné vedení určí osoby, včetně vymezení jejich práv a povinností souvisejících se systémem řízení bezpečnosti informací, které budou zastávat bezpečnostní role
  style: '21'
- paragraph_index: 83
  text: a)    manažera kybernetické bezpečnosti,
  style: '22'
- paragraph_index: 84
  text: b)    architekta kybernetické bezpečnosti,
  style: '23'
- paragraph_index: 85
  text: c)    garanta aktiva a
  style: '23'
- paragraph_index: 86
  text: d)    auditora kybernetické bezpečnosti.
  style: '24'
- paragraph_index: 87
  text: (5)    Vrcholné vedení zajistí zastupitelnost bezpečnostních rolí uvedených v odstavci 4 písm. a) a b).
  style: '21'
- paragraph_index: 88
  text: § 5
  style: '12'
- paragraph_index: 89
  text: Stanovení bezpečnostních rolí
  style: '10'
- paragraph_index: 90
  text: (1)    Manažer kybernetické bezpečnosti
  style: '21'
- paragraph_index: 91
  text: a)    je pověřen řízením systému řízení bezpečnosti informací, přičemž výkonem této role může být pověřena osoba, která je pro tuto činnost vyškolena a prokáže odbornou způsobilost praxí s řízením kybernetické bezpečnosti nebo s řízením bezpečnosti informací po dobu alespoň 3 let,
  style: '22'
- paragraph_index: 92
  text: b)    odpovídá za pravidelné informování vrcholného vedení o
  style: '24'
- paragraph_index: 93
  text: 1.    činnostech vyplývajících z rozsahu jeho odpovědnosti a
  style: '25'
- paragraph_index: 94
  text: 2.    stavu systému řízení bezpečnosti informací,
  style: '26'
- paragraph_index: 95
  text: c)    nesmí být pověřen výkonem rolí odpovědných za provoz technických aktiv regulované služby.
  style: '27'
- paragraph_index: 96
  text: (2)    Architekt kybernetické bezpečnosti je pověřen k zajištění návrhu implementace bezpečnostních opatření tak, aby byla zajištěna bezpečná architektura regulované služby, přičemž výkonem této role může být pověřena osoba, která je pro tuto činnost vyškolena a prokáže odbornou způsobilost praxí s navrhováním implementace bezpečnostních opatření a zajišťováním bezpečné architektury v délce alespoň 3 let.
  style: '28'
- paragraph_index: 97
  text: (3)    Garant aktiva je pověřen k zajištění rozvoje, použití a bezpečnost aktiva.
  style: '29'
- paragraph_index: 98
  text: (4)    Auditor kybernetické bezpečnosti
  style: '30'
- paragraph_index: 99
  text: a)    je pověřen prováděním auditu kybernetické bezpečnosti, přičemž výkonem této role může být pověřena osoba, která je pro tuto činnost vyškolena a prokáže odbornou způsobilost praxí s prováděním auditů kybernetické bezpečnosti nebo auditů systému řízení bezpečnosti informací v délce alespoň 3 let,
  style: '22'
- paragraph_index: 100
  text: b)    zaručuje, že provedení auditu kybernetické bezpečnosti je nestranné, a
  style: '23'
- paragraph_index: 101
  text: c)    nesmí být pověřen výkonem jiných bezpečnostních rolí.
  style: '24'
- paragraph_index: 102
  text: § 6
  style: '12'
- paragraph_index: 103
  text: Řízení bezpečnostní politiky a bezpečnostní dokumentace
  style: '10'
- paragraph_index: 104
  text: (1)    Povinná osoba stanoví bezpečnostní politiku ve vztahu k řízení kybernetické bezpečnosti a vede bezpečnostní politiku a bezpečnostní dokumentaci k relevantním bezpečnostním opatřením uvedeným v § 3 až 27.
  style: '28'
- paragraph_index: 105
  text: (2)    Povinná osoba dodržuje pravidla a postupy stanovené v bezpečnostní politice a bezpečnostní dokumentaci podle odstavce 1.
  style: '29'
- paragraph_index: 106
  text: (3)    Povinná osoba pravidelně přezkoumává bezpečnostní politiku a bezpečnostní dokumentaci, zajišťuje jejich aktuálnost a jejich relevantní oblasti zahrnuje do provozní dokumentace, pravidel a postupů.
  style: '29'
- paragraph_index: 107
  text: (4)    Povinná osoba určí osobu odpovědnou za pravidelný přezkum a aktualizaci bezpečnostní politiky a bezpečnostní dokumentace podle odstavce 3.
  style: '29'
- paragraph_index: 108
  text: (5)    Bezpečnostní politika a bezpečnostní dokumentace musí být řízeny tak, aby byly
  style: '30'
- paragraph_index: 109
  text: a)    dostupné v elektronické nebo listinné podobě,
  style: '22'
- paragraph_index: 110
  text: b)    dotčené osoby v rámci povinné osoby informovány o právech, povinnostech a postupech v nich obsažených,
  style: '23'
- paragraph_index: 111
  text: c)    přiměřeně dostupné dotčeným osobám,
  style: '23'
- paragraph_index: 112
  text: d)    chráněny z pohledu důvěrnosti, integrity a dostupnosti a
  style: '23'
- paragraph_index: 113
  text: e)    informace v nich obsažené úplné, čitelné, snadno identifikovatelné a vyhledatelné.
  style: '24'
- paragraph_index: 114
  text: § 7
  style: '12'
- paragraph_index: 115
  text: Řízení aktiv
  style: '10'
- paragraph_index: 116
  text: Povinná osoba v návaznosti na stanovení rozsahu řízení kybernetické bezpečnosti podle § 12 zákona
  style: '11'
- paragraph_index: 117
  text: a)    stanoví metodiku pro určování aktiv,
  style: '13'
- paragraph_index: 118
  text: b)    stanoví metodiku pro hodnocení aktiv včetně stanovení úrovní aktiv, alespoň v rozsahu uvedeném v příloze č. 1 k této vyhlášce,
  style: '14'
- paragraph_index: 119
  text: c)    eviduje garanty aktiv podle § 4 odst. 4 písm. c),
  style: '14'
- paragraph_index: 120
  text: d)    hodnotí primární aktiva z hlediska důvěrnosti, integrity a dostupnosti a zařadí je do jednotlivých úrovní podle písmene b),
  style: '14'
- paragraph_index: 121
  text: e)    posuzuje při hodnocení primárních aktiv alespoň oblasti uvedené v příloze č. 1 k této vyhlášce,
  style: '14'
- paragraph_index: 122
  text: f)    určuje a eviduje vazby mezi aktivy, která mají vliv na bezpečnost regulované služby,
  style: '14'
- paragraph_index: 123
  text: g)    hodnotí podpůrná aktiva a vychází přitom zejména z určených vazeb na primární aktiva a
  style: '14'
- paragraph_index: 124
  text: h)    pro jednotlivé úrovně aktiv podle písmene b) stanovuje a zavádí pravidla ochrany nutná pro zabezpečení jejich důvěrnosti, integrity a dostupnosti, která obsahují alespoň
  style: '15'
- paragraph_index: 125
  text: 1.    přípustné způsoby používání aktiv,
  style: '18'
- paragraph_index: 126
  text: 2.    pravidla pro manipulaci s aktivy, včetně pravidel pro bezpečné elektronické sdílení a fyzické přenášení aktiv,
  style: '19'
- paragraph_index: 127
  text: 3.    pravidla pro klasifikaci informací,
  style: '19'
- paragraph_index: 128
  text: 4.    pravidla pro označování aktiv,
  style: '19'
- paragraph_index: 129
  text: 5.    pravidla správy výměnných médií a
  style: '19'
- paragraph_index: 130
  text: 6.    pravidla pro určení způsobu likvidace informací a dat a jejich kopií a likvidace technických aktiv, která jsou nosiči informací a dat s ohledem na úroveň aktiv v souladu s přílohou č. 2 k této vyhlášce.
  style: '20'
- paragraph_index: 131
  text: § 8
  style: '12'
- paragraph_index: 132
  text: Řízení rizik
  style: '10'
- paragraph_index: 133
  text: (1)    Povinná osoba při řízení rizik v návaznosti na § 7
  style: '21'
- paragraph_index: 134
  text: a)    stanoví metodiku pro určování a hodnocení rizik, včetně stanovení kritérií pro akceptovatelnost rizik,
  style: '22'
- paragraph_index: 135
  text: b)    při určování rizik s ohledem na aktiva určuje relevantní hrozby a zranitelnosti; přitom zvažuje alespoň kategorie hrozeb a zranitelností uvedených v příloze č. 3 k této vyhlášce,
  style: '23'
- paragraph_index: 136
  text: c)    provádí hodnocení rizik v pravidelných intervalech alespoň jednou ročně a při významných změnách určených podle § 11 odst. 1 písm. c), při kterém zohlední
  style: '24'
- paragraph_index: 137
  text: 1.    relevantní hrozby a zranitelnosti podle písmene b) a posoudí možné dopady na aktiva, přičemž vychází z hodnocení aktiv podle § 7,
  style: '25'
- paragraph_index: 138
  text: 2.    významné změny,
  style: '31'
- paragraph_index: 139
  text: 3.    změny stanoveného rozsahu podle § 12 zákona,
  style: '31'
- paragraph_index: 140
  text: 4.    protiopatření podle § 20 zákona,
  style: '31'
- paragraph_index: 141
  text: 5.    kybernetické bezpečnostní incidenty, včetně dříve řešených,
  style: '31'
- paragraph_index: 142
  text: 6.    výsledky auditů kybernetické bezpečnosti a kontrol v oblasti kybernetické bezpečnosti,
  style: '31'
- paragraph_index: 143
  text: 7.    výsledky penetračního testování a skenování zranitelností a
  style: '31'
- paragraph_index: 144
  text: 8.    výsledky vyhodnocení účinnosti systému řízení bezpečnosti informací,
  style: '26'
- paragraph_index: 145
  text: d)    při hodnocení rizik postupuje alespoň v rozsahu přílohy č. 4 k této vyhlášce,
  style: '22'
- paragraph_index: 146
  text: e)    na základě provedeného hodnocení rizik podle písmene c) zpracuje zprávu o hodnocení rizik,
  style: '23'
- paragraph_index: 147
  text: f)    zpracuje na základě bezpečnostních potřeb a výsledků hodnocení rizik prohlášení o aplikovatelnosti, které obsahuje přehled všech bezpečnostních opatření požadovaných touto vyhláškou, která
  style: '24'
- paragraph_index: 148
  text: 1.    nebyla aplikována, včetně odůvodnění a uvedení případných přijatých náhradních bezpečnostních opatření, a
  style: '25'
- paragraph_index: 149
  text: 2.    byla aplikována, včetně způsobu plnění,
  style: '26'
- paragraph_index: 150
  text: g)    na základě provedeného hodnocení rizik podle písmene c) a v souladu se stanovenými kritérii pro akceptovatelnost rizik zpracuje plán zvládání rizik, který obsahuje
  style: '27'
- paragraph_index: 151
  text: 1.    popis bezpečnostních opatření pro zvládání rizik,
  style: '25'
- paragraph_index: 152
  text: 2.    cíle a přínosy bezpečnostních opatření pro zvládání rizik,
  style: '31'
- paragraph_index: 153
  text: 3.    určení osoby zajišťující zavedení bezpečnostních opatření pro zvládání rizik,
  style: '31'
- paragraph_index: 154
  text: 4.    předpokládané lidské, finanční a technické zdroje pro zavedení bezpečnostních opatření,
  style: '31'
- paragraph_index: 155
  text: 5.    požadovaný termín zavedení bezpečnostních opatření,
  style: '31'
- paragraph_index: 156
  text: 6.    popis vazeb mezi riziky a příslušnými bezpečnostními opatřeními a
  style: '31'
- paragraph_index: 157
  text: 7.    konkrétní způsob realizace bezpečnostních opatření.
  style: '26'
- paragraph_index: 158
  text: (2)    Povinná osoba v souladu s plánem zvládání rizik zavádí bezpečnostní opatření.
  style: '28'
- paragraph_index: 159
  text: (3)    Hodnocení rizik může být zajištěno i jinými způsoby, než jak je stanoveno v odstavci 1 písm. c), pokud povinná osoba zajistí stejnou nebo vyšší úroveň procesu hodnocení rizik a postupuje v souladu s odstavcem 5 přílohy č. 4 k této vyhlášce.
  style: '29'
- paragraph_index: 160
  text: (4)    Povinná osoba nemusí uplatňovat některá bezpečnostní opatření stanovená touto vyhláškou pouze na základě provedeného řízení rizik.
  style: '30'
- paragraph_index: 161
  text: § 9
  style: '12'
- paragraph_index: 162
  text: Řízení dodavatelů
  style: '10'
- paragraph_index: 163
  text: (1)    Povinná osoba při řízení dodavatelů
  style: '21'
- paragraph_index: 164
  text: a)    stanoví pravidla pro dodavatele, která zohledňují požadavky systému řízení bezpečnosti informací,
  style: '22'
- paragraph_index: 165
  text: b)    prokazatelně seznamuje své dodavatele s pravidly podle písmene a) a vyžaduje plnění těchto pravidel,
  style: '23'
- paragraph_index: 166
  text: c)    řídí rizika spojená s dodavateli,
  style: '23'
- paragraph_index: 167
  text: d)    identifikuje a eviduje své významné dodavatele ve smyslu § 2 písm. h),
  style: '23'
- paragraph_index: 168
  text: e)    prokazatelně písemně informuje své významné dodavatele o jejich evidenci podle písmene d),
  style: '23'
- paragraph_index: 169
  text: f)    zajistí v souvislosti s řízením rizik spojených s významnými dodavateli, aby smlouvy uzavírané s významnými dodavateli obsahovaly relevantní ustanovení uvedená v příloze č. 5 k této vyhlášce, a
  style: '23'
- paragraph_index: 170
  text: g)    pravidelně přezkoumává plnění smluv s významnými dodavateli z hlediska systému řízení bezpečnosti informací.
  style: '24'
- paragraph_index: 171
  text: (2)    Povinná osoba u významných dodavatelů dále
  style: '21'
- paragraph_index: 172
  text: a)    provádí v rámci výběrového řízení podle zákona o zadávání veřejných zakázek2) nebo před uzavřením smlouvy hodnocení rizik souvisejících s plněním podle přílohy č. 4 k této vyhlášce,
  style: '22'
- paragraph_index: 173
  text: b)    stanoví v rámci uzavíraných smluvních vztahů způsoby a úrovně realizace bezpečnostních opatření a smluvně určí obsah vzájemné odpovědnosti za zavedení a kontrolu bezpečnostních opatření,
  style: '23'
- paragraph_index: 174
  text: c)    provádí pravidelné hodnocení rizik a pravidelnou kontrolu zavedených bezpečnostních opatření u poskytovaných plnění pomocí vlastních zdrojů nebo pomocí třetí strany a
  style: '23'
- paragraph_index: 175
  text: d)    zajistí v reakci na rizika a zjištěné nedostatky jejich řešení, která budou přijata bez zbytečného odkladu.
  style: '24'
- paragraph_index: 176
  text: (3)    Náležitosti prokazatelného informování podle odstavce 1 písm. e) jsou
  style: '21'
- paragraph_index: 177
  text: a)    identifikační údaje povinné osoby, včetně uvedení, že povinná osoba je poskytovatelem regulované služby v režimu vyšších povinností,
  style: '22'
- paragraph_index: 178
  text: b)    název regulované služby povinné osoby,
  style: '23'
- paragraph_index: 179
  text: c)    identifikační údaje významného dodavatele a
  style: '23'
- paragraph_index: 180
  text: d)    prohlášení, že dodavatel je pro povinnou osobu významným dodavatelem.
  style: '24'
- paragraph_index: 181
  text: § 10
  style: '12'
- paragraph_index: 182
  text: Bezpečnost lidských zdrojů
  style: '10'
- paragraph_index: 183
  text: (1)    Povinná osoba v rámci bezpečnosti lidských zdrojů s ohledem na stav a potřeby systému řízení bezpečnosti informací stanoví plán rozvoje bezpečnostního povědomí, jehož cílem je zajistit odpovídající vzdělávání a zlepšování bezpečnostního povědomí včetně formy, obsahu a rozsahu poučení a školení podle odstavce 2.
  style: '28'
- paragraph_index: 184
  text: (2)    Povinná osoba zahrne do plánu rozvoje bezpečnostního povědomí
  style: '30'
- paragraph_index: 185
  text: a)    poučení vrcholného vedení o jeho povinnostech a bezpečnostní politice, zejména v oblastech systému řízení bezpečnosti informací a řízení rizik,
  style: '22'
- paragraph_index: 186
  text: b)    poučení uživatelů, administrátorů a osob zastávajících bezpečnostní role o jejich povinnostech a o bezpečnostní politice,
  style: '23'
- paragraph_index: 187
  text: c)    potřebná teoretická i praktická školení uživatelů, administrátorů a osob zastávajících bezpečnostní role,
  style: '23'
- paragraph_index: 188
  text: d)    pravidla tvorby bezpečných hesel v souladu s § 19 a
  style: '23'
- paragraph_index: 189
  text: e)    relevantní témata uvedená v příloze č. 6 k této vyhlášce.
  style: '24'
- paragraph_index: 190
  text: (3)    Povinná osoba v rámci bezpečnostního povědomí zajistí
  style: '21'
- paragraph_index: 191
  text: a)    poučení vrcholného vedení o jeho povinnostech, o bezpečnostní politice zejména v oblasti systému řízení bezpečnosti informací, řízení rizik a řízení kontinuity činností formou vstupních a pravidelných školení k získání znalostí a dovedností vedoucích k určování rizik a posouzení vhodnosti zvolených postupů při řízení rizik a jejich dopadů na regulovanou službu,
  style: '22'
- paragraph_index: 192
  text: b)    poučení uživatelů, administrátorů a osob zastávajících bezpečnostní role o jejich povinnostech a o bezpečnostní politice formou vstupních a pravidelných školení,
  style: '23'
- paragraph_index: 193
  text: c)    pravidelná odborná školení osobám zastávajícím bezpečnostní role, přičemž vychází z aktuálních potřeb povinné osoby v oblasti kybernetické bezpečnosti, a
  style: '23'
- paragraph_index: 194
  text: d)    pravidelná školení a ověřování bezpečnostního povědomí zaměstnanců v souladu s jejich pracovní náplní nebo služebním zařazením.
  style: '24'
- paragraph_index: 195
  text: (4)    Povinná osoba v rámci bezpečnosti lidských zdrojů
  style: '21'
- paragraph_index: 196
  text: a)    určí osoby odpovědné za realizaci jednotlivých činností, které jsou v plánu rozvoje bezpečnostního povědomí uvedeny,
  style: '22'
- paragraph_index: 197
  text: b)    zajistí v souladu s plánem rozvoje bezpečnostního povědomí provedení poučení a školení podle odstavce 3,
  style: '23'
- paragraph_index: 198
  text: c)    pravidelně hodnotí účinnost plánu rozvoje bezpečnostního povědomí, provedených poučení, školení a dalších činností spojených se zlepšováním bezpečnostního povědomí,
  style: '23'
- paragraph_index: 199
  text: d)    zajistí kontrolu dodržování bezpečnostní politiky ze strany uživatelů, administrátorů a osob zastávajících bezpečnostní role,
  style: '23'
- paragraph_index: 200
  text: e)    určí pravidla a postupy pro řešení případů porušení stanovených bezpečnostních pravidel ze strany uživatelů, administrátorů a osob zastávajících bezpečnostní role a
  style: '23'
- paragraph_index: 201
  text: f)    zajistí plynulost výkonu činností v případě ukončení nebo změny smluvního vztahu s administrátory a osobami zastávajícími bezpečnostní role.
  style: '24'
- paragraph_index: 202
  text: (5)    Povinná osoba vede o poučení a školení podle odstavce 3 přehledy, které obsahují předmět poučení a školení včetně seznamu osob, které poučení a školení absolvovaly.
  style: '21'
- paragraph_index: 203
  text: § 11
  style: '12'
- paragraph_index: 204
  text: Řízení změn
  style: '10'
- paragraph_index: 205
  text: (1)    Povinná osoba při řízení změn u aktiv
  style: '21'
- paragraph_index: 206
  text: a)    stanoví pravidla, postupy a kritéria pro určení významných změn,
  style: '22'
- paragraph_index: 207
  text: b)    určí změny, které mají nebo mohou mít vliv na kybernetickou bezpečnost,
  style: '23'
- paragraph_index: 208
  text: c)    určuje u změn určených podle písmene b) významné změny v souladu se stanovenými pravidly, postupy a kritérii pro určení významných změn podle písmene a).
  style: '24'
- paragraph_index: 209
  text: (2)    Povinná osoba u významných změn
  style: '21'
- paragraph_index: 210
  text: a)    dokumentuje jejich řízení,
  style: '22'
- paragraph_index: 211
  text: b)    řídí rizika spojená s významnými změnami,
  style: '23'
- paragraph_index: 212
  text: c)    přijímá bezpečnostní opatření za účelem snížení všech nepříznivých dopadů spojených s významnými změnami,
  style: '23'
- paragraph_index: 213
  text: d)    aktualizuje bezpečnostní a provozní dokumentaci,
  style: '23'
- paragraph_index: 214
  text: e)    zajistí jejich testování před uvedením do provozu a
  style: '23'
- paragraph_index: 215
  text: f)    zajistí možnost navrácení do původního stavu.
  style: '24'
- paragraph_index: 216
  text: (3)    Povinná osoba na základě výsledků řízení rizik podle odstavce 2 písm. b) rozhoduje o provedení penetračního testování; pokud rozhodne o provedení penetračního testování, postupuje podle § 24 odst. 5.
  style: '21'
- paragraph_index: 217
  text: § 12
  style: '12'
- paragraph_index: 218
  text: Akvizice, vývoj a údržba
  style: '10'
- paragraph_index: 219
  text: (1)    Povinná osoba v souvislosti s plánovanou akvizicí, vývojem a údržbou aktiv
  style: '21'
- paragraph_index: 220
  text: a)    řídí rizika,
  style: '22'
- paragraph_index: 221
  text: b)    řídí významné změny podle § 11,
  style: '23'
- paragraph_index: 222
  text: c)    stanoví bezpečnostní požadavky, které zohlední i relevantní bezpečnostní opatření stanovená touto vyhláškou,
  style: '23'
- paragraph_index: 223
  text: d)    zahrne bezpečnostní požadavky stanovené podle písmene c) do plánované akvizice, vývoje a údržby a
  style: '23'
- paragraph_index: 224
  text: e)    zajistí oddělení provozního, zálohovacího, vývojového, testovacího, administrátorského a jiného specifického prostředí, a zajistí ochranu informací a dat, které se v něm vyskytují.
  style: '24'
- paragraph_index: 225
  text: (2)    Povinná osoba zajistí při provedení akvizice nebo vývoje technického aktiva
  style: '21'
- paragraph_index: 226
  text: a)    využívajícího autentizační mechanismus, zejména za účelem ověření identity uživatelů nebo administrátorů, plnění požadavků podle § 19 odst. 2,
  style: '22'
- paragraph_index: 227
  text: b)    využívajícího kryptografické algoritmy, plnění požadavku podle § 25 odst. 1 písm. a) a § 25 odst. 3 písm. a) a
  style: '23'
- paragraph_index: 228
  text: c)    dostupnost bezpečnostních aktualizací po dobu jeho životního cyklu.
  style: '24'
- paragraph_index: 229
  text: § 13
  style: '12'
- paragraph_index: 230
  text: Řízení přístupu
  style: '10'
- paragraph_index: 231
  text: (1)    Povinná osoba na základě bezpečnostních a provozních potřeb řídí přístup k aktivům a přijímá bezpečnostní opatření, která slouží k zajištění ochrany přístupových a autentizačních údajů, které jsou používány pro ověření identity podle § 19 a 20.
  style: '28'
- paragraph_index: 232
  text: (2)    Povinná osoba dále při řízení přístupu k aktivům
  style: '30'
- paragraph_index: 233
  text: a)    řídí přístup na základě skupin nebo rolí,
  style: '22'
- paragraph_index: 234
  text: b)    přidělí každému uživateli a administrátorovi přistupujícímu k aktivům přístupová práva a oprávnění na úroveň nezbytně nutnou k výkonu práce a jedinečný identifikátor daného typu účtu, přičemž odděluje uživatelské a administrátorské účty jedné osoby,
  style: '23'
- paragraph_index: 235
  text: c)    řídí identifikátory, přístupová práva a oprávnění účtů technických aktiv,
  style: '23'
- paragraph_index: 236
  text: d)    zavádí v souladu s písmenem c) bezpečnostní opatření pro řízení přístupu technických aktiv,
  style: '23'
- paragraph_index: 237
  text: e)    zavádí bezpečnostní opatření potřebná pro bezpečné používání mobilních zařízení a jiných obdobných technických aktiv, popřípadě i bezpečnostní opatření spojená s využitím technických aktiv, která povinná osoba nemá ve své správě,
  style: '23'
- paragraph_index: 238
  text: f)    omezí a kontroluje používání programových prostředků a vybavení, které mohou být schopné překonat systémové nebo aplikační kontroly,
  style: '23'
- paragraph_index: 239
  text: g)    přiděluje a odebírá přístupová práva a oprávnění v souladu s politikou řízení přístupu,
  style: '23'
- paragraph_index: 240
  text: h)    provádí pravidelné přezkoumání veškerých přístupových práv a oprávnění včetně rozdělení do skupin a rolí,
  style: '23'
- paragraph_index: 241
  text: i)    zajistí bezodkladné odebrání nebo změnu přístupových práv a oprávnění při změně pozice nebo zařazení na základě skupin a rolí,
  style: '23'
- paragraph_index: 242
  text: j)    zajistí deaktivaci účtů a bezodkladné odebrání nebo změnu přístupových práv a oprávnění při ukončení nebo změně smluvního vztahu, na základě kterého došlo ke zřízení přístupu k aktivům,
  style: '23'
- paragraph_index: 243
  text: k)    dokumentuje přidělování a odebírání přístupových práv a oprávnění a
  style: '23'
- paragraph_index: 244
  text: l)    využívá nástroj pro správu a ověřování identity podle § 19 a nástroj pro řízení přístupových práv a oprávnění podle § 20.
  style: '24'
- paragraph_index: 245
  text: § 14
  style: '12'
- paragraph_index: 246
  text: Zvládání kybernetických bezpečnostních událostí a incidentů
  style: '10'
- paragraph_index: 247
  text: (1)    Povinná osoba při zvládání kybernetických bezpečnostních událostí a incidentů
  style: '21'
- paragraph_index: 248
  text: a)    zavede procesy, pravidla a postupy pro detekci, zaznamenávání a vyhodnocování kybernetických bezpečnostních událostí v souladu s § 21 až 23,
  style: '22'
- paragraph_index: 249
  text: b)    zavede procesy, pravidla a postupy pro koordinaci a zvládání kybernetických bezpečnostních incidentů,
  style: '23'
- paragraph_index: 250
  text: c)    přidělí odpovědnosti pro
  style: '24'
- paragraph_index: 251
  text: 1.    detekci, zaznamenávání a vyhodnocování kybernetických bezpečnostních událostí a
  style: '25'
- paragraph_index: 252
  text: 2.    koordinaci a zvládání kybernetických bezpečnostních incidentů,
  style: '26'
- paragraph_index: 253
  text: d)    definuje a dodržuje pravidla a postupy pro identifikaci, sběr, získání a uchování věrohodných podkladů potřebných pro analýzu kybernetického bezpečnostního incidentu,
  style: '22'
- paragraph_index: 254
  text: e)    zajistí detekci kybernetických bezpečnostních událostí podle § 21,
  style: '23'
- paragraph_index: 255
  text: f)    zajistí, že uživatelé, administrátoři, osoby zastávající bezpečnostní role, další zaměstnanci a dodavatelé budou oznamovat neobvyklé chování technických aktiv a podezření na zranitelnosti,
  style: '23'
- paragraph_index: 256
  text: g)    zajistí posuzování kybernetických bezpečnostních událostí, při kterých musí být rozhodnuto, zda mají být klasifikovány jako kybernetické bezpečnostní incidenty,
  style: '23'
- paragraph_index: 257
  text: h)    zajistí zvládání kybernetických bezpečnostních incidentů podle stanovených postupů,
  style: '23'
- paragraph_index: 258
  text: i)    přijímá bezpečnostní opatření pro odvrácení a zmírnění dopadu kybernetického bezpečnostního incidentu,
  style: '23'
- paragraph_index: 259
  text: j)    zajistí hlášení kybernetických bezpečnostních incidentů podle § 15 zákona,
  style: '23'
- paragraph_index: 260
  text: k)    prošetří a určí příčiny kybernetického bezpečnostního incidentu,
  style: '23'
- paragraph_index: 261
  text: l)    vede záznamy o kybernetických bezpečnostních incidentech a o jejich zvládání,
  style: '23'
- paragraph_index: 262
  text: m)    zajistí vytvoření závěrečné zprávy o vyřešení kybernetického bezpečnostního incidentu s významným dopadem podle § 16 zákona, včetně popisu příčiny vzniku kybernetického bezpečnostního incidentu s významným dopadem, pokud je známa, a
  style: '23'
- paragraph_index: 263
  text: n)    vyhodnotí účinnost řešení kybernetického bezpečnostního incidentu a na základě vyhodnocení stanoví nutná bezpečnostní opatření k zamezení opakování řešeného kybernetického bezpečnostního incidentu, popřípadě aktualizuje stávající bezpečnostní opatření.
  style: '24'
- paragraph_index: 264
  text: (2)    Povinná osoba dále při detekci a vyhodnocování kybernetických bezpečnostních událostí používá nástroje podle § 21 a 23.
