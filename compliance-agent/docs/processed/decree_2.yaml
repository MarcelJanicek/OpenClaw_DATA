  text: § 22
  style: '12'
- paragraph_index: 384
  text: Zaznamenávání událostí
  style: '10'
- paragraph_index: 385
  text: (1)    Povinná osoba na základě hodnocení aktiv a svých bezpečnostních potřeb
  style: '21'
