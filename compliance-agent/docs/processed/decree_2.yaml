  text: c)    délku hesla složeného alespoň z 22 znaků,
  style: '23'
- paragraph_index: 358
  text: d)    bezpečné uložení hesla,
  style: '23'
- paragraph_index: 359
  text: e)    omezení manipulace s účtem a jeho heslem, kdy s tímto účtem a jeho heslem mohou manipulovat pouze pověřené osoby, a to v nezbytně nutných případech,
  style: '23'
- paragraph_index: 360
  text: f)    změnu hesla po jeho použití, při jakékoli změně pověřených osob, v případě důvodného podezření na jeho kompromitaci nebo v intervalu alespoň jednou za 18 měsíců a
  style: '23'
- paragraph_index: 361
  text: g)    evidování manipulace a pokusy o manipulaci s tímto účtem a jeho heslem.
  style: '24'
