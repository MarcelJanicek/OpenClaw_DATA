  style: '23'
- paragraph_index: 396
  text: c)    manipulace a neúspěšné pokusy o manipulaci s účty, oprávněními a právy,
  style: '23'
- paragraph_index: 397
  text: d)    neprovedení činností v důsledku nedostatku přístupových práv nebo oprávnění,
  style: '23'
- paragraph_index: 398
  text: e)    zahájení a ukončení činností technických aktiv,
  style: '23'
- paragraph_index: 399
  text: f)    kritická a chybová hlášení technických aktiv,
  style: '23'
- paragraph_index: 400
  text: g)    přístupy a neúspěšné pokusy o přístupy k záznamům událostí,
  style: '23'
- paragraph_index: 401
  text: h)    manipulace a neúspěšné pokusy o manipulaci se záznamy událostí,
  style: '23'
- paragraph_index: 402
  text: i)    změny a neúspěšné pokusy o změny nastavení nástrojů pro zaznamenávání událostí a
  style: '23'
- paragraph_index: 403
  text: j)    další činnosti uživatelů, které mohou mít vliv na bezpečnost regulované služby.
  style: '24'
- paragraph_index: 404
  text: '(4)    Povinná osoba v rámci zaznamenávání událostí podle odstavce 2 zaznamenává následující informace o události:'
  style: '21'
- paragraph_index: 405
  text: a)    datum a čas včetně specifikace časového pásma,
  style: '22'
- paragraph_index: 406
  text: b)    typ činnosti,
  style: '23'
- paragraph_index: 407
  text: c)    jednoznačnou identifikaci technického aktiva, které činnost zaznamenalo, a to i v případě, kdy v komunikační síti dochází ke změně této síťové identifikace,
  style: '23'
- paragraph_index: 408
  text: d)    jednoznačnou identifikaci účtu, pod kterým byla činnost provedena, a to i v případě, kdy v komunikační síti dochází ke změně této síťové identifikace,
  style: '23'
- paragraph_index: 409
  text: e)    jednoznačnou identifikaci zařízení původce, a to i v případě, kdy v komunikační síti dochází ke změně této síťové identifikace, a
  style: '23'
- paragraph_index: 410
  text: f)    úspěšnost nebo neúspěšnost činnosti.
  style: '24'
- paragraph_index: 411
  text: (5)    Povinná osoba dále s ohledem na události zaznamenané podle odstavce 2
  style: '21'
- paragraph_index: 412
  text: a)    zajistí důvěrnost a integritu získaných informací, včetně ochrany před neoprávněným čtením a jakoukoliv změnou,
  style: '22'
- paragraph_index: 413
  text: b)    používá s ohledem na vazby mezi aktivy centralizovaný nástroj pro sběr a uchovávání záznamů těchto událostí a
  style: '23'
- paragraph_index: 414
  text: c)    uchovává záznamy těchto událostí alespoň po dobu 18 měsíců.
  style: '24'
- paragraph_index: 415
  text: (6)    Povinná osoba zajišťuje nepřetržitou synchronizaci jednotného času technických aktiv.
  style: '21'
- paragraph_index: 416
  text: § 23
  style: '12'
- paragraph_index: 417
  text: Vyhodnocování kybernetických bezpečnostních událostí
  style: '10'
- paragraph_index: 418
  text: (1)    Povinná osoba používá nástroj pro nepřetržité vyhodnocování kybernetických bezpečnostních událostí detekovaných podle § 21, který zajišťuje
  style: '21'
- paragraph_index: 419
  text: a)    sběr, vyhledávání a seskupování souvisejících záznamů za účelem detekce kybernetických bezpečnostních událostí,
  style: '22'
- paragraph_index: 420
  text: b)    nepřetržité poskytování informací o detekovaných kybernetických bezpečnostních událostech, včasné varování vybraných bezpečnostních rolí a dalších relevantních osob a
  style: '23'
- paragraph_index: 421
  text: c)    vyhodnocování kybernetických bezpečnostních událostí s cílem identifikace kybernetických bezpečnostních incidentů.
  style: '24'
- paragraph_index: 422
  text: (2)    Povinná osoba při používání nástroje pro nepřetržité vyhodnocování kybernetických bezpečnostních událostí v souladu s odstavcem 1 zajistí
  style: '21'
- paragraph_index: 423
  text: a)    omezení případů nesprávného nebo nežádoucího vyhodnocování kybernetických bezpečnostních událostí,
  style: '22'
- paragraph_index: 424
  text: b)    pravidelnou aktualizaci nastavení nástroje včetně jeho pravidel pro detekci a vyhodnocování kybernetických bezpečnostních událostí a
  style: '23'
- paragraph_index: 425
  text: c)    pravidelnou aktualizaci pravidel pro nepřetržité poskytování informací o detekovaných kybernetických bezpečnostních událostech včetně včasného varování vybraných bezpečnostních rolí a dalších relevantních osob.
  style: '24'
- paragraph_index: 426
  text: (3)    Povinná osoba zajistí využívání informací získaných nástrojem pro vyhodnocení kybernetických bezpečnostních událostí pro optimální nastavení systému řízení bezpečnosti informací regulované služby.
  style: '21'
- paragraph_index: 427
  text: § 24
  style: '12'
- paragraph_index: 428
  text: Aplikační bezpečnost
  style: '10'
- paragraph_index: 429
  text: (1)    Povinná osoba pro zajištění bezpečnosti regulované služby užívá technická aktiva, která jsou jejich výrobcem, dodavatelem nebo jinou osobou podporována a zajistí aplikování schválených bezpečnostních aktualizací vydaných pro tato aktiva.
  style: '28'
- paragraph_index: 430
  text: (2)    Povinná osoba do doby plnění podle odstavce 1 zavede bezpečnostní opatření, která zaručí obdobnou nebo vyšší úroveň bezpečnosti těchto technických aktiv, a eviduje technická aktiva,
  style: '30'
- paragraph_index: 431
  text: a)    která již nejsou výrobcem, dodavatelem nebo jinou osobou podporována a
  style: '22'
- paragraph_index: 432
  text: b)    na která není možné aplikovat poslední schválenou bezpečnostní aktualizaci.
  style: '24'
- paragraph_index: 433
  text: (3)    Povinná osoba v rámci aplikační bezpečnosti zajistí trvalou ochranu aplikací, informací, transakcí a přenášených identifikátorů relací před
  style: '21'
- paragraph_index: 434
  text: a)    neoprávněnou činností a
  style: '22'
- paragraph_index: 435
  text: b)    popřením provedených činností.
  style: '24'
- paragraph_index: 436
  text: (4)    Povinná osoba v rámci skenování zranitelností technických aktiv
  style: '21'
- paragraph_index: 437
  text: a)    provádí pravidelné skenování zranitelností technických aktiv regulované služby
  style: '27'
- paragraph_index: 438
  text: 1.    z vnitřní a vnější komunikační sítě a
  style: '25'
- paragraph_index: 439
  text: 2.    alespoň jednou ročně.
  style: '26'
- paragraph_index: 440
  text: b)    zohlední výsledky skenování zranitelností technických aktiv v rámci řízení rizik podle § 8 a zavádí bezpečnostní opatření na základě zjištěných výsledků.
  style: '27'
- paragraph_index: 441
  text: (5)    Povinná osoba v rámci penetračního testování
  style: '21'
- paragraph_index: 442
  text: a)    provádí penetrační testování technických aktiv s ohledem na hodnocení těchto aktiv a hodnocení rizik
  style: '27'
- paragraph_index: 443
  text: 1.    z vnitřní a vnější komunikační sítě,
  style: '25'
- paragraph_index: 444
  text: 2.    před jejich uvedením do provozu a
  style: '31'
- paragraph_index: 445
  text: 3.    v souvislosti s významnou změnou podle § 11 odst. 3,
  style: '26'
- paragraph_index: 446
  text: b)    zohlední výsledky penetračního testování při řízení rizik podle § 8 a zavádí bezpečnostní opatření na základě zjištěných výsledků,
  style: '22'
- paragraph_index: 447
  text: c)    provádí v souladu s odstavcem 5 písm. a) bodem 1 pravidelně penetrační testování, a to alespoň jednou za 2 roky,
  style: '23'
- paragraph_index: 448
  text: d)    v odůvodněných případech, pokud nemůže provést penetrační testování v rozsahu nebo intervalu stanoveném v odstavci 5 písm. c), může rozdělit toto penetrační testování do systematických celků. V takovém případě je nutno provést penetrační testování v rozsahu stanoveném v odstavci 5 písm. a) nejpozději do 5 let,
  style: '23'
- paragraph_index: 449
  text: e)    u penetračních testů v souladu s odstavcem 5 písm. a) eviduje termín provedení a konkrétní fyzické osoby provádějící toto penetrační testování.
  style: '24'
- paragraph_index: 450
  text: (6)    Povinná osoba provede opětovné otestování nálezu zjištěného na základě provedeného skenování zranitelností nebo penetračního testování za účelem ověření funkčnosti zavedených bezpečnostních opatření.
  style: '21'
- paragraph_index: 451
  text: § 25
  style: '12'
- paragraph_index: 452
  text: Kryptografické algoritmy
  style: '10'
- paragraph_index: 453
  text: (1)    Povinná osoba při zajištění bezpečnosti technických aktiv a jejich komunikace
  style: '21'
- paragraph_index: 454
  text: a)    používá pouze aktuálně odolné kryptografické algoritmy,
  style: '22'
- paragraph_index: 455
  text: b)    prosazuje bezpečné nakládání s kryptografickými algoritmy a
  style: '23'
- paragraph_index: 456
  text: c)    zohledňuje doporučení a metodiky v oblasti kryptografických algoritmů vydané Národním úřadem pro kybernetickou a informační bezpečnost.
  style: '24'
- paragraph_index: 457
  text: (2)    Povinná osoba zajišťuje bezpečnou
  style: '21'
- paragraph_index: 458
  text: a)    hlasovou, audiovizuální a textovou komunikaci, a to včetně e-mailové komunikace, a
  style: '22'
- paragraph_index: 459
  text: b)    nouzovou komunikaci v rámci organizace.
  style: '24'
- paragraph_index: 460
  text: (3)    Povinná osoba v případě využívání kryptografických klíčů a certifikátů pro ochranu technických aktiv a komunikační sítě používá
  style: '21'
- paragraph_index: 461
  text: a)    pouze aktuálně odolné kryptografické klíče a certifikáty a
  style: '22'
- paragraph_index: 462
  text: b)    nástroj pro správu kryptografických klíčů a certifikátů, který
  style: '24'
- paragraph_index: 463
  text: 1.    zajistí generování, distribuci, ukládání, změny, omezení platnosti, zneplatnění certifikátů a řádnou likvidaci kryptografických klíčů,
  style: '25'
- paragraph_index: 464
  text: 2.    umožní kontrolu a audit a
  style: '31'
- paragraph_index: 465
  text: 3.    zajistí důvěrnost a integritu kryptografických klíčů.
  style: '26'
- paragraph_index: 466
  text: § 26
  style: '12'
- paragraph_index: 467
  text: Zajišťování dostupnosti regulované služby
  style: '10'
- paragraph_index: 468
  text: (1)    Povinná osoba zavede bezpečnostní opatření pro zajišťování dostupnosti regulované služby, kterými zajistí
  style: '21'
- paragraph_index: 469
  text: a)    dostupnost regulované služby podle cílů stanovených podle § 15,
  style: '22'
- paragraph_index: 470
  text: b)    odolnost regulované služby vůči hrozbám a zranitelnostem, které by mohly snížit její dostupnost a
  style: '23'
- paragraph_index: 471
  text: c)    redundanci aktiv nezbytných pro zajišťování dostupnosti regulované služby.
  style: '24'
- paragraph_index: 472
  text: (2)    Povinná osoba pro zajišťování dostupnosti regulované služby v souladu s odstavcem 1 vytváří pravidelné zálohy konfigurací a nastavení technických aktiv, informací a dat nezbytných zejména pro účely obnovy regulované služby v případě kybernetického bezpečnostního incidentu.
  style: '28'
- paragraph_index: 473
  text: (3)    Povinná osoba u záloh vytvářených podle odstavce 2 zajistí
  style: '30'
- paragraph_index: 474
  text: a)    pravidelné testování jejich integrity, dostupnosti a obnovitelnosti,
  style: '22'
- paragraph_index: 475
  text: b)    dokumentování výsledků testů provedených podle odstavce 3 písm. a),
  style: '23'
- paragraph_index: 476
  text: c)    ochranu ukládaných záloh a dat v nich obsažených před narušením jejich integrity a důvěrnosti, a to alespoň šifrováním těchto záloh v souladu s § 25, a
  style: '23'
- paragraph_index: 477
  text: d)    ochranu ukládaných záloh a dat v nich obsažených před narušením jejich dostupnosti.
  style: '24'
- paragraph_index: 478
  text: (4)    Povinná osoba pro zajišťování dostupnosti regulované služby zajistí bezpečnou správu konfigurací a nastavení technických aktiv s ohledem na hodnocení těchto aktiv a hodnocení rizik.
  style: '28'
- paragraph_index: 479
  text: (5)    Povinná osoba za účelem omezení šíření kybernetického bezpečnostního incidentu a snížení jeho dopadu odděluje zálohovací prostředí od jiných prostředí podle § 18 písm. a).
  style: '30'
- paragraph_index: 480
  text: § 27
  style: '12'
- paragraph_index: 481
  text: Zabezpečení průmyslových, řídicích a obdobných specifických technických aktiv
  style: '10'
- paragraph_index: 482
  text: Povinná osoba včetně požadavků uvedených v § 3 až 26 pro zajištění kybernetické bezpečnosti průmyslových, řídicích a obdobných specifických technických aktiv dále využívá nástroje a zavádí bezpečnostní opatření, která zajistí
  style: '11'
- paragraph_index: 483
  text: a)    omezení fyzického přístupu k průmyslovým, řídicím a obdobným specifickým technickým aktivům,
  style: '13'
- paragraph_index: 484
  text: b)    omezení oprávnění k přístupu k průmyslovým, řídicím a obdobným specifickým technickým aktivům,
  style: '14'
- paragraph_index: 485
  text: c)    segmentaci a oddělení komunikačních sítí průmyslových, řídicích a obdobných specifických technických aktiv od jiných prostředí a segmentaci a oddělení těchto komunikačních sítí podle § 18,
  style: '14'
- paragraph_index: 486
  text: d)    omezení vzdálených přístupů a vzdálené správy průmyslových, řídicích a obdobných specifických technických aktiv, včetně omezení komunikace mimo komunikační síť povinné osoby,
  style: '14'
- paragraph_index: 487
  text: e)    ochranu jednotlivých průmyslových, řídicích a obdobných specifických technických aktiv před využitím známých zranitelností a hrozeb a
  style: '14'
- paragraph_index: 488
  text: f)    dostupnost a obnovu průmyslových, řídicích a obdobných specifických technických aktiv pro zajištění dostupnosti regulované služby.
  style: '15'
- paragraph_index: 489
  text: ČÁST TŘETÍ
  style: '7'
- paragraph_index: 490
