  text: Povinná osoba pro ochranu bezpečnosti komunikační sítě, a to včetně jejího síťového perimetru
  style: '11'
- paragraph_index: 312
  text: a)    zajistí a dokumentuje segmentaci komunikační sítě, včetně oddělení provozního, zálohovacího, vývojového, testovacího, administrátorského a jiného specifického prostředí,
  style: '13'
- paragraph_index: 313
  text: b)    zajistí řízení komunikace v rámci komunikační sítě,
  style: '14'
- paragraph_index: 314
  text: c)    zajistí řízení vzdáleného přístupu ke komunikační síti,
  style: '14'
- paragraph_index: 315
  text: d)    zajistí řízení vzdálené správy technických aktiv,
  style: '14'
- paragraph_index: 316
  text: e)    povoluje v souladu s písmeny b) až d) pouze takovou komunikaci, která je nezbytná pro řádné zajištění regulované služby,
