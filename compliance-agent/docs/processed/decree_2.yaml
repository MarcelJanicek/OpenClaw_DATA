  text: § 19
  style: '12'
- paragraph_index: 322
  text: Správa a ověřování identit
  style: '10'
- paragraph_index: 323
  text: (1)    Povinná osoba používá nástroj pro správu a ověření identity administrátorů, uživatelů a technických aktiv, který zajišťuje
  style: '21'
- paragraph_index: 324
  text: a)    ověření identity před zahájením jejich aktivit,
  style: '22'
