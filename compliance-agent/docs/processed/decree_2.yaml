  style: '24'
- paragraph_index: 374
  text: (2)    Povinná osoba používá s ohledem na vazby mezi aktivy pro detekci kybernetických bezpečnostních událostí centrálně spravovaný nástroj, který u jednotlivých relevantních technických aktiv zajišťuje
  style: '21'
- paragraph_index: 375
  text: a)    nepřetržitou a automatickou ochranu před škodlivým kódem,
