  style: '22'
- paragraph_index: 282
  text: b)    posuzuje soulad zavedených bezpečnostních opatření s právními předpisy, vnitřními předpisy, smluvními závazky a nejlepší praxí a
  style: '23'
- paragraph_index: 283
  text: c)    provádí a dokumentuje audit dodržování pravidel a postupů stanovených v bezpečnostní politice, včetně přezkoumání technické shody a dříve stanovených nápravných opatření podle odstavce 3 písm. b).
  style: '24'
- paragraph_index: 284
  text: (3)    Povinná osoba
  style: '21'
- paragraph_index: 285
  text: a)    zahrne výsledky auditu kybernetické bezpečnosti podle odstavce 2 do
  style: '27'
- paragraph_index: 286
  text: 1.    plánu rozvoje bezpečnostního povědomí,
  style: '25'
- paragraph_index: 287
  text: 2.    řízení rizik a
  style: '26'
- paragraph_index: 288
  text: b)    stanoví na základě výsledku auditu kybernetické bezpečnosti podle odstavce 2 případná nápravná opatření, která budou přijata bez zbytečného odkladu.
  style: '27'
- paragraph_index: 289
  text: (4)    Audit kybernetické bezpečnosti podle odstavce 2 je prováděn
  style: '21'
- paragraph_index: 290
  text: a)    při významných změnách, a to v rámci jejich rozsahu,
  style: '22'
- paragraph_index: 291
  text: b)    v pravidelných intervalech alespoň jednou za 2 roky a
  style: '23'
- paragraph_index: 292
  text: c)    v souladu s plánem auditu kybernetické bezpečnosti.
  style: '24'
- paragraph_index: 293
  text: (5)    Není-li v odůvodněných případech možné provést audit v celém rozsahu podle odstavce 2 ve lhůtě podle odstavce 4 písm. b), je možné audit kybernetické bezpečnosti provádět průběžně po systematických celcích tak, aby byl naplněn celý rozsah auditu podle odstavce 2 alespoň jednou za 5 let.
  style: '28'
- paragraph_index: 294
  text: (6)    Audit kybernetické bezpečnosti musí být prováděn osobou vyhovující podmínkám stanoveným v § 5 odst. 4, která nezávisle hodnotí správnost a účinnost zavedených bezpečnostních opatření.
  style: '30'
