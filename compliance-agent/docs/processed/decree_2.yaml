  style: '11'
- paragraph_index: 300
  text: a)    předchází poškození, odcizení, zneužití aktiv, neoprávněným zásahům do nich a narušení bezpečnosti poskytování regulované služby,
  style: '13'
- paragraph_index: 301
  text: b)    stanoví fyzický bezpečnostní perimetr ohraničující oblast, ve které jsou uchovávány nebo zpracovávány informace a data, nebo ve které jsou umístěna technická aktiva regulované služby,
  style: '14'
- paragraph_index: 302
  text: c)    rozdělí fyzické bezpečnostní perimetry stanovené podle písmene b) s ohledem na hodnocení umístěných technických aktiv do jednotlivých úrovní fyzické ochrany a tyto stanovené fyzické bezpečnostní perimetry a jejich úrovně fyzické ochrany dokumentuje a
  style: '14'
- paragraph_index: 303
  text: d)    přijme u každého fyzického bezpečnostního perimetru s ohledem na jeho úroveň fyzické ochrany stanovenou podle písmene c) relevantní bezpečnostní opatření fyzické ochrany
  style: '15'
- paragraph_index: 304
  text: 1.    k zamezení neoprávněnému vstupu,
  style: '18'
