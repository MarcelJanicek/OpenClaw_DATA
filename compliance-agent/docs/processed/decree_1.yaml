- paragraph_index: 211
  text: Příloha č. 2
  style: '33'
- paragraph_index: 212
  text: Požadavky na smluvní ujednání s dodavateli
  style: '34'
- paragraph_index: 213
  text: Povinná osoba uzavírá pouze takové smlouvy, které stanoví způsoby realizace bezpečnostních opatření a určují obsah vzájemné smluvní odpovědnosti za zavedení a kontrolu bezpečnostních opatření.
  style: '35'
- paragraph_index: 214
  text: 'Povinné osoby mohou uzavírat jen takové smlouvy, které budou zohledňovat následující relevantní ustanovení:'
  style: '36'
- paragraph_index: 215
  text: a)    ustanovení o bezpečnosti informací z pohledu důvěrnosti (včetně ustanovení o mlčenlivosti), integrity a dostupnosti,
  style: '12'
- paragraph_index: 216
  text: b)    ustanovení o auditu dodavatele související s plněním smlouvy,
  style: '15'
- paragraph_index: 217
  text: c)    ustanovení o řetězení dodavatelů,
  style: '15'
- paragraph_index: 218
  text: d)    ustanovení upravující tzv. exit strategii, podmínky ukončení smluvního vztahu z pohledu bezpečnosti informací,
  style: '15'
- paragraph_index: 219
  text: e)    ustanovení o sankcích za porušení smluvních povinností,
  style: '15'
- paragraph_index: 220
  text: f)    ustanovení o oprávnění užívat data,
  style: '15'
- paragraph_index: 221
  text: g)    ustanovení o autorství programového kódu, případně o programových licencích,
  style: '15'
- paragraph_index: 222
  text: h)    ustanovení o důvěrnosti smluvního vztahu,
  style: '15'
- paragraph_index: 223
  text: i)    ustanovení o povinnosti dodavatele dodržovat bezpečnostní politiky povinné osoby nebo ustanovení o odsouhlasení bezpečnostních politik dodavatele (nebo odsouhlasení pro dodavatelský vztah relevantních částí bezpečnostních politik) povinnou osobou,
  style: '15'
- paragraph_index: 224
  text: j)    ustanovení o řízení změn,
  style: '15'
- paragraph_index: 225
  text: k)    ustanovení o kybernetických bezpečnostních incidentech souvisejících s plněním smlouvy,
  style: '15'
- paragraph_index: 226
  text: l)    ustanovení upravující zajištění řízení kontinuity činností,
  style: '15'
- paragraph_index: 227
  text: m)    náležitosti smlouvy o úrovni služeb (SLA) a způsobu a úrovni realizace bezpečnostních opatření,
  style: '15'
- paragraph_index: 228
  text: n)    ustanovení o dodržování pravidel bezpečného vývoje.
  style: '13'
- paragraph_index: 229
  text: Povinná osoba může požadovat při uzavírání smluv s dodavateli i další ujednání zohledňující specifické požadavky plynoucí ze zajištění provozních a bezpečnostních potřeb souvisejících s regulovanou službou, která nejsou uvedena v této příloze.
  style: '37'
- paragraph_index: 230
  text: ''
  style: '1'
- paragraph_index: 231
  text: Příloha č. 3
  style: '33'
- paragraph_index: 232
  text: Témata pro rozvoj bezpečnostního povědomí
  style: '34'
- paragraph_index: 233
  text: a)    Techniky zabezpečení zařízení.
  style: '12'
- paragraph_index: 234
  text: b)    Firewall, antivirový program a jejich omezení.
  style: '15'
- paragraph_index: 235
  text: c)    Škodlivé programy a jejich projevy.
  style: '15'
- paragraph_index: 236
  text: d)    Rizika stahování programů a aplikací.
  style: '15'
- paragraph_index: 237
  text: e)    Aktualizace software.
  style: '15'
- paragraph_index: 238
  text: f)    Rizika povolení a zakázání spouštění maker.
  style: '15'
- paragraph_index: 239
  text: g)    Rizika spustitelných souborů.
  style: '15'
- paragraph_index: 240
  text: h)    Zásady zabezpečení uživatelských účtů.
  style: '15'
- paragraph_index: 241
  text: i)    Používání, tvorba a správa hesel.
  style: '15'
- paragraph_index: 242
  text: j)    Vícefaktorová autentizace.
  style: '15'
- paragraph_index: 243
  text: k)    Techniky sociálního inženýrství.
  style: '15'
- paragraph_index: 244
  text: l)    On-line identita, digitální stopa a její minimalizace.
  style: '15'
- paragraph_index: 245
  text: m)    Zásady práce v počítačové síti.
  style: '15'
- paragraph_index: 246
  text: n)    Používání vzdáleného připojení (VPN).
  style: '15'
- paragraph_index: 247
  text: o)    Bezpečná elektronická komunikace.
  style: '15'
- paragraph_index: 248
  text: p)    Bezpečnost webových stránek.
  style: '15'
- paragraph_index: 249
  text: q)    Zálohování, ukládání a šifrování dat.
  style: '15'
- paragraph_index: 250
  text: r)    Bezpečné používání přenosných technických nosičů dat.
  style: '15'
- paragraph_index: 251
  text: s)    Využívání služeb cloud computingu.
  style: '15'
- paragraph_index: 252
  text: t)    Pravidla a postupy pro oznamování neobvyklého chování technických aktiv a podezření na jakékoliv zranitelnosti.
  style: '15'
- paragraph_index: 253
  text: u)    Základní postup při reakci na kybernetickou bezpečnostní událost nebo kybernetický bezpečnostní incident.
  style: '15'
- paragraph_index: 254
  text: v)    Zásady bezpečného používání pracovních zařízení pro soukromé účely.
  style: '15'
- paragraph_index: 255
  text: w)    Zásady bezpečného používání soukromých zařízení pro pracovní účely (tzv. BYOD).
  style: '15'
- paragraph_index: 256
  text: x)    Osobní odpovědnost zaměstnance při dodržování zásad kybernetické bezpečnosti.
  style: '15'
- paragraph_index: 257
  text: y)    Aktuální hrozby v kybernetické bezpečnosti.
  style: '13'
