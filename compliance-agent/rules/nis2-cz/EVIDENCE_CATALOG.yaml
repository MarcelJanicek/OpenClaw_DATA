meta:
  ruleset_id: "nis2-cz"
  version: "2.0"
  description: >
    Evidence Artifact Catalog for the NIS2-CZ ruleset.
    Defines canonical artifact IDs referenced in evidence_hints across all rule parts.
    Each artifact has a human-readable label, description, and the rule IDs that require it.
  last_updated: "2026-03-10"

artifacts:
  # ==================================================================
  # 00 — Foundations
  # ==================================================================
  - artifact_id: "FOUND-SCOPE-ASSESSMENT"
    label: "Scope Assessment Document"
    label_cs: "Dokument posouzení rozsahu"
    description: >
      Document recording entity profile, services, in-scope hypothesis,
      and evidence sources used for initial scoping assessment.
    format_hints:
      - "DOCX/PDF document or structured form"
    referenced_by:
      - "NIS2CZ-FOUNDATIONS-SCOPE"

  - artifact_id: "FOUND-SERVICE-CATALOG"
    label: "Service Catalog"
    label_cs: "Katalog služeb"
    description: >
      Full catalog of services the entity provides, used as input
      for scoping and regulated service identification.
    format_hints:
      - "Spreadsheet or CMDB export"
    referenced_by:
      - "NIS2CZ-FOUNDATIONS-SCOPE"
      - "NIS2CZ-SCOPING-REGULATED-SERVICES-REGISTER"

  - artifact_id: "FOUND-ORG-CHART"
    label: "Organization Chart"
    label_cs: "Organizační schéma"
    description: >
      Current organizational chart showing reporting lines and
      cybersecurity-relevant roles.
    format_hints:
      - "Diagram (PDF/PNG) or structured document"
    referenced_by:
      - "NIS2CZ-FOUNDATIONS-SCOPE"
      - "NIS2CZ-GOV-ROLES-RESPONSIBILITIES-MATRIX"

  - artifact_id: "FOUND-EVIDENCE-REGISTER"
    label: "Evidence Artifact Register"
    label_cs: "Registr důkazních artefaktů"
    description: >
      Master register of all compliance evidence artifacts with taxonomy,
      naming convention, owners, retention, and rule-to-artifact mapping.
    format_hints:
      - "Spreadsheet or structured database export"
    referenced_by:
      - "NIS2CZ-FOUNDATIONS-EVIDENCE-REGISTER"
      - "NIS2CZ-OVERSIGHT-SUPERVISORY-READINESS"

  - artifact_id: "FOUND-DOCUMENT-REGISTER"
    label: "Document Register"
    label_cs: "Registr dokumentů"
    description: >
      General document register for the organization's management system.
    format_hints:
      - "Spreadsheet or DMS export"
    referenced_by:
      - "NIS2CZ-FOUNDATIONS-EVIDENCE-REGISTER"

  - artifact_id: "FOUND-RECORDS-MGMT-POLICY"
    label: "Records Management Policy"
    label_cs: "Politika správy záznamů"
    description: >
      Policy governing record creation, retention, and disposal.
    format_hints:
      - "Policy document (DOCX/PDF)"
    referenced_by:
      - "NIS2CZ-FOUNDATIONS-EVIDENCE-REGISTER"

  # ==================================================================
  # 01 — Scoping
  # ==================================================================
