  severity: high
  sources:
  - citation: CZ-Decree-409-2025 §9(1)(f)
  - citation: CZ-Decree-409-2025 Příloha č. 5 – Řízení dodavatelů – bezpečnostní opatření pro smluvní vztahy (items a–r)
- id: NIS2CZ-SUP-CONTRACT-ANNEX2-LOWER
  title: 'Contracts with suppliers contain required security clauses per Příloha č. 2 of Vyhl. 410/2025 (lower regime)

    '
  scope:
    applies_to:
    - contracts
    duty_regime:
    - lower
    in_scope_under_cz_law: true
  requirement:
    type: annex_checklist
    logic: ALL_RELEVANT
    note: 'Each item must be addressed in contracts where relevant. Applicability is determined per contract context. Document justification for any item marked not applicable.

      '
    checklist:
    - id: ANN2-a
      title_cs: Ustanovení o bezpečnosti informací z pohledu důvěrnosti (včetně ustanovení o mlčenlivosti), integrity a dostupnosti
      title_en: Information security clause – confidentiality (incl. NDA), integrity, availability
      required_by_default: true
      acceptance_criteria:
      - Contract addresses confidentiality and NDA
      - Integrity requirements stated
      - Availability / continuity obligations included
      keywords_cs:
      - důvěrnost
      - mlčenlivost
      - integrita
      - dostupnost
      - bezpečnost informací
      keywords_en:
      - confidentiality
      - NDA
      - integrity
      - availability
      - information security
      red_flags:
      - No CIA requirements in contract
    - id: ANN2-b
      title_cs: Ustanovení o auditu dodavatele související s plněním smlouvy
      title_en: Supplier audit rights clause related to contract performance
      required_by_default: true
      acceptance_criteria:
      - Customer has right to audit supplier compliance with contract obligations
      - Audit scope, notice, and process defined
      keywords_cs:
      - audit
      - kontrola
      - právo auditu
      - plnění smlouvy
      keywords_en:
      - audit rights
      - right to audit
      - contract audit
      - audit clause
      red_flags:
      - No audit rights
      - Supplier can refuse audit
    - id: ANN2-c
      title_cs: Ustanovení o řetězení dodavatelů
      title_en: Supplier chaining / subcontracting clause
      required_by_default: true
      acceptance_criteria:
      - Subcontracting is regulated (permitted only with consent or notification)
      - Security obligations flow down to subcontractors
      keywords_cs:
      - řetězení dodavatelů
      - subdodavatelé
      - subdodávky
      keywords_en:
      - supplier chaining
      - subcontracting
      - subcontractors
      - flowdown
      red_flags:
      - Unrestricted subcontracting without security flowdown
    - id: ANN2-d
      title_cs: Ustanovení upravující tzv. exit strategii, podmínky ukončení smluvního vztahu z pohledu bezpečnosti informací
      title_en: Exit strategy clause – termination conditions from information security perspective
      required_by_default: true
      acceptance_criteria:
      - Data return or destruction on termination is specified
      - Transition/handover period and security obligations during it are defined
      keywords_cs:
      - exit strategie
      - ukončení
      - bezpečnost informací
      - přechod
      keywords_en:
      - exit strategy
      - termination
      - information security
      - transition
      red_flags:
      - No exit strategy
      - Data fate on termination unspecified
    - id: ANN2-e
      title_cs: Ustanovení o sankcích za porušení smluvních povinností
      title_en: Sanctions for breach of contractual obligations
      required_by_default: true
      acceptance_criteria:
      - Financial or other sanctions defined for breach of security obligations
      keywords_cs:
      - sankce
      - porušení
      - smluvní pokuta
      - penále
      keywords_en:
      - sanctions
      - penalties
      - breach
      - liquidated damages
      red_flags:
      - No sanctions for security breaches
    - id: ANN2-f
      title_cs: Ustanovení o oprávnění užívat data
      title_en: Data use rights clause
      required_by_default: true
      acceptance_criteria:
      - Data use rights and limitations clearly defined
      - Supplier cannot use data for purposes beyond contract
      keywords_cs:
      - oprávnění
      - data
      - užívání dat
      - zpracování
      keywords_en:
      - data use rights
      - data processing rights
      - data entitlement
      red_flags:
      - No data use rights clause
    - id: ANN2-g
      title_cs: Ustanovení o autorství programového kódu, případně o programových licencích
      title_en: Code ownership and/or software licence clause
      required_by_default: false
      applicability: Required when supplier develops or delivers software/code
      acceptance_criteria:
      - IP/code ownership is clearly assigned
      - Software licence type and scope are specified
      keywords_cs:
      - autorství
      - programový kód
      - licence
      - software
      - IP
      keywords_en:
      - code ownership
      - software licence
      - IP
      - source code
      red_flags:
      - Code ownership unresolved despite software delivery scope
    - id: ANN2-h
      title_cs: Ustanovení o důvěrnosti smluvního vztahu
      title_en: Contract confidentiality clause
      required_by_default: true
      acceptance_criteria:
      - Contract terms themselves are treated as confidential
      - Obligations not to disclose contract terms to third parties stated
      keywords_cs:
      - důvěrnost
      - smlouva
      - mlčenlivost
      - smluvní vztah
      keywords_en:
      - contract confidentiality
      - NDA
      - non-disclosure
      - contract terms confidential
      red_flags:
      - No contract confidentiality obligations
    - id: ANN2-i
      title_cs: Ustanovení o povinnosti dodavatele dodržovat bezpečnostní politiky povinné osoby nebo o odsouhlasení bezpečnostních politik dodavatele
      title_en: Security policy compliance / alignment clause
      required_by_default: true
      acceptance_criteria:
      - Supplier required to comply with customer security policies, OR
      - Supplier security policies reviewed and accepted by customer
      keywords_cs:
      - bezpečnostní politiky
      - soulad
      - odsouhlasení
      keywords_en:
      - security policies
      - policy compliance
      - policy alignment
      red_flags:
      - No security policy obligations
    - id: ANN2-j
      title_cs: Ustanovení o řízení změn
      title_en: Change management clause
      required_by_default: true
      acceptance_criteria:
      - Change management process defined in contract
      - Security impact of changes must be assessed
      keywords_cs:
      - řízení změn
      - změny
      - schválení
      keywords_en:
      - change management
      - change control
      red_flags:
      - No change management clause
    - id: ANN2-k
      title_cs: Ustanovení o kybernetických bezpečnostních incidentech souvisejících s plněním smlouvy
      title_en: Cyber security incident notification clause
      required_by_default: true
      acceptance_criteria:
      - Supplier must notify customer of security incidents related to contract performance
      - Notification timelines and escalation paths are defined
      keywords_cs:
      - kybernetický incident
      - bezpečnostní incident
      - hlášení
      - notifikace
      keywords_en:
      - cyber security incident
      - incident notification
      - incident reporting
      red_flags:
      - No incident notification obligation
    - id: ANN2-l
      title_cs: Ustanovení upravující zajištění řízení kontinuity činností
      title_en: Business continuity management clause
      required_by_default: true
      acceptance_criteria:
      - Supplier has business continuity obligations
      - BCM/DRP requirements for supplier are included
      keywords_cs:
      - kontinuita
      - obnova
      - BCP
      - plán kontinuity
      keywords_en:
      - business continuity
      - BCM
      - DRP
      - recovery
      red_flags:
      - No business continuity obligations for supplier
    - id: ANN2-m
      title_cs: Náležitosti smlouvy o úrovni služeb (SLA) a způsobu a úrovni realizace bezpečnostních opatření
      title_en: SLA clause – service levels and security measure implementation
      required_by_default: true
      acceptance_criteria:
      - SLA with measurable service levels is included
      - Security measure implementation levels are specified
      keywords_cs:
      - SLA
      - úroveň služeb
      - bezpečnostní opatření
      keywords_en:
      - SLA
      - service level agreement
      - security measures
      red_flags:
      - No SLA defined
    - id: ANN2-n
      title_cs: Ustanovení o dodržování pravidel bezpečného vývoje
      title_en: Secure development rules compliance clause
      required_by_default: false
      applicability: Required when supplier develops or maintains software
      acceptance_criteria:
      - Secure development lifecycle requirements referenced
      - Specific standards or practices (e.g. OWASP) named
      keywords_cs:
      - bezpečný vývoj
      - secure coding
      - SDLC
      keywords_en:
      - secure development
      - secure coding
      - SDLC
      - software security
      red_flags:
      - No secure development requirements despite software scope
