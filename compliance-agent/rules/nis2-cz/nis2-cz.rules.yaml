meta:
  ruleset_id: nis2-cz
  version: 1.0-pilot
  status: complete
  jurisdiction:
  - CZ
  evaluation_profile_schema: rules/nis2-cz/entity_profile.schema.yaml
  sources:
  - name: Zákon č. 264/2025 Sb., o kybernetické bezpečnosti
    ref: CZ-Act-264-2025
  - name: Vyhláška č. 408/2025 Sb., o regulovaných službách
    ref: CZ-Decree-408-2025
  - name: Vyhláška č. 409/2025 Sb. (vyšší povinnosti)
    ref: CZ-Decree-409-2025
  - name: Vyhláška č. 410/2025 Sb. (nižší povinnosti)
    ref: CZ-Decree-410-2025
  - name: Vyhláška č. 334/2025 Sb. (Portál NÚKIB + úkony)
    ref: CZ-Decree-334-2025
  - name: NIS2 Directive (EU) 2022/2555 (reference only)
    ref: EU-NIS2-2022-2555
rules:
- id: NIS2CZ-FOUNDATIONS-SCOPE
  title: Assessment scope and entity profile are documented
  scope:
    applies_to:
    - org
  requirement:
    type: document_required
    document: nis2cz_scope_assessment
    must_include:
    - entity_profile (sector/subsector/size)
    - services_provided
    - initial_in_scope_hypothesis
    - evidence_sources_used
  evidence_hints:
    required:
    - nis2cz_scope_assessment
    artifacts:
    - nis2cz_scope_assessment
    - service_catalog
    - org_chart
  severity: high
  sources:
  - citation: CZ-Act-264-2025 §1 (předmět úpravy)
  - citation: CZ-Act-264-2025 §2 (vymezení pojmů; aktiva/služby)
- id: NIS2CZ-FOUNDATIONS-EVIDENCE-REGISTER
  title: Evidence artifact taxonomy and register are maintained
  scope:
    applies_to:
    - org
  requirement:
    type: document_required
    document: nis2cz_evidence_register
    must_include:
    - artifact_taxonomy (types + definitions)
    - artifact_naming_convention
    - artifact_owner_per_type
    - retention_or_location_per_type
    - mapping_to_rules (rule_id -> evidence artifacts)
  evidence_hints:
    required:
    - nis2cz_evidence_register
    artifacts:
    - nis2cz_evidence_register
    - document_register
    - records_management_policy
  severity: medium
  sources:
  - citation: CZ-Act-264-2025 (governance/documentation expectations for cybersecurity measures)
- id: NIS2CZ-SCOPING-IN-SCOPE-DECISION
  title: In-scope decision under CZ Cybersecurity Act is documented and approved
  scope:
    applies_to:
    - org
  requirement:
    type: decision_record_required
    decision: cz_in_scope_determination
    must_include:
    - legal_basis_summary (why the org is / is not regulated)
    - regulated_service_identification (if applicable)
    - assumptions_and_data_used (size, services, sector)
    - approval_by_responsible_person
    - review_date_or_trigger
  evidence_hints:
    required:
    - cz_in_scope_determination
    artifacts:
    - cz_in_scope_determination
    - service_catalog
    - contract_catalog
    - company_registry_extract
  severity: high
  sources:
  - citation: CZ-Act-264-2025 (scope / regulated entities)
  - citation: 'EU-NIS2-2022-2555 (mapping: entity scope)'
- id: NIS2CZ-SCOPING-ENTITY-CLASS-ESSENTIAL-IMPORTANT
  title: Entity class (essential/important) is determined and recorded
  scope:
    applies_to:
    - org
  requirement:
    type: decision_record_required
    decision: cz_entity_classification
    must_include:
    - entity_class (essential|important)
    - classification_criteria_used
    - regulated_service_or_sector_reference
    - any_exemptions_or_special_cases
    - approval_by_responsible_person
  evidence_hints:
    required:
    - cz_entity_classification
    artifacts:
    - cz_entity_classification
    - cz_in_scope_determination
    - sector_mapping
  severity: high
  sources:
  - citation: CZ-Act-264-2025 (essential vs important entities)
  - citation: 'EU-NIS2-2022-2555 (mapping: essential/important entities)'
- id: NIS2CZ-SCOPING-DUTY-REGIME-HIGHER-LOWER
  title: Applicable duty regime (higher/lower) is determined per CZ decrees
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: decision_record_required
    decision: cz_duty_regime_determination
    must_include:
    - duty_regime (higher|lower)
    - rationale_and_criteria
    - links_to_applicable_measures_sets
    - date_effective
  evidence_hints:
    required:
    - cz_duty_regime_determination
    artifacts:
    - cz_duty_regime_determination
    - control_applicability_matrix
  severity: high
  sources:
  - citation: CZ-Decree-409-2025 (higher duties)
  - citation: CZ-Decree-410-2025 (lower duties)
  - citation: CZ-Act-264-2025 (delegation to implementing decrees)
- id: NIS2CZ-SCOPING-REGULATED-SERVICES-REGISTER
  title: Register of regulated services (if applicable) is maintained
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: document_required
    document: cz_regulated_services_register
    must_include:
    - regulated_service_type (per CZ decree)
    - service_owner
    - service_description
    - service_criticality_or_importance
    - service_dependencies (key ICT assets/providers)
    - link_to_service_catalog_entries
  evidence_hints:
    required:
    - cz_regulated_services_register
    artifacts:
    - cz_regulated_services_register
    - service_catalog
    - asset_inventory
    - dependency_map
  severity: medium
  sources:
  - citation: CZ-Decree-408-2025 (regulated services definitions/list)
  - citation: CZ-Act-264-2025 (regulated services / obligations trigger)
- id: NIS2CZ-GOV-MGMT-ACCOUNTABILITY
  title: Top management accountability and oversight for cybersecurity measures are established
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: governance_required
    must_include:
    - assignment_of_accountability (who in top management is accountable)
    - governance_forum_or_reporting_line (how cyber risk is reported to management)
    - approval_of_cybersecurity_measures_and_policies (formal approval evidence)
    - periodic_management_review (cadence + agenda)
    - resource_commitment (budget/staffing decision trail)
  evidence_hints:
    required:
    - board_or_management_resolution_cybersecurity
    - management_review_minutes_cyber
    artifacts:
    - board_or_management_resolution_cybersecurity
    - management_review_minutes_cyber
    - cybersecurity_governance_charter
    - risk_register_summary_for_management
    - budget_approval_records
  severity: high
  sources:
  - citation: CZ-Act-264-2025 (odpovědnost vedení za zavedení a udržování opatření kybernetické bezpečnosti)
  - citation: CZ-Decree-409-2025 (organizační opatření – vyšší povinnosti; governance/odpovědnosti)
  - citation: CZ-Decree-410-2025 (organizační opatření – nižší povinnosti; governance/odpovědnosti)
  - citation: EU-NIS2-2022-2555 Art. 20 (management bodies responsibilities) [mapping]
- id: NIS2CZ-GOV-POLICY-FRAMEWORK
  title: Cybersecurity policy framework is documented, approved, and maintained
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: policy_framework_required
    must_include:
    - policy_register (list of policies/standards/procedures)
    - ownership (policy owner for each document)
    - versioning_and_change_control
    - review_cycle (at least annual or trigger-based)
    - communication_and_accessibility (how policies are published internally)
    - alignment_to_applicable_duty_regime (higher|lower)
    minimum_policy_topics:
    - risk_management
    - asset_management_and_classification
    - access_control_and_identity
    - logging_and_monitoring
    - vulnerability_and_patch_management
    - backup_and_resilience
    - incident_handling_and_reporting
    - supplier_and_third_party_management
    - secure_change_management
  evidence_hints:
    required:
    - cybersecurity_policy
    - policy_register
    artifacts:
    - cybersecurity_policy
    - policy_register
    - document_control_procedure
    - intranet_policy_portal_screenshot
    - exceptions_register
  severity: high
  sources:
  - citation: CZ-Act-264-2025 (povinnost zavést a dokumentovat opatření kybernetické bezpečnosti)
  - citation: CZ-Decree-409-2025 (soubor opatření – vyšší povinnosti)
  - citation: CZ-Decree-410-2025 (soubor opatření – nižší povinnosti)
  - citation: EU-NIS2-2022-2555 Art. 21(2) (policies for risk analysis and information system security) [mapping]
- id: NIS2CZ-GOV-ROLES-RESPONSIBILITIES-MATRIX
  title: Cybersecurity roles and responsibilities are defined and traceable to key processes
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: document_required
    document: cybersecurity_roles_responsibilities_matrix
    must_include:
    - process_list (e.g., incident handling, vuln mgmt, access reviews, backup, supplier onboarding)
    - role_assignments (RACI or equivalent)
    - approval_and_effective_date
    - handover_or_backup_roles (coverage during absence)
  evidence_hints:
    required:
    - cybersecurity_roles_responsibilities_matrix
    artifacts:
    - cybersecurity_roles_responsibilities_matrix
    - job_descriptions_security
    - org_chart
    - on_call_roster
  severity: medium
  sources:
  - citation: CZ-Decree-409-2025 (organizační opatření – role/odpovědnosti)
  - citation: CZ-Decree-410-2025 (organizační opatření – role/odpovědnosti)
  - citation: EU-NIS2-2022-2555 Art. 21(2) (organizational measures) [mapping]
- id: NIS2CZ-GOV-TRAINING-AWARENESS
  title: Cybersecurity training and awareness program is implemented and evidenced
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: program_required
    program: cybersecurity_training_and_awareness
    must_include:
    - audience_definition (roles/groups incl. privileged users and management)
    - mandatory_training_topics (baseline cyber hygiene + role-based)
    - onboarding_training
    - periodic_refresh (cadence)
    - awareness_activities (e.g., comms, campaigns, simulations)
    - training_completion_tracking (records + reporting)
    - effectiveness_check (e.g., quiz/phishing simulation metrics)
  evidence_hints:
    required:
    - security_training_plan
    - security_training_records
    artifacts:
    - security_training_plan
    - security_training_records
    - learning_management_system_export
    - awareness_campaign_materials
    - phishing_simulation_report
    - management_training_attendance
  severity: medium
  sources:
  - citation: CZ-Act-264-2025 (povinnost zavést a udržovat opatření kybernetické bezpečnosti; personální zajištění)
  - citation: CZ-Decree-409-2025 (organizační/personální opatření – školení a zvyšování povědomí)
  - citation: CZ-Decree-410-2025 (organizační/personální opatření – školení a zvyšování povědomí)
  - citation: EU-NIS2-2022-2555 Art. 20 (management bodies training/awareness) [mapping]
  - citation: EU-NIS2-2022-2555 Art. 21(2)(g) (basic cyber hygiene and training) [mapping]
- id: NIS2CZ-GOV-INTERNAL-AUDIT
  title: Internal audit / self-assessment of cybersecurity measures is performed and tracked
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: process_required
    process: cybersecurity_internal_audit
    must_include:
    - audit_plan_or_schedule (at least annual or risk/incident-triggered)
    - audit_scope_definition (controls/measures covered; higher/lower regime)
    - independence_or_objectivity (who audits whom; external support if needed)
    - findings_classification_and_risk_rating
    - corrective_actions_tracking (owners, due dates, status)
    - management_reporting_of_results
  evidence_hints:
    required:
    - cybersecurity_audit_plan
    - cybersecurity_audit_report
    artifacts:
    - cybersecurity_audit_plan
    - cybersecurity_audit_report
    - corrective_actions_register
    - management_review_minutes_cyber
    - internal_control_testing_workpapers
  severity: medium
  sources:
  - citation: CZ-Act-264-2025 (průběžné zajišťování a ověřování účinnosti opatření kybernetické bezpečnosti)
  - citation: CZ-Decree-409-2025 (požadavky na ověřování/posuzování účinnosti opatření – vyšší povinnosti)
  - citation: CZ-Decree-410-2025 (požadavky na ověřování/posuzování účinnosti opatření – nižší povinnosti)
  - citation: EU-NIS2-2022-2555 Art. 21(2) (monitoring, testing and auditing) [mapping]
- id: NIS2CZ-RISK-ASSET-INVENTORY
  title: Comprehensive ICT asset inventory is maintained and kept current
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: document_required
    document: ict_asset_inventory
    must_include:
    - asset_identifier
    - asset_type (hardware|software|service|cloud|network|data_store)
    - asset_owner
    - asset_location_or_environment (onprem|cloud|saas)
    - asset_criticality
    - links_to_regulated_services (if applicable)
    - last_review_date
  evidence_hints:
    required:
    - ict_asset_inventory
    artifacts:
    - ict_asset_inventory
    - cmdb_export
    - cloud_account_inventory
    - network_diagrams
  severity: high
  sources:
  - citation: 'CZ-Decree-409-2025 (higher duties: asset management / evidence)'
  - citation: 'CZ-Decree-410-2025 (lower duties: asset management / evidence)'
  - citation: 'EU-NIS2-2022-2555 Art. 21 (mapping: risk-management measures)'
- id: NIS2CZ-RISK-ASSET-OWNERSHIP
  title: Asset ownership and responsibility is assigned for ICT assets
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: document_required
    document: asset_ownership_model
    must_include:
    - roles_and_responsibilities (owner|custodian|administrator)
    - assignment_method (how owners are set/updated)
    - accountability_for_risk_acceptance
    - linkage_to_inventory_fields
  evidence_hints:
    required:
    - asset_ownership_model
    artifacts:
    - asset_ownership_model
    - ict_asset_inventory
    - raci_matrix
  severity: medium
  sources:
  - citation: CZ-Act-264-2025 (governance/accountability for cybersecurity measures)
  - citation: CZ-Decree-409-2025 (organizational measures)
  - citation: 'EU-NIS2-2022-2555 Art. 20–21 (mapping: governance + measures)'
- id: NIS2CZ-RISK-ASSET-CLASSIFICATION-SCHEME
  title: Information and asset classification scheme is defined and approved
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: document_required
    document: information_and_asset_classification_policy
    must_include:
    - classification_levels
    - classification_criteria (confidentiality|integrity|availability|legal)
    - labeling_and_handling_rules
    - review_cycle
    - exceptions_process
  evidence_hints:
    required:
    - information_and_asset_classification_policy
    artifacts:
    - information_and_asset_classification_policy
    - data_handling_standard
    - records_management_policy
  severity: high
  sources:
  - citation: 'CZ-Decree-409-2025 (higher duties: classification/handling expectations)'
  - citation: 'CZ-Decree-410-2025 (lower duties: baseline classification/handling)'
  - citation: 'EU-NIS2-2022-2555 Art. 21 (mapping: policies/procedures; asset mgmt)'
- id: NIS2CZ-RISK-ASSET-CLASSIFICATION-REGISTER
  title: Assets and key information types are classified according to the approved scheme
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: document_required
    document: asset_and_information_classification_register
    must_include:
    - reference_to_classification_scheme
    - classification_per_asset_or_information_type
    - handling_requirements_per_class
    - owner_approval_or_acknowledgement
  evidence_hints:
    required:
    - asset_and_information_classification_register
    artifacts:
    - asset_and_information_classification_register
    - ict_asset_inventory
    - data_inventory
    - dpa_or_gdpr_records (if applicable)
  severity: medium
  sources:
  - citation: 'CZ-Decree-409-2025 (higher duties: classification applied in practice)'
  - citation: 'CZ-Decree-410-2025 (lower duties: classification applied in practice)'
  - citation: 'EU-NIS2-2022-2555 Art. 21 (mapping: asset management and policies)'
- id: NIS2CZ-RISK-ASSET-LIFECYCLE
  title: ICT asset lifecycle processes (acquire/change/decommission) are defined and followed
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: document_required
    document: ict_asset_lifecycle_process
    must_include:
    - procurement_or_onboarding_controls
    - configuration_baseline_or_hardening_reference
    - change_tracking_or_change_approval
    - secure_decommissioning_and_data_disposal
    - inventory_update_step
  evidence_hints:
    required:
    - ict_asset_lifecycle_process
    artifacts:
    - ict_asset_lifecycle_process
    - procurement_policy
    - change_tickets
    - decommission_records
  severity: medium
  sources:
  - citation: 'CZ-Decree-409-2025 (higher duties: lifecycle/change controls)'
  - citation: 'CZ-Decree-410-2025 (lower duties: lifecycle controls)'
  - citation: 'EU-NIS2-2022-2555 Art. 21 (mapping: supply chain/change mgmt measures)'
- id: NIS2CZ-RISK-ACCESS-CONTROL-POLICY
  title: Access control and identity management policy is defined, approved, and enforced
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: document_required
    document: access_control_and_identity_policy
    must_include:
    - principles (least_privilege, need_to_know, separation_of_duties)
    - account_types (user|admin|service|shared) and handling rules
    - authentication_requirements (password, mfa, sso where applicable)
    - authorization_model (rbac/abac) and exception handling
    - remote_access_requirements
    - periodic_access_review_requirements
    - logging_requirements_for_access_events
    - review_cycle
  evidence_hints:
    required:
    - access_control_and_identity_policy
    artifacts:
    - access_control_and_identity_policy
    - policy_register
    - access_control_standard
    - remote_access_standard
  severity: high
  sources:
  - citation: CZ-Act-264-2025 (povinnost zavést a dokumentovat opatření kybernetické bezpečnosti)
  - citation: 'CZ-Decree-409-2025 (vyšší povinnosti: přístupová práva, autentizace, evidence)'
  - citation: 'CZ-Decree-410-2025 (nižší povinnosti: přístupová práva, autentizace, evidence)'
  - citation: EU-NIS2-2022-2555 Art. 21(2)(b)(d) (access control, authentication) [mapping]
- id: NIS2CZ-RISK-IDENTITY-JOINER-MOVER-LEAVER
  title: Joiner-mover-leaver process controls user provisioning and deprovisioning
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: process_required
    process: identity_lifecycle_management
    must_include:
    - access_request_and_approval (manager + asset/application owner)
    - role_change_handling (timeliness, approvals, documentation)
    - termination_and_deprovisioning (defined SLA; immediate for high-risk roles)
    - service_account_creation_controls
    - recordkeeping (who approved what, when)
  evidence_hints:
    required:
    - identity_lifecycle_procedure
    - access_request_records
    artifacts:
    - identity_lifecycle_procedure
    - access_request_records
    - hr_termination_records (redacted)
    - idm_system_logs_or_exports
  severity: high
  sources:
  - citation: 'CZ-Decree-409-2025 (vyšší povinnosti: řízení přístupů; zřizování/rušení účtů)'
  - citation: 'CZ-Decree-410-2025 (nižší povinnosti: řízení přístupů; zřizování/rušení účtů)'
  - citation: EU-NIS2-2022-2555 Art. 21(2)(b) (access control) [mapping]
- id: NIS2CZ-RISK-ACCESS-PRIVILEGED
  title: Privileged access is controlled, minimized, and monitored
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: process_required
    process: privileged_access_management
    must_include:
    - privileged_role_definition_and_inventory
    - separate_admin_accounts_or_elevation_mechanism
    - mfa_for_privileged_access
    - break_glass_accounts (controls + logging + periodic test)
    - session_or_command_logging for privileged actions where feasible
  evidence_hints:
    required:
    - privileged_access_inventory
    - pam_controls_evidence
    artifacts:
    - privileged_access_inventory
    - pam_controls_evidence
    - admin_account_list
    - break_glass_procedure
    - privileged_session_logs
  severity: high
  sources:
  - citation: 'CZ-Decree-409-2025 (vyšší povinnosti: řízení privilegovaných přístupů, evidence)'
  - citation: 'CZ-Decree-410-2025 (nižší povinnosti: řízení privilegovaných přístupů, evidence)'
  - citation: EU-NIS2-2022-2555 Art. 21(2)(b)(d) (access control, MFA) [mapping]
- id: NIS2CZ-RISK-ACCESS-REVIEWS
  title: Periodic access reviews are performed for critical systems and regulated services
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: process_required
    process: access_review
    must_include:
    - review_scope (critical systems, privileged roles, regulated services)
    - review_frequency (e.g., quarterly for privileged; at least annually otherwise)
    - review_method (owner attestation + removal workflow)
    - tracking_of_removals_and_exceptions
    - evidence_retention
  evidence_hints:
    required:
    - access_review_records
    artifacts:
    - access_review_records
    - idm_access_reports
    - application_access_lists
    - exceptions_register
  severity: medium
  sources:
  - citation: 'CZ-Decree-409-2025 (vyšší povinnosti: pravidelné ověřování přístupových práv)'
  - citation: 'CZ-Decree-410-2025 (nižší povinnosti: ověřování přístupových práv)'
  - citation: EU-NIS2-2022-2555 Art. 21(2)(b) (access control) [mapping]
- id: NIS2CZ-RISK-LOGGING-BASELINE
  title: Security-relevant logging is enabled and a logging baseline is defined
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: document_required
    document: security_logging_baseline
    must_include:
    - systems_in_scope (critical systems, regulated services, key infrastructure)
    - event_types (auth events, privilege changes, admin actions, security alerts)
    - log_sources_and_ownership
    - time_synchronization_requirement
    - log_retention_and_protection (tamper resistance, access control)
