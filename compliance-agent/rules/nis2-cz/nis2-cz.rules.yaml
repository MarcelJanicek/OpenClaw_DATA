    - id: ANN5-p
      title_cs: Ustanovení o právu jednostranně odstoupit od smlouvy bez výpovědní doby při významné změně kontroly nad dodavatelem nebo aktiv
      title_en: Unilateral termination right on significant ownership or asset control change
      required_by_default: true
      acceptance_criteria:
      - Customer has explicit right to terminate without notice period if supplier undergoes significant ownership change
      - Significant change of control over key assets used in contract delivery triggers termination right
      keywords_cs:
      - odstoupit od smlouvy
      - výpovědní doba
      - změna kontroly
      - změna vlastnictví
      keywords_en:
      - termination right
      - no notice period
      - change of control
      - ownership change
      red_flags:
      - No termination right on supplier ownership change
      - Termination requires full notice period even on hostile ownership change
    - id: ANN5-q
      title_cs: Ustanovení o sankcích za porušení povinností
      title_en: Sanctions / penalties clause for breach of obligations
      required_by_default: true
      acceptance_criteria:
      - Contract defines financial or other sanctions for breach of security or contractual obligations
      keywords_cs:
      - sankce
      - porušení povinností
      - penále
      - smluvní pokuta
      keywords_en:
      - sanctions
      - penalties
      - liquidated damages
      - breach of contract
      red_flags:
      - No sanctions for security obligation breaches
    - id: ANN5-r
      title_cs: Ustanovení o zpřístupnění nebo předání dat na základě žádosti cizozemského orgánu (3 podmínky)
      title_en: Foreign authority data disclosure clause (3 conditions)
      required_by_default: true
      acceptance_criteria:
      - 'ANN5-r-1: Supplier may disclose data only after reviewing lawfulness of the foreign authority request'
      - 'ANN5-r-2: Supplier must first exhaust efforts to prevent disclosure within legal means available'
      - 'ANN5-r-3: Any disclosure is limited to the minimum necessary scope'
      keywords_cs:
      - cizozemský orgán
      - předání dat
      - zákonnost
      - minimální rozsah
      - zpřístupnění dat
      keywords_en:
      - foreign authority
      - data disclosure
      - lawfulness review
      - minimum necessary
      - data transfer
      red_flags:
      - No restrictions on supplier complying with foreign authority data requests
      - No lawfulness review obligation
      - No data minimisation on foreign authority disclosures
