meta:
  ruleset_id: nis2-cz
  version: 2.0-audit
  status: complete
  jurisdiction:
  - CZ
  evaluation_profile_schema: rules/nis2-cz/entity_profile.schema.yaml
  changelog: 'v2.0 (2026-03-10): Refactored to audit-grade with structured checklists,

    acceptance criteria, deterministic logic, bilingual anchors, and red flags.

    '
rules:
- id: NIS2CZ-FOUNDATIONS-SCOPE
  title: Assessment scope and entity profile are documented
  scope:
    applies_to:
    - org
  requirement:
    type: checklist
    logic: ALL
    na_mechanism: Not permitted — all items mandatory for any assessed entity.
    checklist:
    - id: FOUND-SCOPE-01
      title_en: Entity profile is documented (sector, subsector, size category)
      title_cs: Profil entity je zdokumentován (sektor, podsektor, velikostní kategorie)
      required_by_default: true
      acceptance_criteria:
      - Document contains sector classification per CZ-Decree-408-2025
      - Subsector identified where applicable
      - Size category (micro/small/medium/large) stated with supporting data
      keywords_cs:
      - profil
      - sektor
      - podsektor
      - velikost
      - kategorie
      keywords_en:
      - entity profile
      - sector
      - subsector
      - size category
      red_flags:
      - No entity profile document exists
      - Sector classification missing or generic
      - Size category not substantiated with data
    - id: FOUND-SCOPE-02
      title_en: Services provided are enumerated and mapped to regulated service types
      title_cs: Poskytované služby jsou vyjmenovány a namapovány na typy regulovaných služeb
      required_by_default: true
      acceptance_criteria:
      - Full list of services the entity provides is documented
      - Each service is mapped (or explicitly unmapped) to regulated service types per CZ-Decree-408-2025
      keywords_cs:
      - služby
      - regulované služby
      - mapování služeb
      - katalog služeb
      keywords_en:
      - services
      - regulated services
      - service mapping
      - service catalog
      red_flags:
      - Service list missing or incomplete
      - No mapping to regulated service types attempted
    - id: FOUND-SCOPE-03
      title_en: Initial in-scope hypothesis is stated with reasoning
      title_cs: Počáteční hypotéza o rozsahu působnosti je uvedena s odůvodněním
      required_by_default: true
      acceptance_criteria:
      - Document states whether the entity is likely in scope under CZ-Act-264-2025
      - Reasoning references specific legal provisions
      keywords_cs:
      - hypotéza
      - rozsah
      - působnost
      - odůvodnění
      keywords_en:
      - hypothesis
      - scope
      - in-scope
      - reasoning
      red_flags:
      - No in-scope hypothesis stated
      - Hypothesis lacks legal references
    - id: FOUND-SCOPE-04
      title_en: Evidence sources used for the assessment are listed
      title_cs: Zdroje důkazů použité pro hodnocení jsou uvedeny
      required_by_default: true
      acceptance_criteria:
      - Document lists all data sources consulted (company register, contracts, financial statements, etc.)
      - Sources are dated and verifiable
      keywords_cs:
      - zdroje
      - důkazy
      - podklady
      - dokumentace
      keywords_en:
      - evidence sources
      - data sources
      - supporting documents
      red_flags:
      - No evidence sources listed
      - Sources undated or unverifiable
  evidence_hints:
    required:
    - artifact_id: FOUND-SCOPE-ASSESSMENT
  severity: high
  sources:
  - citation: CZ-Act-264-2025 §1 (předmět úpravy)
  - citation: CZ-Act-264-2025 §2 (vymezení pojmů; aktiva/služby)
- id: NIS2CZ-FOUNDATIONS-EVIDENCE-REGISTER
  title: Evidence artifact taxonomy and register are maintained
  scope:
    applies_to:
    - org
  requirement:
    type: checklist
    logic: ALL
    na_mechanism: Not permitted — all items mandatory for proper evidence management.
    checklist:
    - id: FOUND-EVID-01
      title_en: Artifact taxonomy with types and definitions is documented
      title_cs: Taxonomie artefaktů s typy a definicemi je zdokumentována
      required_by_default: true
      acceptance_criteria:
      - Taxonomy defines artifact categories (policy, procedure, record, report, screenshot, export, etc.)
      - Each category has a definition and examples
      keywords_cs:
      - taxonomie
      - artefakty
      - typy
      - definice
      keywords_en:
      - taxonomy
      - artifacts
      - types
      - definitions
      red_flags:
      - No artifact taxonomy exists
      - Types undefined or ambiguous
    - id: FOUND-EVID-02
      title_en: Naming convention for artifacts is established
      title_cs: Konvence pojmenování artefaktů je stanovena
      required_by_default: true
      acceptance_criteria:
      - Naming convention is documented and includes artifact type, date, and version
      - Convention is consistently applied across existing artifacts
      keywords_cs:
      - pojmenování
      - konvence
      - formát názvů
      keywords_en:
      - naming convention
      - naming standard
      - file naming
      red_flags:
      - No naming convention documented
      - Inconsistent naming across artifacts
    - id: FOUND-EVID-03
      title_en: Each artifact type has an assigned owner
      title_cs: Každý typ artefaktu má přiřazeného vlastníka
      required_by_default: true
      acceptance_criteria:
      - Owner role/person is assigned per artifact type
      - Owner is responsible for creation, review, and maintenance
      keywords_cs:
      - vlastník
      - odpovědnost
      - přiřazení
      keywords_en:
      - owner
      - responsibility
      - assignment
      red_flags:
      - Artifact types without owners
    - id: FOUND-EVID-04
      title_en: Retention period and storage location are defined per artifact type
      title_cs: Doba uchovávání a místo uložení jsou definovány pro každý typ artefaktu
      required_by_default: true
      acceptance_criteria:
      - Each artifact type has a defined retention period
      - Storage location (system, folder, vault) is specified
      keywords_cs:
      - uchovávání
      - retence
      - uložení
      - místo
      keywords_en:
      - retention
      - storage
      - location
      - archival
      red_flags:
      - No retention periods defined
      - Storage locations unspecified
    - id: FOUND-EVID-05
      title_en: Mapping from rule IDs to required evidence artifacts is maintained
      title_cs: Mapování z ID pravidel na požadované důkazní artefakty je udržováno
      required_by_default: true
      acceptance_criteria:
      - A register or matrix links each compliance rule ID to its required artifacts
      - Matrix is current (last update within 6 months)
      keywords_cs:
      - mapování
      - pravidla
      - artefakty
      - matice
      keywords_en:
      - mapping
      - rules
      - artifacts
      - matrix
      - traceability
      red_flags:
      - No rule-to-artifact mapping exists
      - Mapping outdated (>6 months)
  evidence_hints:
    required:
    - artifact_id: FOUND-EVIDENCE-REGISTER
  severity: medium
  sources:
  - citation: CZ-Act-264-2025 (governance/documentation expectations for cybersecurity measures)
- id: NIS2CZ-SCOPING-IN-SCOPE-DECISION
  title: In-scope decision under CZ Cybersecurity Act is documented and approved
  scope:
    applies_to:
    - org
  requirement:
    type: checklist
    logic: ALL
    na_mechanism: Not permitted — every entity must document an in-scope determination.
    checklist:
    - id: SCOPE-INSCOPE-01
      title_en: Legal basis summary explains why the entity is or is not regulated
      title_cs: Shrnutí právního základu vysvětluje, proč subjekt je nebo není regulován
      required_by_default: true
      acceptance_criteria:
      - Document references specific sections of CZ-Act-264-2025
      - Conclusion (in-scope / out-of-scope) is explicitly stated
      keywords_cs:
      - právní základ
      - regulovaný
      - působnost
      - zákon
      keywords_en:
      - legal basis
      - regulated
      - scope
      - act
      red_flags:
      - No legal basis provided
      - Conclusion ambiguous or missing
    - id: SCOPE-INSCOPE-02
      title_en: Regulated services are identified (if applicable)
      title_cs: Regulované služby jsou identifikovány (pokud je to relevantní)
      required_by_default: true
      acceptance_criteria:
      - Each regulated service type is identified per CZ-Decree-408-2025
      - If none are applicable, explicit statement with reasoning
      keywords_cs:
      - regulované služby
      - identifikace
      - vyhláška 408
      keywords_en:
      - regulated services
      - identification
      - decree 408
      red_flags:
      - Services not analyzed against decree 408
    - id: SCOPE-INSCOPE-03
      title_en: Assumptions and data used for the determination are documented
      title_cs: Předpoklady a data použitá pro rozhodnutí jsou zdokumentovány
      required_by_default: true
      acceptance_criteria:
      - Data sources (size, turnover, employee count, sector data) are listed
      - Assumptions are explicitly stated and dated
      keywords_cs:
      - předpoklady
      - data
      - zdroje
      - velikost
      - obrat
      keywords_en:
      - assumptions
      - data
      - sources
      - size
      - turnover
      red_flags:
      - No supporting data referenced
      - Assumptions unstated
    - id: SCOPE-INSCOPE-04
      title_en: Decision is approved by a responsible person
      title_cs: Rozhodnutí je schváleno odpovědnou osobou
      required_by_default: true
      acceptance_criteria:
      - Approval signature or record with name, role, and date
      keywords_cs:
      - schválení
      - odpovědná osoba
      - podpis
      keywords_en:
      - approval
      - responsible person
      - signature
      red_flags:
      - No approval record
    - id: SCOPE-INSCOPE-05
      title_en: Review date or trigger for re-assessment is defined
      title_cs: Datum revize nebo podmínka pro opakované posouzení je definována
      required_by_default: true
      acceptance_criteria:
      - Next review date is set (at most 12 months) or trigger events listed
      keywords_cs:
      - revize
      - datum
      - opakované posouzení
      - trigger
      keywords_en:
      - review date
      - reassessment
      - trigger
      red_flags:
      - No review date or trigger defined
  evidence_hints:
    required:
    - artifact_id: SCOPE-IN-SCOPE-DETERMINATION
  severity: high
  sources:
  - citation: CZ-Act-264-2025 (scope / regulated entities)
  - citation: 'EU-NIS2-2022-2555 Art. 2 (mapping: entity scope)'
- id: NIS2CZ-SCOPING-ENTITY-CLASS-ESSENTIAL-IMPORTANT
  title: Entity class (essential/important) is determined and recorded
  scope:
    applies_to:
    - org
  requirement:
    type: checklist
    logic: ALL
    na_mechanism: Not permitted — classification is mandatory for all in-scope entities.
    checklist:
    - id: SCOPE-CLASS-01
      title_en: Entity class (essential or important) is explicitly stated
      title_cs: Třída entity (základní nebo důležitý) je explicitně uvedena
      required_by_default: true
      acceptance_criteria:
      - Document states 'essential' or 'important' with clear determination
      keywords_cs:
      - základní
      - důležitý
      - třída
      - klasifikace
      keywords_en:
      - essential
      - important
      - class
      - classification
      red_flags:
      - Classification missing or ambiguous
    - id: SCOPE-CLASS-02
      title_en: Classification criteria used are documented
      title_cs: Použitá klasifikační kritéria jsou zdokumentována
      required_by_default: true
      acceptance_criteria:
      - Criteria reference CZ-Act-264-2025 provisions for essential/important distinction
      - Sector, size, and service-type criteria are evaluated
      keywords_cs:
      - kritéria
      - klasifikace
      - sektor
      - velikost
      keywords_en:
      - criteria
      - classification
      - sector
      - size
      red_flags:
      - No criteria documented
    - id: SCOPE-CLASS-03
      title_en: Regulated service or sector reference supports the classification
      title_cs: Odkaz na regulovanou službu nebo sektor podporuje klasifikaci
      required_by_default: true
      acceptance_criteria:
      - Specific sector/subsector and service type cited
      keywords_cs:
      - sektor
      - služba
      - odkaz
      keywords_en:
      - sector
      - service
      - reference
      red_flags:
      - No sector/service reference
    - id: SCOPE-CLASS-04
      title_en: Exemptions or special cases are documented (or explicitly stated as none)
      title_cs: Výjimky nebo zvláštní případy jsou zdokumentovány (nebo explicitně uvedeno, že žádné nejsou)
      required_by_default: true
      acceptance_criteria:
      - Any exemptions are listed with legal basis, OR
      - Explicit statement that no exemptions apply
      keywords_cs:
      - výjimky
      - zvláštní případy
      keywords_en:
      - exemptions
      - special cases
      red_flags:
      - Exemptions section missing entirely
    - id: SCOPE-CLASS-05
      title_en: Classification is approved by responsible person
      title_cs: Klasifikace je schválena odpovědnou osobou
      required_by_default: true
      acceptance_criteria:
      - Approval record with name, role, date
      keywords_cs:
      - schválení
      - odpovědná osoba
      keywords_en:
      - approval
      - responsible person
      red_flags:
      - No approval
  evidence_hints:
    required:
    - artifact_id: SCOPE-ENTITY-CLASSIFICATION
  severity: high
  sources:
  - citation: CZ-Act-264-2025 (essential vs important entities)
  - citation: 'EU-NIS2-2022-2555 Art. 3 (mapping: essential/important entities)'
- id: NIS2CZ-SCOPING-DUTY-REGIME-HIGHER-LOWER
  title: Applicable duty regime (higher/lower) is determined per CZ decrees
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: checklist
    logic: ALL
    na_mechanism: Not permitted — duty regime must be determined for all in-scope entities.
    checklist:
    - id: SCOPE-DUTY-01
      title_en: Duty regime (higher or lower) is explicitly stated
      title_cs: Režim povinností (vyšší nebo nižší) je explicitně uveden
      required_by_default: true
      acceptance_criteria:
      - Document states 'higher' or 'lower' unambiguously
      keywords_cs:
      - vyšší povinnosti
      - nižší povinnosti
      - režim
      keywords_en:
      - higher duties
      - lower duties
      - regime
      red_flags:
      - Duty regime not stated
    - id: SCOPE-DUTY-02
      title_en: Rationale and criteria for regime selection are documented
      title_cs: Odůvodnění a kritéria pro výběr režimu jsou zdokumentovány
      required_by_default: true
      acceptance_criteria:
      - References CZ-Decree-409-2025 (higher) or CZ-Decree-410-2025 (lower)
      - Entity class and service type support the regime choice
      keywords_cs:
      - odůvodnění
      - kritéria
      - vyhláška 409
      - vyhláška 410
      keywords_en:
      - rationale
      - criteria
      - decree 409
      - decree 410
      red_flags:
      - No rationale provided
    - id: SCOPE-DUTY-03
      title_en: Links to applicable measures sets are documented
      title_cs: Odkazy na příslušné soubory opatření jsou zdokumentovány
      required_by_default: true
      acceptance_criteria:
      - Applicable decree annex/measure sets are explicitly listed
      keywords_cs:
      - opatření
      - soubor
      - příloha
      keywords_en:
      - measures
      - set
      - annex
      red_flags:
      - No link to applicable measures
    - id: SCOPE-DUTY-04
      title_en: Effective date of the determination is recorded
      title_cs: Datum účinnosti rozhodnutí je zaznamenáno
      required_by_default: true
      acceptance_criteria:
      - Date the regime determination becomes effective is stated
      keywords_cs:
      - datum
      - účinnost
      keywords_en:
      - date
      - effective
      red_flags:
      - No effective date
  evidence_hints:
    required:
    - artifact_id: SCOPE-DUTY-REGIME-DETERMINATION
  severity: high
  sources:
  - citation: CZ-Decree-409-2025 (higher duties)
  - citation: CZ-Decree-410-2025 (lower duties)
  - citation: CZ-Act-264-2025 (delegation to implementing decrees)
- id: NIS2CZ-SCOPING-REGULATED-SERVICES-REGISTER
  title: Register of regulated services (if applicable) is maintained
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: checklist
    logic: ALL
    na_mechanism: 'If entity has no regulated services, a documented justification artifact (SCOPE-NA-JUSTIFICATION) referencing CZ-Decree-408-2025 analysis is required.

      '
    checklist:
    - id: SCOPE-REGSVC-01
      title_en: Regulated service type per CZ decree is recorded
      title_cs: Typ regulované služby dle CZ vyhlášky je zaznamenán
      required_by_default: true
      acceptance_criteria:
      - Each service is categorized per CZ-Decree-408-2025 regulated service types
      keywords_cs:
      - regulovaná služba
      - typ
      - vyhláška 408
      keywords_en:
      - regulated service
      - type
      - decree 408
      red_flags:
      - Service type not mapped to decree categories
    - id: SCOPE-REGSVC-02
      title_en: Service owner is assigned
      title_cs: Vlastník služby je přiřazen
      required_by_default: true
      acceptance_criteria:
      - Named owner or responsible role for each regulated service
      keywords_cs:
      - vlastník
      - služba
      - odpovědnost
      keywords_en:
      - owner
      - service
      - responsibility
      red_flags:
      - Services without owners
    - id: SCOPE-REGSVC-03
      title_en: Service description and criticality are documented
      title_cs: Popis služby a její kritičnost jsou zdokumentovány
      required_by_default: true
      acceptance_criteria:
      - Each service has a textual description
      - Criticality or importance level is assessed
      keywords_cs:
      - popis
      - kritičnost
      - důležitost
      keywords_en:
      - description
      - criticality
      - importance
      red_flags:
      - No description or criticality assessment
    - id: SCOPE-REGSVC-04
      title_en: Service dependencies (key ICT assets/providers) are mapped
      title_cs: Závislosti služby (klíčové ICT aktiva/dodavatelé) jsou namapovány
      required_by_default: true
      acceptance_criteria:
      - Key ICT assets supporting the service are listed
      - Third-party providers are identified
      keywords_cs:
      - závislosti
      - ICT aktiva
      - dodavatelé
      - mapování
      keywords_en:
      - dependencies
      - ICT assets
      - providers
      - mapping
      red_flags:
      - No dependency mapping
    - id: SCOPE-REGSVC-05
      title_en: Link to service catalog entries
      title_cs: Odkaz na záznamy v katalogu služeb
      required_by_default: true
      acceptance_criteria:
      - Each regulated service links to its entry in the service catalog
      keywords_cs:
      - katalog služeb
      - odkaz
      keywords_en:
      - service catalog
      - link
      red_flags:
      - No link to service catalog
  evidence_hints:
    required:
    - artifact_id: SCOPE-REGULATED-SERVICES-REGISTER
  severity: medium
  sources:
  - citation: CZ-Decree-408-2025 (regulated services definitions/list)
  - citation: CZ-Act-264-2025 (regulated services / obligations trigger)
- id: NIS2CZ-GOV-MGMT-ACCOUNTABILITY
  title: Top management accountability and oversight for cybersecurity measures are established
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
  requirement:
    type: checklist
    logic: ALL
    na_mechanism: Not permitted — all items mandatory for in-scope entities.
    checklist:
    - id: GOV-MGMT-01
      title_en: Accountability for cybersecurity is assigned to a specific member of top management
      title_cs: Odpovědnost za kybernetickou bezpečnost je přiřazena konkrétnímu členovi vedení
      required_by_default: true
      acceptance_criteria:
      - Named person or role in top management is designated as accountable
      - Designation is documented in a board resolution or equivalent
      keywords_cs:
      - odpovědnost
      - vedení
      - představenstvo
      - management
      - kybernetická bezpečnost
      keywords_en:
      - accountability
      - top management
      - board
      - cybersecurity
      red_flags:
      - No named accountable person
      - Accountability delegated below management without retention at top
    - id: GOV-MGMT-02
      title_en: Governance forum or reporting line for cyber risk exists
      title_cs: Existuje řídící orgán nebo reportovací linie pro kybernetická rizika
      required_by_default: true
      acceptance_criteria:
      - A governance body (board committee, risk committee, or equivalent) reviews cyber risk
      - Reporting cadence (at least quarterly) is defined
      keywords_cs:
      - řídící orgán
      - reportování
      - kybernetická rizika
      - výbor
      keywords_en:
      - governance forum
      - reporting line
      - cyber risk
      - committee
      red_flags:
      - No governance body for cyber risk
      - Reporting cadence undefined
    - id: GOV-MGMT-03
      title_en: Cybersecurity measures and policies are formally approved by management
      title_cs: Opatření a politiky kybernetické bezpečnosti jsou formálně schváleny vedením
      required_by_default: true
      acceptance_criteria:
      - Approval record (minutes, resolution, or sign-off) exists for the cybersecurity policy framework
      - Approval is dated and signed by accountable management member
      keywords_cs:
      - schválení
      - politiky
      - opatření
      - vedení
      keywords_en:
      - approval
      - policies
      - measures
      - management
      red_flags:
      - No approval record for cybersecurity policies
    - id: GOV-MGMT-04
      title_en: Periodic management review of cybersecurity is conducted
      title_cs: Periodický přezkum kybernetické bezpečnosti vedením je prováděn
      required_by_default: true
      acceptance_criteria:
      - Management review is conducted at least annually
      - Review agenda includes risk status, incidents, audit findings, and resource adequacy
      - Minutes or records are retained
      keywords_cs:
      - přezkum
      - management review
      - pravidelný
      - zápis
      keywords_en:
      - management review
      - periodic
      - annual
      - minutes
      red_flags:
      - No management review conducted in last 12 months
      - No records of review
    - id: GOV-MGMT-05
      title_en: Resource commitment (budget/staffing) decision trail exists
      title_cs: Rozhodovací stopa pro přidělení zdrojů (rozpočet/personál) existuje
      required_by_default: true
      acceptance_criteria:
      - Budget allocation for cybersecurity is documented
      - Staffing decisions (headcount, outsourcing) are recorded
      keywords_cs:
      - rozpočet
      - personál
      - zdroje
      - přidělení
      keywords_en:
      - budget
      - staffing
      - resources
      - allocation
      red_flags:
      - No cybersecurity budget documented
      - No staffing records
  evidence_hints:
    required:
    - artifact_id: GOV-BOARD-RESOLUTION-CYBER
    - artifact_id: GOV-MGMT-REVIEW-MINUTES
    optional:
    - artifact_id: GOV-GOVERNANCE-CHARTER
    - artifact_id: GOV-RISK-REGISTER-SUMMARY
    - artifact_id: GOV-BUDGET-RECORDS
  severity: high
  sources:
  - citation: CZ-Act-264-2025 (odpovědnost vedení za zavedení a udržování opatření kybernetické bezpečnosti)
  - citation: CZ-Decree-409-2025 (organizační opatření – vyšší povinnosti; governance/odpovědnosti)
  - citation: CZ-Decree-410-2025 (organizační opatření – nižší povinnosti; governance/odpovědnosti)
  - citation: EU-NIS2-2022-2555 Art. 20 (management bodies responsibilities) [mapping]
- id: NIS2CZ-GOV-POLICY-FRAMEWORK
  title: Cybersecurity policy framework is documented, approved, and maintained
  scope:
    applies_to:
    - org
    conditions:
    - profile_field: in_scope_under_cz_law
      equals: true
