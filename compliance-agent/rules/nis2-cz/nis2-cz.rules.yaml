    - id: ANN5-k
      title_cs: Specifikace podmínek pro řízení kontinuity činností v souvislosti s dodavateli
      title_en: Business continuity clause – supplier involvement in BCP/DRP
      required_by_default: true
      acceptance_criteria:
      - Supplier is included in customer BCM/DRP plans
      - Supplier tasks during BCM activation are defined
      - Recovery objectives (RTO/RPO) are agreed
      keywords_cs:
      - kontinuita
      - obnova
      - BCP
      - DRP
      - plán kontinuity
      keywords_en:
      - business continuity
      - BCM
      - DRP
      - recovery plan
      - RTO
      - RPO
      red_flags:
      - No business continuity obligations for supplier
