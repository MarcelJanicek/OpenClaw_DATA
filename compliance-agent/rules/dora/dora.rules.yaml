meta:
  ruleset_id: dora
  version: '0.1'
  status: draft
  jurisdiction:
  - EU
  evaluation_profile_schema: rules/dora/entity_profile.schema.yaml
  source:
  - name: DORA (Regulation (EU) 2022/2554)
    url: https://eur-lex.europa.eu/eli/reg/2022/2554/oj
  notes:
  - Draft ruleset scaffold. Rules will be expanded milestone-by-milestone.
rules:
- id: DORA-SCOPE-APPLICABILITY
  title: Applicability and assessed party type are documented
  scope:
    applies_to:
    - org
    parties:
    - financial_entity
    - ict_third_party_provider
  requirement:
    type: decision_and_documentation
    must_include:
    - assessed_party_type
    - financial_entity_category (if applicable)
    - critical_or_important_functions_context
    - outsourced_ict_services_context
  evidence_hints:
    required:
    - dora_scope_assessment
    artifacts:
    - dora_scope_assessment
    - service_catalog
    - outsourcing_register (if exists)
  severity: high
  sources:
  - citation: DORA (EU) 2022/2554 — general applicability (tag)
- id: DORA-ART05-MGMTBODY-ACCOUNTABILITY
  title: Management body is accountable for ICT risk management and operational resilience
  scope:
    applies_to:
    - org
    parties:
    - financial_entity
  requirement:
    type: governance
    must_include:
    - management_body_oversight_of_ict_risk
    - approval_of_ict_risk_management_strategy
    - periodic_review_of_ict_risk_management_framework
    - allocation_of_adequate_resources (budget, staffing)
  evidence_hints:
    required:
    - board_minutes_or_resolutions (ICT risk/operational resilience)
    - ict_risk_management_strategy
    - org_chart_and_role_descriptions
    artifacts:
    - board_minutes_or_resolutions
    - ict_risk_management_strategy
    - ict_risk_management_framework
    - resource_plan_or_budget
    - management_reporting_pack (ICT risk KPIs/KRIs)
  severity: high
  sources:
  - citation: DORA (EU) 2022/2554 — Chapter II, Article 5(1)–(4)
- id: DORA-ART05-ROLES-RESPONSIBILITIES
  title: ICT risk management roles, responsibilities, and segregation of duties are defined
  scope:
    applies_to:
    - org
    parties:
    - financial_entity
  requirement:
    type: governance
    must_include:
    - documented_roles_and_responsibilities_for_ict_risk
    - segregation_of_duties_between_development_operations_and_control_functions
    - clear_accountabilities_for_critical_or_important_functions (if applicable)
  evidence_hints:
    required:
    - org_chart_and_role_descriptions
    - raci_or_responsibility_matrix (ICT risk)
    artifacts:
    - org_chart
    - job_descriptions
    - raci_matrix
    - access_control_policy
    - change_management_policy
  severity: high
  sources:
  - citation: DORA (EU) 2022/2554 — Chapter II, Article 5(2)–(3)
- id: DORA-ART05-TRAINING
  title: Management body maintains sufficient knowledge/skills on ICT risk and participates in relevant training
  scope:
    applies_to:
    - org
    parties:
    - financial_entity
  requirement:
    type: governance
    must_include:
    - defined_training_plan_for_management_body_on_ict_risk
    - evidence_of_completion_or_participation
    - periodic_refresh
  evidence_hints:
    required:
    - board_training_records (ICT risk/operational resilience)
    artifacts:
    - training_plan
    - attendance_logs
    - training_materials
  severity: medium
  sources:
  - citation: DORA (EU) 2022/2554 — Chapter II, Article 5(4)
- id: DORA-ART06-ICTRM-FRAMEWORK
  title: ICT risk management framework is established, implemented, documented, and maintained
  scope:
    applies_to:
    - org
    parties:
    - financial_entity
  requirement:
    type: program
    must_include:
    - documented_ict_risk_management_framework
    - risk_appetite_or_tolerance_for_ict_risk
    - integration_with_enterprise_risk_management
    - scope_covers_internal_and_outsourced_ict_services
  evidence_hints:
    required:
    - ict_risk_management_framework
    - ict_risk_policy
    - risk_appetite_statement (incl. ICT)
    artifacts:
    - ict_risk_management_framework
    - ict_risk_policy
    - risk_appetite_statement
    - outsourcing_register_or_vendor_inventory
  severity: high
  sources:
  - citation: DORA (EU) 2022/2554 — Chapter II, Article 6(1)–(2)
- id: DORA-ART06-REPORTING-TO-MGMTBODY
  title: ICT risk reporting enables management body oversight (metrics, material risks, and control effectiveness)
  scope:
    applies_to:
    - org
    parties:
    - financial_entity
  requirement:
    type: monitoring_and_reporting
    must_include:
    - defined_reporting_frequency
    - material_ict_risks_and_exposures
    - status_of_key_controls_and_remediation
    - outsourced_ict_service_risk_reporting (if applicable)
  evidence_hints:
    required:
    - management_reporting_pack (ICT risk KPIs/KRIs)
    - risk_register_extract (ICT)
    artifacts:
    - ict_risk_dashboard
    - risk_register
    - remediation_tracker
    - board_or_risk_committee_packs
  severity: medium
  sources:
  - citation: DORA (EU) 2022/2554 — Chapter II, Article 6(3)
- id: DORA-ART17-INCIDENT-MGMT-FRAMEWORK
  title: ICT-related incident management process is established and maintained
  scope:
    applies_to:
    - org
    parties:
    - financial_entity
  requirement:
    type: process_and_governance
    must_include:
    - documented_incident_management_policy_and_procedures
    - defined_roles_and_responsibilities (incl. escalation paths)
    - incident_lifecycle_steps (detect, triage, contain, eradicate, recover, close)
    - integration_with_communication_and_crisis_management
    - criteria_for_triggering_major_incident_assessment
  evidence_hints:
    required:
    - incident_management_policy
    - incident_response_procedure
    - on_call_or_escalation_roster
    artifacts:
    - incident_management_policy
    - incident_response_playbooks
    - raci_matrix (incident mgmt)
    - crisis_communications_plan
    - post_incident_review_template
  severity: high
  sources:
  - citation: DORA (EU) 2022/2554 — Chapter III, Article 17(1)
- id: DORA-ART17-INCIDENT-REGISTER
  title: ICT-related incidents are recorded in an incident register with consistent fields
  scope:
    applies_to:
    - org
    parties:
    - financial_entity
  requirement:
    type: records_and_logging
    must_include:
    - incident_register_exists (system of record)
    - 'minimum_fields: unique_id, start_time, end_time, affected_services, root_cause, impact_summary, actions_taken, classification, reporting_decisions'
    - retention_and_access_controls_for_incident_records
    - linkage_to_related_tickets_changes_and_problem_records
  evidence_hints:
    required:
    - incident_register_export
    - incident_record_samples (closed incidents)
    artifacts:
    - incident_tracking_system (e.g., ITSM/SIEM case mgmt)
    - incident_register_schema_or_field_definitions
    - retention_policy
    - access_control_records (incident system)
  severity: high
  sources:
  - citation: DORA (EU) 2022/2554 — Chapter III, Article 17(2)
- id: DORA-ART18-CLASSIFICATION-CRITERIA
  title: ICT-related incidents and cyber threats are classified using documented criteria aligned to DORA
  scope:
    applies_to:
    - org
    parties:
    - financial_entity
  requirement:
    type: classification_and_assessment
    must_include:
    - documented_classification_criteria_for_incidents
    - criteria_cover_impact_dimensions (e.g., clients affected, downtime, data loss, economic impact, reputational impact)
    - process_to_determine_major_ict_related_incident
    - process_to_classify_significant_cyber_threats (if monitored)
    - mapping_of_internal_severity_levels_to_dora_reporting_categories
  evidence_hints:
    required:
    - incident_classification_matrix
    - procedure_for_major_incident_determination
    artifacts:
    - incident_classification_matrix
    - major_incident_assessment_checklist
    - examples_of_classified_incidents (with rationale)
    - risk_acceptance_or_exceptions_log (if deviations exist)
  severity: high
  sources:
  - citation: DORA (EU) 2022/2554 — Chapter III, Article 18(1)–(2)
- id: DORA-ART18-DETECTION-AND-TRIAGE
  title: Timely detection and triage are in place to support incident classification and escalation
  scope:
    applies_to:
    - org
    parties:
    - financial_entity
  requirement:
    type: monitoring_and_response
    must_include:
    - monitoring_sources_defined (logs, alerts, third-party notifications)
    - triage_sla_or_targets_for_initial_response
    - escalation_rules_to_security_and_management
    - evidence_of_triage_documentation_in_incident_records
  evidence_hints:
    required:
    - monitoring_and_alerting_overview
    - incident_samples_showing_timestamps (detect/ack/triage/escalate)
    artifacts:
    - siem_or_monitoring_configuration_summary
    - on_call_runbook
    - incident_timeline_exports
    - alert_to_incident_linkage_samples
  severity: medium
  sources:
  - citation: DORA (EU) 2022/2554 — Chapter III, Article 17(1) and Article 18 (classification support)
