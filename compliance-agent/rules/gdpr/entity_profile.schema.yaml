# Entity/Profile parameters used to evaluate conditional GDPR obligations.
# You will fill this per assessment (case-by-case).
#
# NOTE: This is a lightweight, backwards-compatible "schema" expressed as YAML with defaults.
# New fields may be added over time; existing evaluators should treat unknown fields as optional.

profile:
  # ------------------------------------------------------------
  # Role in the specific processing context
  # ------------------------------------------------------------
  role: "controller"  # controller|processor|joint_controller

  # ------------------------------------------------------------
  # Applicability & scope (Arts. 2–3)
  # ------------------------------------------------------------
  # Whether the assessed context involves processing of personal data.
  processes_personal_data: true

  # Material scope exclusions (Art. 2(2))
  processing_is_purely_personal_household: false
  processing_for_law_enforcement: false

  # Territorial scope signals (Art. 3)
  established_in_eu: false
  offers_goods_or_services_to_eu_data_subjects: false
  monitors_behaviour_in_eu_data_subjects: false

  # ------------------------------------------------------------
  # Processing characteristics
  # ------------------------------------------------------------
  processes_special_categories: false
  processes_criminal_offence_data: false
  processes_children_data: false
  does_systematic_monitoring: false
  large_scale_processing: false
  uses_automated_decision_making_with_significant_effect: false

  # Identification context (Art. 11)
  can_identify_data_subjects: true

  # Lawful basis / legal mechanism flags (used for conditional rules)
  relies_on_consent: false
  relies_on_contract: false

  # Art. 23 (restrictions) — true if you rely on Union/Member State law to restrict GDPR obligations/rights.
  relies_on_art23_restrictions: false

  # Art. 26 — true if (for the assessed processing activity) you jointly determine purposes/means with another controller.
  has_joint_controller_arrangements: false

  # Art. 27 — whether an Art. 27(2) exception is assessed to apply (e.g., processing is occasional, low risk, and not large scale special categories/criminal data).
  # If true, keep documentation of the exception assessment.
  eu_representative_exception_applies: false

  # Used to assess Art. 27(2) exception (non-exhaustive signals)
  processing_is_occasional: false
  is_unlikely_to_result_in_risk_to_rights_and_freedoms: false

  # Used for Art. 20 portability conditions (Art. 20(1))
  processing_carried_out_by_automated_means: true

  # Rights/recipients context (Art. 19)
  shares_personal_data_with_recipients: false

  # Art. 22 specific trigger (solely automated decisions with legal/similarly significant effects)
  # Prefer this over the older `uses_automated_decision_making_with_significant_effect` flag.
  uses_solely_automated_decision_making_with_significant_effect: false

  # ------------------------------------------------------------
  # Collection sources (Arts. 13–14)
  # ------------------------------------------------------------
  # True if you collect personal data directly from the data subject (e.g., sign-up forms, in-app input).
  collects_personal_data_from_data_subject: true

  # True if you obtain personal data from another source (e.g., customers, partners, data brokers).
  obtains_personal_data_not_from_data_subject: false

  # True if (some) personal data is obtained from publicly accessible sources.
  obtains_personal_data_from_public_sources: false

  # If you rely on an Art. 14(5) exemption, list which ones apply.
  # Allowed values (non-exhaustive):
  # - data_subject_already_has_information (Art. 14(5)(a))
  # - impossible_or_disproportionate_effort (Art. 14(5)(b))
  # - union_or_member_state_law_provides (Art. 14(5)(c))
  # - professional_secrecy_confidentiality (Art. 14(5)(d))
  art14_5_exemptions_relied_on: []

  # Children & consent (Art. 8) — only relevant for ISS offered directly to a child and relying on consent.
  offers_information_society_services_directly_to_children: false
  member_state_child_consent_age: 16  # range: 13–16 depending on Member State law

  # ------------------------------------------------------------
  # Transfer & location
  # ------------------------------------------------------------
  transfers_outside_eea: false
  transfer_mechanisms: [] # SCC|BCR|adequacy|derogation|other

  # ------------------------------------------------------------
  # Organisational context
  # ------------------------------------------------------------
  public_authority_or_body: false

  # ------------------------------------------------------------
  # Vendors
  # ------------------------------------------------------------
  uses_processors: true
  acts_as_processor_for_customers: true

  # ------------------------------------------------------------
  # Security/ops
  # ------------------------------------------------------------
  has_incident_response_process: true

  # Notes for the assessor
  notes: ""
