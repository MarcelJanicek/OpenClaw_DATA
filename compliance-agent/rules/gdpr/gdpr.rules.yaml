    - ADM_safeguards_procedure
    artifacts:
    - ADM_register_or_model_decision_inventory
    - ADM_safeguards_procedure
    - privacy_policy
    - DSAR_procedure
    - user_notice_copy_for_adm
  severity: high
  sources:
  - citation: GDPR Art. 22
  - citation: GDPR Recital 71
  - citation: GDPR Art. 12(1)–(3)
- id: GDPR-ART23-RESTRICTIONS
  title: Restrictions of data subject rights/obligations are only applied where a valid Art. 23 legal basis exists and safeguards are documented
  scope:
    applies_to:
    - org
    - processing_activity
    - system
    roles:
    - controller
    - processor
    - joint_controller
    condition: Only if entity_profile.relies_on_art23_restrictions is true (i.e., you rely on a specific Union/Member State law to restrict GDPR obligations/rights under Art. 23)
  requirement:
    type: multi_obligation
    obligations:
    - key: legal_basis_identified
      description: The specific Union/Member State law relied upon is identified, version-controlled, and mapped to the restricted GDPR rights/obligations ("provided for by law").
    - key: processor_instruction_or_mandate (if_applicable)
      description: Where the organisation acts as a processor, restrictions are applied only where required by Union/Member State law or instructed/mandated by the controller under the applicable contract/DPA and documented procedures (i.e., the processor does not unilaterally restrict data subject rights).
    - key: rights_obligations_restricted_catalogued
      description: For each restriction, the exact GDPR rights/obligations affected (e.g., Arts. 12–22, 34) are enumerated, with an implementation description (what is withheld/redacted/delayed, and in what circumstances).
    - key: art23_purpose_mapped
      description: Each restriction use-case is mapped to one or more permitted Art. 23(1) purposes (e.g., national security; defence; public security; prevention/investigation/detection/prosecution of criminal offences; other important public interest objectives; protection of judicial independence/proceedings; enforcement of civil law claims), and the mapping is documented.
    - key: necessity_proportionality_and_essence_assessed
      description: Necessity and proportionality of the restriction are assessed and documented, and the restriction is designed to respect the essence of fundamental rights and freedoms.
    - key: scope_and_duration_defined
      description: Scope of the restriction (data, rights/obligations, affected data subjects, and duration) is defined and implemented to be no broader than necessary.
    - key: safeguards_documented
      description: Safeguards and governance are documented (including access controls, audit logging, authorized personnel, and review/oversight) to prevent abuse.
    - key: art23_2_elements_addressed
      description: 'Where relevant, the restriction framework includes the specific provisions listed in Art. 23(2), including: (a) purposes of processing/categories of processing; (b) categories of personal data; (c) scope of restrictions; (d) safeguards to prevent abuse or unlawful access/transfer; (e) controller categories; (f) storage periods and applicable safeguards; (g) risks to rights/freedoms; and (h) whether/how data subjects are informed, unless that may be prejudicial to the restriction purpose.'
    - key: dsar_process_integration
      description: DSAR/rights-handling procedures and tooling implement the restriction controls (including criteria, approvals, and redaction/withholding steps) consistently.
    - key: redaction_and_disclosure_rules_defined
      description: Clear redaction/withholding/disclosure rules exist for restricted responses (what is withheld, what can be partially disclosed, and how collateral data about third parties/investigations is handled), and staff are trained to apply them consistently.
    - key: dsar_response_templates
      description: Where informing is permitted and not prejudicial, DSAR/right-response templates include a clear explanation that a restriction has been applied, the relevant legal basis, and what (if anything) the data subject can do next (e.g., complain to the supervisory authority), consistent with Art. 23 and applicable Member State/Union law.
    - key: remedies_and_redress_preserved
      description: The restriction design preserves and operationalizes any applicable redress mechanisms (e.g., ability to lodge a complaint with a supervisory authority and seek judicial remedy), and staff guidance/templates reflect any lawful limitations on disclosures.
    - key: data_subject_informed_or_documented_exception
      description: Where the underlying law requires it and it is not prejudicial to the restriction purpose, data subjects are informed about the restriction; if not informing (or delaying informing), the rationale and legal basis are documented.
    - key: review_and_recordkeeping
      description: Decisions to apply a restriction are logged; restrictions are periodically reviewed and lifted when no longer necessary.
  evidence_hints:
    required:
    - copies_of_applicable_member_state_or_union_law
    - art23_legal_basis_register_or_legal_memo
    - controller_instruction_or_mandate_for_art23_restrictions (if_processor)
    - restriction_rights_mapping_matrix (rights/obligations affected per restriction use-case)
    - legal_review_or_counsel_signoff_for_art23_restrictions
    - necessity_and_proportionality_assessment_for_art23_restrictions
    - art23_restriction_policy_and_approval_workflow
    - redaction_and_withholding_guidelines_for_restricted_responses
    - restriction_decision_log_or_case_file_examples (redacted)
    - restricted_dsar_response_template_or_playbook
    - remedies_and_redress_guidance_for_restricted_cases (e.g., complaint/judicial remedy text)
    - data_subject_notification_template_or_documented_reason_for_not_informing
    - restriction_review_schedule_and_lift_criteria
    artifacts:
    - copies_of_applicable_member_state_or_union_law
    - art23_legal_basis_register_or_legal_memo
    - controller_instruction_or_mandate_for_art23_restrictions (if_processor)
    - restriction_rights_mapping_matrix (rights/obligations affected per restriction use-case)
    - legal_review_or_counsel_signoff_for_art23_restrictions
    - necessity_and_proportionality_assessment_for_art23_restrictions
    - art23_restriction_policy_and_approval_workflow
    - restricted_dsar_handling_procedure
    - redaction_and_withholding_guidelines_for_restricted_responses
    - restricted_dsar_response_template_or_playbook
    - remedies_and_redress_guidance_for_restricted_cases (e.g., complaint/judicial remedy text)
    - access_control_and_audit_logging_evidence_for_restriction_handling
    - restriction_decision_log_or_case_file_examples (redacted)
    - data_subject_notification_template_or_documented_reason_for_not_informing
    - restriction_review_schedule_and_lift_criteria
    questions:
    - What exact statute(s) are you relying on, and which GDPR rights/obligations are restricted as a result?
    - Which Art. 23(1) purpose(s) apply, and how is necessity/proportionality demonstrated?
    - How do you ensure restrictions are targeted, time-bound, access-controlled, logged, and periodically reviewed/lifted?
    checks:
    - Confirm the restriction framework covers the elements in Art. 23(2) as applicable (purposes, categories of data, scope, safeguards, storage periods, risks, and right to be informed).
    - Confirm DSAR response templates/playbooks reflect when and how a restriction may be disclosed to the data subject (or why it is withheld/delayed).
  severity: high
  sources:
  - citation: GDPR Art. 23(1)
  - citation: GDPR Art. 23(2)(a)-(h)
  - citation: GDPR Recital 73
- id: GDPR-ART23-RESTRICTION-LEGAL-REVIEW
  title: Art. 23 restriction laws and safeguards are legally reviewed and kept current as laws and use-cases change
  scope:
    applies_to:
    - org
    - processing_activity
    roles:
    - controller
    - processor
    - joint_controller
    condition: Only if entity_profile.relies_on_art23_restrictions is true (i.e., you rely on a specific Union/Member State law to restrict GDPR obligations/rights under Art. 23)
  requirement:
    type: multi_obligation
    obligations:
    - key: legal_review_per_restriction_use_case
      description: Each restriction use-case has a documented legal review confirming the Art. 23(1) purpose(s), scope, and any specific conditions/limitations under the applicable Union/Member State law.
    - key: art23_2_mapping_maintained
      description: A maintained mapping exists showing how the applicable law and your implementation address relevant Art. 23(2)(a)–(h) elements (purpose/categories/scope/safeguards/controller categories/storage periods/risks/informing), and gaps are tracked to remediation.
    - key: change_management_and_refresh
      description: There is change management for restriction logic (code/config/policies) and a periodic refresh of legal analysis (e.g., when the law changes, when use-cases expand, or at a defined cadence).
    - key: governance_and_approvals
      description: The organisation defines who can approve introducing or expanding Art. 23 restrictions (e.g., legal/privacy leadership) and retains approval records.
  evidence_hints:
    required:
    - art23_restriction_register_with_legal_reviews_and_approvals
    - art23_2_elements_mapping_document (law_to_controls_and_processes)
    - change_management_records_for_restriction_logic (tickets, PRs, policy versions) (redacted)
    - periodic_legal_refresh_schedule_or_review_minutes (redacted)
    artifacts:
    - art23_restriction_register_with_legal_reviews_and_approvals
    - art23_2_elements_mapping_document (law_to_controls_and_processes)
    - change_management_records_for_restriction_logic (tickets, PRs, policy versions) (redacted)
    - periodic_legal_refresh_schedule_or_review_minutes (redacted)
    questions:
    - Who reviews and approves each Art. 23 restriction use-case, and how do you ensure it remains lawful as laws/use-cases change?
    - Where is the mapping between the applicable law, Art. 23(2) elements, and your implemented safeguards maintained?
    checks:
    - Confirm there is explicit governance and periodic refresh for restrictions (not a one-time memo).
  severity: medium
  sources:
  - citation: GDPR Art. 23(1)
  - citation: GDPR Art. 23(2)
  - citation: GDPR Recital 73
- id: GDPR-ART24-CONTROLLER-ACCOUNTABILITY
  title: Controller implements appropriate measures and can demonstrate GDPR compliance (accountability)
  scope:
    applies_to:
    - org
    roles:
    - controller
  requirement:
    type: multi_obligation
    obligations:
    - key: measures_implemented
      description: Appropriate technical and organisational measures are implemented to ensure and demonstrate processing is performed in accordance with the GDPR, considering nature/scope/context/purposes and risks.
    - key: governance_assigned
      description: Privacy governance is defined (owners/roles/responsibilities, escalation paths) and maintained for processing activities.
    - key: policies_and_controls
      description: Policies, procedures, and controls exist for lawful basis, transparency, rights handling, vendor/processor management, retention, security, and incident response (as applicable).
    - key: effectiveness_reviewed
      description: Measures are reviewed and updated where necessary (e.g., periodic audits/assessments, control testing, remediation tracking).
    - key: ability_to_demonstrate
      description: Evidence is maintained to demonstrate compliance to supervisory authorities on request (e.g., records, logs, assessments, decisions).
  evidence_hints:
    required:
    - privacy_governance_structure_and_roles
    - privacy_policies_and_procedures_pack
    - privacy_risk_assessments_or_control_reviews
    - remediation_tracker_or_audit_findings (redacted)
    - compliance_evidence_index_or_repository_structure
    artifacts:
    - privacy_program_charter_or_accountability_framework
    - privacy_governance_structure_and_roles
    - privacy_policies_and_procedures_pack
    - privacy_risk_assessments_or_control_reviews
    - remediation_tracker_or_audit_findings (redacted)
    - compliance_evidence_index_or_repository_structure
    questions:
    - How do you decide which organisational/technical measures are appropriate for your processing and risks?
    - Who owns privacy compliance, and how is effectiveness of controls checked and improved over time?
    - If a supervisory authority asked you to demonstrate compliance, what evidence pack would you provide?
    checks:
    - Confirm measures are risk-based and kept up to date (not a one-time policy set).
  severity: high
  sources:
  - citation: GDPR Art. 24(1)
  - citation: GDPR Art. 24(2)
  - citation: GDPR Art. 24(3)
  - citation: GDPR Recital 74
  - citation: GDPR Recital 76
- id: GDPR-ART25-DPBD-DEFAULT
  title: Data protection by design and by default implemented (including privacy-friendly defaults)
  scope:
    applies_to:
    - product
    - system
    roles:
    - controller
  requirement:
    type: multi_obligation
    obligations:
    - key: dpbd_in_design_process
      description: Data protection by design is integrated into product/system design and delivery processes (e.g., requirements, architecture, threat/privacy modeling, review gates).
    - key: appropriate_safeguards
      description: Appropriate safeguards are selected and implemented (e.g., pseudonymisation/encryption where suitable, access controls, logging, minimisation) considering state of the art, costs, and risks.
    - key: data_minimisation_and_purpose_limit
      description: Personal data collected/processed is limited to what is necessary for specified purposes, and purpose changes are controlled.
    - key: privacy_by_default
      description: Default settings ensure only necessary personal data is processed by default (scope, amount, retention, accessibility) and data is not made accessible to an indefinite number of persons without user intervention.
    - key: configuration_and_documentation
      description: Privacy-relevant configurations are documented, tested, and maintained (including default retention/access settings and any user/admin overrides).
  evidence_hints:
    required:
    - secure_sdlc_or_product_development_process_with_privacy_gates
    - privacy_design_review_records_or_architecture_decisions (redacted)
    - default_settings_and_data_minimisation_checklist
    - documentation_of_privacy_relevant_configurations_and_defaults
    - test_evidence_for_privacy_defaults (e.g., retention/access settings)
    artifacts:
    - secure_sdlc_or_product_development_process_with_privacy_gates
    - privacy_design_review_records_or_architecture_decisions (redacted)
    - privacy_threat_model_or_privacy_impact_assessment_inputs (redacted)
    - default_settings_and_data_minimisation_checklist
    - documentation_of_privacy_relevant_configurations_and_defaults
    - test_evidence_for_privacy_defaults (e.g., retention/access settings)
    questions:
    - What privacy-by-design controls exist in your SDLC (who reviews, what criteria, what artifacts)?
    - Which privacy-friendly defaults are enforced (retention, access, sharing, telemetry) and how are they tested?
    - How do you prevent collection/processing beyond what is necessary for the stated purposes?
    checks:
    - Confirm defaults limit amount, extent, retention period, and accessibility of personal data (Art. 25(2)).
  severity: high
  sources:
  - citation: GDPR Art. 25(1)
  - citation: GDPR Art. 25(2)
  - citation: GDPR Art. 25(3)
  - citation: GDPR Recital 78
- id: GDPR-ART26-JOINT-CONTROLLERS
  title: Joint controllers determine and document respective responsibilities and make the essence of the arrangement available to data subjects
  scope:
    applies_to:
    - org
    - processing_activity
    roles:
    - joint_controller
    - controller
    condition: Only if entity_profile.has_joint_controller_arrangements is true (i.e., you jointly determine purposes/means with another controller for the processing activity)
  requirement:
    type: multi_obligation
    obligations:
    - key: arrangement_in_place
      description: A joint controller arrangement exists in writing (or other documented form) that transparently sets out respective responsibilities for GDPR compliance, in particular for exercising data subject rights and providing required information.
    - key: contact_point_defined
      description: The arrangement designates (where appropriate) a single contact point for data subjects, without prejudice to data subjects' ability to exercise their rights against each controller.
    - key: substance_made_available
      description: The essence of the joint controller arrangement is made available to data subjects (e.g., via privacy notice), including how responsibilities are allocated.
    - key: dsr_operationalized
      description: Operational processes (tickets/workflows, escalation paths, SLAs) implement the agreed split of responsibilities for DSAR handling (intake, identity verification, response compilation, deadlines, and coordination between controllers).
    - key: accountability_evidence
      description: Evidence is maintained that the arrangement is implemented in practice (not only contractual) (e.g., logs of cross-controller coordination on DSARs/incidents, ownership of notice updates).
  evidence_hints:
    required:
    - joint_controller_arrangement_or_contract_addendum
    - documentation_of_responsibility_split_for_notices_and_dsar_handling
    - privacy_notice_excerpt_describing_joint_controller_essence_and_contact_point
    - sample_dsar_or_rights_cases_involving_joint_controllers (redacted)
    artifacts:
    - joint_controller_arrangement_or_contract_addendum
    - documentation_of_responsibility_split_for_notices_and_dsar_handling
    - privacy_notice_excerpt_describing_joint_controller_essence_and_contact_point
    - dsar_workflow_or_sla_showing_cross_controller_coordination
    - sample_dsar_or_rights_cases_involving_joint_controllers (redacted)
    questions:
    - For which processing activities are you a joint controller, and with whom?
    - How are responsibilities split for notices and data subject rights (who does what, by when)?
    - Where can a data subject see the essence of the arrangement, and who is the contact point?
    checks:
    - Confirm the arrangement covers responsibilities for providing information under Arts. 13/14 and for handling data subject rights requests.
    - Confirm that data subjects can still exercise rights against each controller (the arrangement cannot remove this).
  severity: high
  sources:
  - citation: GDPR Art. 26(1)
  - citation: GDPR Art. 26(2)
  - citation: GDPR Art. 26(3)
  - citation: GDPR Recital 79
- id: GDPR-ART27-EU-REPRESENTATIVE
  title: Non-EU controller/processor subject to GDPR (Art. 3(2)) designates an EU representative unless an exception applies
  scope:
    applies_to:
    - org
    roles:
    - controller
    - processor
    condition: Only if entity_profile.established_in_eu is false AND (entity_profile.offers_goods_or_services_to_eu_data_subjects is true OR entity_profile.monitors_behaviour_in_eu_data_subjects is true) AND entity_profile.eu_representative_exception_applies is false
  requirement:
    type: multi_obligation
    obligations:
    - key: representative_designated
      description: An EU representative is designated in writing in one of the Member States where the data subjects whose personal data are processed are located.
    - key: mandate_and_availability
      description: The representative is mandated to be addressed (in addition to or instead of the controller/processor) by supervisory authorities and data subjects on all issues related to processing, and processes exist to ensure the representative can relay requests and support responses.
    - key: contact_details_published
      description: The representative's contact details are included in privacy notices and made easily accessible to data subjects.
    - key: integration_with_sa_and_dsar_processes
      description: Incident/DSAR workflows include steps to coordinate with the representative (routing, timelines, escalation, recordkeeping).
    - key: documentation_of_exception_if_any
      description: If the organization claims an exception (Art. 27(2)), the exception criteria are assessed and documented and periodically reviewed.
  evidence_hints:
    required:
    - eu_representative_designation_agreement_or_mandate
    - eu_representative_contact_details_in_privacy_notice
    - documented_workflow_for_handling_dsar_and_sa_requests_via_representative
    - assessment_of_art27_exception_criteria_if_relied_on
    artifacts:
    - eu_representative_designation_agreement_or_mandate
    - eu_representative_contact_details_in_privacy_notice
    - documented_workflow_for_handling_dsar_and_sa_requests_via_representative
    - assessment_of_art27_exception_criteria_if_relied_on
    questions:
    - Are you established outside the EU but offering goods/services to, or monitoring, people in the EU?
    - Which Member State is your representative located in, and how are requests routed between you and the representative?
    - If you do not have a representative, which Art. 27(2) exception do you rely on and what evidence supports it?
    checks:
    - Confirm the designation is in writing and the representative is located in an EU Member State where affected data subjects are located.
  severity: high
  sources:
  - citation: GDPR Art. 27(1)
  - citation: GDPR Art. 27(2)
  - citation: GDPR Art. 27(3)
  - citation: GDPR Art. 27(4)
  - citation: GDPR Recital 80
- id: GDPR-ART30-ROPA
