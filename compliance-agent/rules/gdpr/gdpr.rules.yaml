- id: GDPR-ART21-OBJECT
  title: Right to object is supported, including immediate objection to direct marketing
  scope:
    applies_to:
    - org
    - product
    - marketing
    roles:
    - controller
  requirement:
    type: multi_obligation
    obligations:
    - key: objection_intake_and_timeline
      description: There is an intake process for objections with Art. 12 timelines and communications.
    - key: direct_marketing_opt_out
      description: Objection to processing for direct marketing (including profiling related to such marketing) is honoured without undue delay.
    - key: other_objections_assessed
      description: For objections under Art. 21(1), processing stops unless controller demonstrates compelling legitimate grounds overriding interests/rights/freedoms or for legal claims.
    - key: inform_about_right_to_object
      description: Data subjects are informed of the right to object at the latest at first communication, and it is presented clearly and separately from other information.
