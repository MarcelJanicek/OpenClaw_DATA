    - legal_hold_and_record_preservation_procedure
    - examples_of_fulfilled_regulatory_requests (redacted)
    questions:
    - How do you handle a request for information or access from a supervisory authority (intake, validation, deadlines, secure transfer)?
    - How do you preserve relevant records/logs when an inquiry begins (legal hold / evidence preservation)?
    checks:
