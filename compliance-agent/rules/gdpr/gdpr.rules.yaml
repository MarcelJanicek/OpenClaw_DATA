- id: GDPR-ART82-LIABILITY-COMPENSATION
  title: The organisation manages GDPR liability and compensation risk (including controller/processor allocation and claim handling)
  scope:
    applies_to:
    - org
    - contracts
    roles:
    - controller
    - processor
    - joint_controller
  requirement:
    type: multi_obligation
    obligations:
    - key: role_and_allocation_understood
      description: The organisation can determine whether it acts as controller/processor/joint controller for key processing activities and has contractual allocation of responsibilities and indemnities where applicable.
    - key: claim_handling_process
      description: There is a process to handle compensation claims related to material or non-material damage (intake, investigation, documentation, legal review, settlement authority).
    - key: evidence_to_demonstrate_non_responsibility
      description: The organisation can evidence measures taken and, where applicable, demonstrate it is not in any way responsible for the event giving rise to the damage (including processor instruction compliance records or controller decision records).
    - key: joint_and_several_and_recource_considered
      description: Where multiple controllers/processors are involved, the organisation tracks joint-and-several exposure and has a mechanism to pursue recourse/claims contribution as appropriate.
  evidence_hints:
