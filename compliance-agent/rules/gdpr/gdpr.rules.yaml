    - logs_or_register_of_international_cooperation_requests_and_responses (redacted)
    - confidentiality_and_secure_communication_controls_for_international_exchanges
    questions:
    - What mechanisms do you use to cooperate with third-country supervisory counterparts or international organisations, and who owns those relationships?
    - How do you exchange information securely and track requests/responses for cross-border matters?
    checks:
    - Confirm there is a defined procedure, secure channels, and recordkeeping for international cooperation.
  severity: low
  sources:
  - citation: GDPR Art. 50
  - citation: GDPR Recital 116
