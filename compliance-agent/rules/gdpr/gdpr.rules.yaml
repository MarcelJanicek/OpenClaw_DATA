- id: GDPR-ART28-PROCESSOR-SELECTION-AND-OVERSIGHT
  title: Controller selects processors with sufficient guarantees and maintains ongoing oversight (including sub-processor controls)
  scope:
    applies_to:
    - org
    - contracts
    roles:
    - controller
    condition: Only if entity_profile.uses_processors is true
  requirement:
    type: multi_obligation
    obligations:
    - key: sufficient_guarantees_assessed
      description: Before engaging a processor, the controller assesses and documents that the processor provides sufficient guarantees to implement appropriate technical and organisational measures to meet GDPR requirements and protect data subject rights.
    - key: written_contract_or_other_legal_act
      description: Processing by a processor is governed by a contract or other legal act that is binding and sets out the subject-matter/duration/nature/purpose of processing, types of personal data, categories of data subjects, and controller obligations/rights.
    - key: subprocessor_authorization_and_flowdown
      description: A process exists to authorize sub-processors (specific or general written authorization as applicable), maintain a current sub-processor list, and ensure equivalent data protection obligations are flowed down to sub-processors.
    - key: ongoing_vendor_monitoring
      description: Ongoing oversight exists (e.g., periodic reviews, attestations, audit reports, or security questionnaires) to ensure processors continue to meet required measures; issues are tracked to remediation or disengagement.
    - key: processor_register_or_inventory
      description: An inventory/register of processors and related DPAs/sub-processor authorizations is maintained and kept up to date to support accountability and DSAR/incident response.
  evidence_hints:
    required:
    - vendor_management_policy_and_due_diligence_procedure
    - processor_due_diligence_records (e.g., questionnaires, SOC2/ISO reports) (redacted)
    - signed_dpa_or_other_binding_instrument
    - subprocessor_authorization_process_and_current_subprocessor_list
    - ongoing_vendor_review_records_and_remediation_tracking (redacted)
    artifacts:
    - vendor_management_policy_and_due_diligence_procedure
    - processor_due_diligence_records (e.g., questionnaires, SOC2/ISO reports) (redacted)
    - signed_dpa_or_other_binding_instrument
    - subprocessor_authorization_process_and_current_subprocessor_list
    - ongoing_vendor_review_records_and_remediation_tracking (redacted)
    - processor_register_or_inventory
    questions:
    - How do you decide a processor provides “sufficient guarantees” before you send it personal data?
    - How do you approve and track sub-processors, and ensure equivalent obligations flow down?
    - What ongoing monitoring exists to ensure processors remain compliant and secure?
    checks:
    - Confirm there is documented pre-engagement due diligence and ongoing oversight (not only a template DPA).
    - Confirm sub-processor authorization and flow-down obligations are operationalized and evidenced.
  severity: high
  sources:
  - citation: GDPR Art. 28(1)
  - citation: GDPR Art. 28(2)
  - citation: GDPR Art. 28(9)
- id: GDPR-ART29-PROCESSOR-ON-INSTRUCTIONS
  title: Persons acting under the authority of a controller/processor process personal data only on instructions (unless required by law)
  scope:
    applies_to:
    - org
    - system
    roles:
    - controller
    - processor
  requirement:
    type: multi_obligation
    obligations:
    - key: documented_instructions_and_policies
      description: Documented instructions/policies define who may access/process personal data, for which purposes, and under what conditions (including prohibited uses).
    - key: role_based_access_and_least_privilege
      description: Access to personal data is provisioned using least privilege (RBAC/ABAC), with joiner/mover/leaver processes and periodic access reviews.
    - key: confidentiality_commitments
      description: Staff/contractors with access to personal data are bound by confidentiality obligations (contractual terms, policies, NDAs) and understand them.
    - key: training_and_awareness
      description: Privacy/security training covers instruction-only processing, acceptable use, incident reporting, and sanctions for misuse; completion is tracked.
    - key: law_required_processing_exception
      description: Where processing is required by Union/Member State law (instruction exception), the legal basis is identified and documented and processing is limited to what that law requires.
    - key: monitoring_and_enforcement
      description: Technical/organisational controls detect and respond to unauthorized processing (e.g., audit logs, monitoring/alerts, investigations, disciplinary process).
  evidence_hints:
    required:
    - access_control_policy_and_rbac_role_definitions
    - confidentiality_terms_for_staff_and_contractors
    - privacy_security_training_materials_and_completion_records
    - joiner_mover_leaver_process_and_periodic_access_review_records (redacted)
    - audit_logging_or_monitoring_evidence_for_personal_data_access (redacted)
    artifacts:
    - access_control_policy_and_rbac_role_definitions
    - acceptable_use_policy
    - confidentiality_terms_for_staff_and_contractors
    - privacy_security_training_materials_and_completion_records
    - joiner_mover_leaver_process_and_periodic_access_review_records (redacted)
    - audit_logging_or_monitoring_evidence_for_personal_data_access (redacted)
    - incident_or_investigation_playbooks_for_access_misuse
    questions:
    - How do you ensure employees/contractors only access/process personal data on documented instructions (and not for curiosity/side purposes)?
    - What access controls and reviews prevent or detect unauthorized processing?
    - If processing is required by law contrary to typical instructions, where is that legal requirement documented?
    checks:
    - Confirm access to personal data is limited to authorized personnel with defined roles and regularly reviewed.
    - Confirm there are enforceable confidentiality/training requirements and monitoring for misuse.
  severity: high
  sources:
  - citation: GDPR Art. 29
  - citation: GDPR Recital 81
- id: GDPR-ART31-COOPERATION-WITH-SA
  title: Controller/processor cooperates with the supervisory authority on request
  scope:
    applies_to:
    - org
    roles:
    - controller
    - processor
    - joint_controller
  requirement:
    type: multi_obligation
    obligations:
    - key: sa_contact_and_ownership
      description: A clear internal owner and contact channel exist to receive, triage, and respond to supervisory authority (SA) requests (including deadlines, escalation, and legal review).
    - key: timely_response_and_information_provision
      description: Processes and resourcing exist to provide requested information and access in a timely manner and in an accurate, complete, and consistent way (including compiling evidence from systems/vendors as needed).
    - key: cooperation_in_investigations_and_audits
      description: Procedures support cooperation with SA investigations (e.g., handling interviews, on-site/remote audits, technical demonstrations, and secure data room access) while protecting unrelated confidentiality.
    - key: recordkeeping_of_sa_interactions
      description: SA communications and responses are logged (case file) including what was requested, what was provided, and decisions/rationale (with privileged/legal material tracked appropriately).
    - key: lessons_learned_and_remediation
      description: Outcomes from SA interactions (findings, guidance, corrective measures) are tracked to remediation and control improvements.
  evidence_hints:
    required:
    - procedure_for_handling_supervisory_authority_requests
    - designated_sa_contact_role_or_responsibility_matrix
    - log_or_ticket_history_of_sa_requests_and_responses (redacted)
    - evidence_pack_index_for_regulator_requests (e.g., dsar_security_ropa_vendor)
    artifacts:
    - procedure_for_handling_supervisory_authority_requests
    - designated_sa_contact_role_or_responsibility_matrix
    - log_or_ticket_history_of_sa_requests_and_responses (redacted)
    - secure_data_room_or_evidence_repository_structure
    - remediation_tracker_for_regulatory_findings (redacted)
    questions:
    - If a supervisory authority contacted you tomorrow, who receives it and how do you coordinate a response across legal, security, and engineering?
    - How do you ensure completeness and timeliness of responses (including collecting evidence from processors/sub-processors)?
    - How do you track outcomes and ensure corrective actions are implemented?
    checks:
    - Confirm there is an operational playbook (not ad-hoc email) and evidence of prior or dry-run execution.
  severity: high
  sources:
  - citation: GDPR Art. 31
  - citation: GDPR Recital 82
- id: GDPR-ART32-SECURITY
  title: Appropriate technical and organisational measures (TOMs) are implemented and kept effective (risk-based)
  scope:
    applies_to:
    - org
    - product
    - system
    - processing_activity
    roles:
    - controller
    - processor
  requirement:
    type: multi_obligation
    obligations:
    - key: risk_based_security_program
      description: Security measures are selected and maintained based on the risks to the rights and freedoms of natural persons, taking into account the state of the art, implementation costs, and the nature/scope/context/purposes of processing.
    - key: confidentiality_integrity_availability_resilience
      description: Measures exist to ensure ongoing confidentiality, integrity, availability, and resilience of processing systems and services (including hardening, secure configuration, and change control).
    - key: access_control_and_least_privilege
      description: Access to personal data and production systems is restricted to authorized personnel using least privilege (RBAC/ABAC), with joiner/mover/leaver controls, MFA where appropriate, and periodic access reviews.
    - key: encryption_and_pseudonymisation_where_appropriate
      description: Encryption and/or pseudonymisation are implemented where appropriate to the risks (e.g., TLS in transit; encryption at rest for sensitive/high-risk datasets; tokenisation/pseudonymisation for analytics).
    - key: restore_availability_and_access
      description: The organisation can restore availability and access to personal data in a timely manner after an incident (e.g., backups, tested restore procedures, disaster recovery/business continuity plans).
    - key: regular_testing_assessment_evaluation
      description: There is an ongoing process for regularly testing, assessing, and evaluating the effectiveness of TOMs (e.g., vulnerability management, security testing, audits, penetration tests, control monitoring), and findings are tracked to remediation.
    - key: processor_controller_alignment
      description: Where acting as a processor, security obligations and TOMs are aligned with controller instructions and contractual requirements (e.g., DPA security annex), and evidence can be provided to controllers.
  evidence_hints:
    required:
    - information_security_policy_and_standards (including access control, cryptography, vulnerability management)
    - risk_assessment_or_threat_model_covering_personal_data_processing
    - technical_and_organisational_measures_register_or_security_control_matrix
    - access_control_design_and_mfa_configuration_evidence
    - periodic_access_review_records (redacted)
    - encryption_configuration_evidence (e.g., TLS settings, KMS usage, database/storage encryption)
    - backup_and_restore_procedures_and_restore_test_results (redacted)
    - vulnerability_management_and_patch_process_evidence (e.g., scans, SLAs, tickets) (redacted)
    - security_testing_reports (e.g., pen tests, audits) and remediation tracker (redacted)
    artifacts:
    - information_security_policy_and_standards (including access control, cryptography, vulnerability management)
    - risk_assessment_or_threat_model_covering_personal_data_processing
    - technical_and_organisational_measures_register_or_security_control_matrix
    - access_control_design_and_mfa_configuration_evidence
    - periodic_access_review_records (redacted)
    - encryption_configuration_evidence (e.g., TLS settings, KMS usage, database/storage encryption)
    - backup_and_restore_procedures_and_restore_test_results (redacted)
    - business_continuity_or_disaster_recovery_plan (as applicable)
    - vulnerability_management_and_patch_process_evidence (e.g., scans, SLAs, tickets) (redacted)
    - security_testing_reports (e.g., pen tests, audits) and remediation tracker (redacted)
    questions:
    - How did you determine which TOMs are “appropriate” for your processing and risk profile (state of the art, costs, and risks)?
    - What controls exist for access restriction and authentication to personal data systems (RBAC/MFA/access reviews)?
    - How do you ensure you can restore availability/access after incidents, and how often do you test restores?
    - What is your cadence for testing/evaluating controls (vuln scanning, pen tests, audits), and how are findings remediated?
    checks:
    - Confirm the organisation has a documented, risk-based TOMs baseline and can map key controls to the risks of its processing.
    - Confirm regular testing/assessment is evidenced and remediation is tracked to closure.
  severity: high
  sources:
  - citation: GDPR Art. 32(1)
  - citation: GDPR Art. 32(2)
  - citation: GDPR Art. 32(3)
  - citation: GDPR Recital 83
  - citation: GDPR Recital 84
- id: GDPR-ART33-BREACH-SUPERVISORY
  title: Breach notification to supervisory authority within 72 hours (when required)
  scope:
    applies_to:
    - org
    roles:
    - controller
  requirement:
    type: process_required
    must_include:
    - breach_detection_and_triage
    - 72h_timer
    - notification_template (nature, categories, approx numbers, contact, consequences, measures)
    - breach_register
  evidence_hints:
    required:
    - incident_response_plan_or_breach_response_playbook
    - breach_register (incl. timestamps: awareness/containment/assessment/notification)
    - supervisory_authority_notification_template (Art33(3) fields)
    - evidence_of_72h_notification_timer_and_escalation (e.g., ticket workflow/SLAs) (redacted)
    - tabletop_or_simulation_exercise_results_for_breach_notification (redacted)
    artifacts:
    - incident_response_plan_or_breach_response_playbook
    - breach_register (incl. timestamps: awareness/containment/assessment/notification)
    - supervisory_authority_notification_template (Art33(3) fields)
    - evidence_of_72h_notification_timer_and_escalation (e.g., ticket workflow/SLAs) (redacted)
    - tabletop_or_simulation_exercise_results_for_breach_notification (redacted)
    questions:
    - How do you determine when a personal data breach is “unlikely to result in a risk” (and thus not notified) and how is that decision documented?
    - How do you ensure you can notify the supervisory authority within 72 hours of becoming aware?
    - What information do you include in the notification and how do you update it if not all details are known initially?
    checks:
    - Confirm there is a breach register and evidence of decisions/timelines (including cases where notification was not made).
    - Confirm the notification template covers Art. 33(3)(a)–(d) items.
  severity: high
  sources:
  - citation: GDPR Art. 33(1)
  - citation: GDPR Art. 33(3)
  - citation: GDPR Art. 33(5)
  - citation: GDPR Recital 85
  - citation: GDPR Recital 87
- id: GDPR-ART34-BREACH-DATA-SUBJECT
  title: Breach communication to data subjects when high risk
  scope:
    applies_to:
    - org
    roles:
    - controller
  requirement:
    type: process_required
    must_include:
    - high_risk_assessment
    - communication_template
    - exceptions_handling (e.g., encryption/mitigation)
  evidence_hints:
    required:
    - incident_response_plan_or_breach_response_playbook
    - high_risk_assessment_methodology_and_decision_records (redacted)
    - data_subject_breach_communication_template (plain language; includes required items)
    - evidence_of_exceptions_analysis (e.g., encryption/mitigation/public_communication) (redacted)
    - sample_breach_communications_or_dry_run_outputs (redacted)
    artifacts:
    - incident_response_plan_or_breach_response_playbook
    - high_risk_assessment_methodology_and_decision_records (redacted)
    - data_subject_breach_communication_template (plain language; includes required items)
    - evidence_of_exceptions_analysis (e.g., encryption/mitigation/public_communication) (redacted)
    - sample_breach_communications_or_dry_run_outputs (redacted)
    questions:
    - How do you assess whether a breach is likely to result in a “high risk” to individuals, and who signs off?
    - How do you draft and deliver communications without undue delay (channels, localization, customer coordination)?
    - When do you rely on Art. 34(3) exceptions and how is that documented?
    checks:
    - Confirm the communication template includes Art. 34(2)(a)–(c) items and is understandable.
    - Confirm exceptions (Art. 34(3)) are documented where communications are not sent.
  severity: high
  sources:
  - citation: GDPR Art. 34(1)
  - citation: GDPR Art. 34(2)
  - citation: GDPR Art. 34(3)
  - citation: GDPR Recital 86
  - citation: GDPR Recital 88
- id: GDPR-ART35-DPIA
  title: DPIA performed for high-risk processing and kept up to date
  scope:
    applies_to:
    - processing_activity
    - product
    - system
    roles:
    - controller
  condition: Only if the processing is likely to result in a high risk to the rights and freedoms of natural persons (e.g., systematic monitoring; large-scale processing of sensitive data; novel/AI profiling with significant effects)
  requirement:
    type: multi_obligation
    obligations:
    - key: dpia_screening_and_trigger_criteria
      description: DPIA trigger criteria are defined and applied before starting (or materially changing) a processing activity (including checking supervisory authority high-risk lists where applicable).
    - key: dpia_performed_before_processing
      description: Where required, the DPIA is performed before processing begins (or before the change goes live), and outcomes inform design decisions.
    - key: dpia_includes_required_content
      description: 'The DPIA documents at least: (a) a systematic description of processing operations and purposes (including legitimate interest where applicable); (b) an assessment of necessity and proportionality; (c) an assessment of risks to rights and freedoms; and (d) the measures envisaged to address risks (safeguards, security measures, mechanisms to ensure GDPR compliance).'
    - key: stakeholder_and_dpo_involvement
      description: Appropriate stakeholders are involved (legal, security, engineering, product), and the DPO is consulted where required/appointed; consultation inputs and sign-offs are recorded.
    - key: mitigation_and_tracking
      description: DPIA-identified mitigations are tracked to implementation (tickets/controls), and residual risk acceptance is documented with appropriate approval.
    - key: kept_under_review
      description: DPIAs are kept under review and updated where processing risks change (e.g., new data sources, new AI models, new recipients/transfers, incidents, or material product changes).
  evidence_hints:
    required:
    - dpia_policy_or_standard_with_trigger_criteria (incl. when to perform, who approves)
    - dpia_template_covering_art35_7_sections
    - dpia_register_or_inventory
    - completed_dpia_examples (redacted)
    - records_of_dpo_and_stakeholder_consultation_and_signoff (redacted)
    - mitigation_tracking_evidence (e.g., tickets/control register linking to DPIA) (redacted)
    - residual_risk_acceptance_records (if any) (redacted)
    artifacts:
    - dpia_policy_or_standard_with_trigger_criteria (incl. when to perform, who approves)
    - dpia_template_covering_art35_7_sections
    - dpia_register_or_inventory
    - completed_dpia_examples (redacted)
    - records_of_dpo_and_stakeholder_consultation_and_signoff (redacted)
    - mitigation_tracking_evidence (e.g., tickets/control register linking to DPIA) (redacted)
    - residual_risk_acceptance_records (if any) (redacted)
    questions:
    - What criteria do you use to decide a DPIA is required, and do you check the relevant supervisory authority lists?
    - Can you show an example DPIA that includes all Art. 35(7) elements and led to concrete design/control changes?
    - How do you keep DPIAs up to date as products/models/data flows evolve?
    checks:
    - Confirm DPIA documentation covers Art. 35(7)(a)–(d) items and was completed before processing (or before the change went live).
    - Confirm mitigations are tracked to implementation and residual risk acceptance is documented.
  severity: high
  sources:
  - citation: GDPR Art. 35(1)
  - citation: GDPR Art. 35(3)
  - citation: GDPR Art. 35(7)
  - citation: GDPR Art. 35(9)
  - citation: GDPR Art. 35(11)
  - citation: GDPR Recital 90
  - citation: GDPR Recital 91
  - citation: GDPR Recital 92
  - citation: GDPR Recital 93
- id: GDPR-ART36-PRIOR-CONSULTATION
  title: Prior consultation with supervisory authority when DPIA indicates residual high risk
  scope:
    applies_to:
    - processing_activity
    - org
    roles:
    - controller
  condition: Only if entity_profile.residual_high_risk_after_mitigation is true (i.e., DPIA indicates a high risk would remain in the absence of measures to mitigate, or mitigations are insufficient and residual high risk remains)
  requirement:
    type: process_required
    must_include:
    - criteria_for_prior_consultation (when Art. 36 is triggered)
    - consultation_package (DPIA, purposes, safeguards, contact details, other required information)
    - legal_and_dpo_review_before_submission
    - timeline_and_tracking_of_sa_interactions
    - implementation_of_sa_advice_or_reasoned_deviation
  evidence_hints:
    required:
    - prior_consultation_procedure_or_playbook
    - dpia_showing_residual_high_risk_and_decision_to_consult (redacted)
    - supervisory_authority_submission_package_or_cover_letter (redacted)
    - records_of_sa_feedback_and_follow_up_actions (redacted)
    artifacts:
    - prior_consultation_procedure_or_playbook
    - dpia_showing_residual_high_risk_and_decision_to_consult (redacted)
    - supervisory_authority_submission_package_or_cover_letter (redacted)
    - records_of_sa_feedback_and_follow_up_actions (redacted)
    questions:
    - Who decides that residual high risk remains and that prior consultation is required?
    - What materials do you submit to the supervisory authority, and how do you track and implement their advice?
    checks:
    - Confirm the consultation package includes the DPIA and other information required by Art. 36(3).
  severity: high
  sources:
  - citation: GDPR Art. 36(1)
  - citation: GDPR Art. 36(2)
  - citation: GDPR Art. 36(3)
  - citation: GDPR Recital 94
- id: GDPR-ART37-DPO
  title: DPO appointed where required, with published contact details
  scope:
    applies_to:
    - org
    roles:
    - controller
    - processor
  condition: Only if entity_profile.public_authority_or_body is true OR (entity_profile.does_systematic_monitoring is true AND entity_profile.large_scale_processing is true) OR ((entity_profile.processes_special_categories is true OR entity_profile.processes_criminal_offence_data is true) AND entity_profile.large_scale_processing is true)
  requirement:
    type: decision_and_documentation
    must_include:
    - assessment_of_DPO_requirement (including rationale against Art. 37 triggers)
    - appointment_details_if_required (name/role, reporting line, independence)
    - public_contact_details (privacy notice and other easy-access channels)
    - scope_of_dpo_responsibility (which entities/processing are covered)
  evidence_hints:
    required:
    - dpo_requirement_assessment (documented analysis)
    - dpo_appointment_letter_or_contract (if required)
    - org_chart_or_reporting_line_showing_dpo_independence
    - published_dpo_contact_details (privacy_notice_or_website)
    artifacts:
    - dpo_requirement_assessment (documented analysis)
    - dpo_appointment_letter_or_contract (if required)
    - org_chart_or_reporting_line_showing_dpo_independence
    - published_dpo_contact_details (privacy_notice_or_website)
    questions:
    - Do your core activities involve regular and systematic monitoring on a large scale, or large-scale special category/criminal data processing?
    - Where are the DPO contact details published and how do requests reach the DPO?
    checks:
    - Confirm the organisation has documented its DPO assessment and, where required, can evidence appointment and published contact details.
  severity: medium
  sources:
  - citation: GDPR Art. 37(1)
  - citation: GDPR Art. 37(2)
  - citation: GDPR Art. 37(3)
  - citation: GDPR Art. 37(5)
  - citation: GDPR Art. 37(7)
  - citation: GDPR Recital 97
- id: GDPR-ART38-DPO-POSITION
  title: DPO is involved timely, supported, and able to operate independently without conflicts
  scope:
    applies_to:
    - org
    roles:
    - controller
    - processor
  condition: Only if a DPO is required/appointed for the organisation (see Art. 37 triggers)
  requirement:
    type: multi_obligation
    obligations:
    - key: timely_involvement
      description: The DPO is involved properly and in a timely manner in all issues relating to the protection of personal data (e.g., product changes, new processing activities, DPIAs, incidents, DSAR process design).
    - key: resources_and_access
      description: The organisation provides the DPO with necessary resources (time, budget, tools), access to personal data processing information, and access to relevant stakeholders to perform tasks.
    - key: independence_no_instructions
      description: The DPO does not receive instructions regarding the exercise of tasks; the organisation avoids interference and ensures the DPO can perform duties independently.
    - key: no_dismissal_or_penalisation
      description: The DPO is not dismissed or penalised for performing tasks (including raising concerns), and protections are documented.
    - key: reporting_to_highest_management
      description: The DPO reports directly to the highest management level and has an escalation path for unresolved privacy risks.
    - key: conflict_of_interest_managed
      description: Conflicts of interest are identified and managed (e.g., DPO does not hold a role that determines purposes/means of processing); conflict assessment is documented and reviewed.
    - key: contactability_for_data_subjects
      description: Data subjects can contact the DPO on issues related to processing of their personal data and exercise of their rights; communications are routed and tracked appropriately.
  evidence_hints:
    required:
    - dpo_job_description_and_reporting_line (shows direct reporting to highest management)
    - governance_policy_or_charter_describing_dpo_independence_and_no_instruction
    - dpo_resource_plan_or_budget_and_tooling_access_evidence
    - meeting_invites_or_change_management_gates_showing_dpo_involvement (redacted)
    - conflict_of_interest_assessment_for_dpo_role (and periodic review)
    - evidence_of_dpo_contact_channel_and_routing_workflow (e.g., inbox/ticket queue) (redacted)
    artifacts:
    - dpo_job_description_and_reporting_line (shows direct reporting to highest management)
    - governance_policy_or_charter_describing_dpo_independence_and_no_instruction
    - dpo_resource_plan_or_budget_and_tooling_access_evidence
    - meeting_invites_or_change_management_gates_showing_dpo_involvement (redacted)
    - conflict_of_interest_assessment_for_dpo_role (and periodic review)
    - evidence_of_dpo_contact_channel_and_routing_workflow (e.g., inbox/ticket queue) (redacted)
    questions:
    - How is the DPO brought into new projects/incidents/DSAR design early enough to influence outcomes?
    - What resources and access does the DPO have (people, systems, budget), and who do they report to?
    - How do you assess and prevent conflicts of interest for the DPO role?
    checks:
    - Confirm the DPO has direct reporting to highest management, documented independence, and conflict-of-interest controls.
  severity: high
  sources:
  - citation: GDPR Art. 38(1)
  - citation: GDPR Art. 38(2)
  - citation: GDPR Art. 38(3)
  - citation: GDPR Art. 38(4)
  - citation: GDPR Recital 97
- id: GDPR-ART39-DPO-TASKS
  title: DPO performs the tasks set out in Art. 39 and evidence of performance is maintained
  scope:
    applies_to:
    - org
    roles:
    - controller
    - processor
  condition: Only if a DPO is required/appointed for the organisation (see Art. 37 triggers)
  requirement:
    type: multi_obligation
    obligations:
    - key: inform_and_advise
      description: The DPO informs and advises the organisation and employees who carry out processing of their GDPR obligations and related data protection provisions.
    - key: monitor_compliance
      description: The DPO monitors compliance with the GDPR and internal policies (including assignment of responsibilities, awareness-raising and training, and audits).
    - key: advise_on_dpia
      description: The DPO provides advice where requested as regards DPIAs and monitors DPIA performance in accordance with Art. 35.
    - key: cooperate_with_sa
      description: The DPO cooperates with the supervisory authority.
    - key: act_as_contact_point
      description: The DPO acts as the contact point for the supervisory authority on issues related to processing (including prior consultation), and for data subjects where applicable.
    - key: task_recordkeeping
      description: Records/evidence are maintained showing DPO activities (advice memos, training, audits, DPIA inputs, SA interactions) and follow-up actions.
