meta:
  ruleset_id: "gdpr"
  version: "0.1"
  status: "draft"
  evaluation_profile_schema: "rules/gdpr/entity_profile.schema.yaml"
  jurisdiction: ["EU"]
  source:
    - name: "GDPR (Regulation (EU) 2016/679)"
      url: "https://eur-lex.europa.eu/eli/reg/2016/679/oj"
  notes:
    - "This ruleset is designed for SaaS/AI products. Some obligations vary depending on whether you are controller/processor/joint controller."

# Conventions
# - status: PASS/FAIL/PARTIAL/UNKNOWN
# - evidence artifacts can be: privacy_policy, DPIA, ROPA, DPA templates, incident_response_plan, security_controls, vendor_register, training_records

rules:
  # ------------------------------------------------------------
  # Foundations: Scope + Definitions (Art. 1–4)
  # ------------------------------------------------------------
  - id: "GDPR-ART1-SUBJECT-MATTER"
    title: "Organisation documents GDPR applicability context and objectives"
    scope:
      applies_to: ["org"]
      roles: ["controller", "processor", "joint_controller"]
    requirement:
      type: "document_required"
      document: "GDPR_applicability_statement"
      must_include:
        - "statement_that_ruleset_targets_processing_of_personal_data"
        - "high_level_summary_of_context_and_business_model"
        - "acknowledgement_of_fundamental_rights_focus_and_free_movement_context"
    evidence_hints:
      required:
        - "GDPR_applicability_statement"
      artifacts:
        - "GDPR_applicability_statement"
        - "data_inventory"
      questions:
        - "What is the product/service and what personal data is processed?"
        - "Who are the data subjects (customers, end-users, employees, prospects)?"
    severity: "low"
    sources:
      - citation: "GDPR Art. 1"
      - citation: "GDPR Recitals 1–4"

  - id: "GDPR-ART2-MATERIAL-SCOPE"
    title: "Material scope assessment documented (in-scope processing and exclusions)"
    scope:
      applies_to: ["org", "product"]
      roles: ["controller", "processor", "joint_controller"]
    requirement:
      type: "decision_and_documentation"
      must_include:
        - "whether_processing_is_automated_or_part_of_filing_system"
        - "whether_data_is_personal_data"
        - "assessment_of_household_exemption_applicability"
        - "assessment_of_law_enforcement_or_national_security_exclusions (if relevant)"
        - "scope_conclusion_and_rationale"
    evidence_hints:
      required:
        - "scope_assessment"
      artifacts:
        - "scope_assessment"
        - "data_inventory"
        - "architecture_overview"
      checks:
        - "Does the org process personal data by automated means or as part of a filing system?"
        - "Are any processing activities purely personal/household?"
    severity: "medium"
    sources:
      - citation: "GDPR Art. 2"
      - citation: "GDPR Recital 18"

  - id: "GDPR-ART3-TERRITORIAL-SCOPE"
    title: "Territorial scope assessment documented (EU establishment / targeting / monitoring)"
    scope:
      applies_to: ["org"]
      roles: ["controller", "processor", "joint_controller"]
    requirement:
      type: "decision_and_documentation"
      must_include:
        - "whether_established_in_eu"
        - "whether_processing_in_context_of_eu_establishment (if applicable)"
        - "whether_offers_goods_or_services_to_eu_data_subjects (if not established)"
        - "whether_monitors_behaviour_in_eu_data_subjects (if not established)"
        - "scope_conclusion_and_rationale"
    evidence_hints:
      required:
        - "territorial_scope_assessment"
      artifacts:
        - "territorial_scope_assessment"
        - "customer_geography_breakdown"
        - "marketing_website_targeting_evidence"
      questions:
        - "Do you have an EU establishment?"
        - "Do you target EU users (language/currency/shipping/support) or monitor behaviour?"
    severity: "high"
    sources:
      - citation: "GDPR Art. 3"
      - citation: "GDPR Recitals 22–25"

  - id: "GDPR-ART4-DEFINITIONS-AND-CLASSIFICATION"
    title: "Key GDPR definitions are operationalised (data classification and role mapping)"
    scope:
      applies_to: ["org", "product"]
      roles: ["controller", "processor", "joint_controller"]
    requirement:
      type: "multi_obligation"
      obligations:
        - key: "personal_data_definition_applied"
          description: "Organisation can identify what constitutes personal data in its context."
        - key: "processing_operations_catalogued"
          description: "Processing operations are described (collect, store, use, disclose, delete, etc.)."
        - key: "role_mapping_exists"
          description: "Controller/processor/joint-controller roles are mapped per processing purpose/workflow."
        - key: "recipient_third_party_concepts_used"
          description: "Distinguish recipients/third parties and document disclosures."
        - key: "pseudonymisation_anonymisation_terms_used"
          description: "Define and consistently apply pseudonymisation vs anonymisation (where claimed)."
    evidence_hints:
      required:
        - "data_inventory"
        - "role_matrix"
      artifacts:
        - "data_inventory"
        - "ROPA"
        - "role_matrix"
        - "data_classification_policy"
      checks:
        - "Is each data field tagged as personal / special category / criminal offence / not personal?"
        - "For each workflow, is it clear whether the org is controller or processor?"
    severity: "high"
    sources:
      - citation: "GDPR Art. 4"
      - citation: "GDPR Recitals 26, 30"

  # ------------------------------------------------------------
  # Art. 5–6: Principles + Lawfulness
  # ------------------------------------------------------------
  - id: "GDPR-ART5-PRINCIPLES"
    title: "Processing aligns with GDPR Art. 5 principles"
    scope:
      applies_to: ["product", "org"]
      roles: ["controller", "processor"]
    requirement:
      type: "multi_obligation"
      obligations:
        - key: "lawfulness_fairness_transparency"
          description: "Demonstrate lawful, fair and transparent processing."
        - key: "purpose_limitation"
          description: "Define purposes and avoid incompatible reuse."
        - key: "data_minimisation"
          description: "Collect/process only what is necessary."
        - key: "accuracy"
          description: "Keep personal data accurate and up to date."
        - key: "storage_limitation"
          description: "Retention periods defined; no indefinite storage."
        - key: "integrity_confidentiality"
          description: "Appropriate security measures for confidentiality/integrity."
        - key: "accountability"
          description: "Ability to demonstrate compliance."
    evidence_hints:
      required:
        - "data_inventory"
        - "retention_schedule"
      artifacts:
        - "data_inventory"
        - "retention_schedule"
        - "security_policy"
        - "privacy_policy"
        - "records_of_processing (ROPA)"
      checks:
        - "Is there a written retention schedule per data category and purpose?"
        - "Is there an owner accountable for privacy compliance?"
    severity: "high"
    sources:
      - citation: "GDPR Art. 5"
      - citation: "GDPR Recitals 39, 74"

  - id: "GDPR-ART6-LAWFUL-BASIS"
    title: "Each processing purpose has a lawful basis"
    scope:
      applies_to: ["product"]
      roles: ["controller"]
    requirement:
      type: "mapping_required"
      description: "For each purpose of processing, define and document a lawful basis."
      fields:
        - name: "purpose"
        - name: "data_categories"
        - name: "data_subject_categories"
        - name: "lawful_basis" # consent, contract, legal_obligation, vital_interests, public_task, legitimate_interests
        - name: "retention"
    evidence_hints:
      required:
        - "ROPA"
      artifacts: ["ROPA", "data_inventory"]
      questions:
        - "List all processing purposes (analytics, marketing, customer support, model training, fraud prevention, etc.)."
    severity: "high"
    sources:
      - citation: "GDPR Art. 6"
      - citation: "GDPR Recital 40"

  - id: "GDPR-ART6-LI-TEST"
    title: "Legitimate interests (if used) includes a documented balancing test"
    scope:
      applies_to: ["product"]
      roles: ["controller"]
      condition: "Only if lawful_basis includes legitimate_interests"
    requirement:
      type: "document_required"
      document: "legitimate_interests_assessment (LIA)"
      must_include:
        - "interest_pursued"
        - "necessity_assessment"
        - "balancing_test (impact on data subjects)"
        - "mitigations/safeguards"
    evidence_hints:
      required:
        - "LIA"
      artifacts: ["LIA"]
    severity: "high"
    sources:
      - citation: "GDPR Art. 6(1)(f)"
      - citation: "GDPR Recital 47"

  # ------------------------------------------------------------
  # Art. 7–11: Consent + sensitive data + identification context
  # ------------------------------------------------------------
  - id: "GDPR-ART7-CONSENT-CONDITIONS"
    title: "Consent (if relied upon) meets GDPR Art. 7 conditions"
    scope:
      applies_to: ["product", "product_ui", "org"]
      roles: ["controller"]
      condition: "Only if entity_profile.relies_on_consent == true"
    requirement:
      type: "multi_obligation"
      obligations:
        - key: "demonstrable_consent"
          description: "Controller can demonstrate that the data subject has consented (records/logs)."
        - key: "withdrawal_is_as_easy_as_giving"
          description: "Withdrawal is possible at any time and as easy as giving consent."
        - key: "consent_is_granular_and_unbundled"
          description: "Consent requests are specific and not bundled with unrelated terms."
        - key: "consent_withdrawal_does_not_affect_prior_processing"
          description: "Processing before withdrawal remains lawful; users are informed."
    evidence_hints:
      required:
        - "consent_records"
        - "consent_ui_or_flow_evidence"
      artifacts:
        - "consent_records"
        - "consent_preference_center"
        - "privacy_policy"
        - "ROPA"
      checks:
        - "Is there an auditable consent log (who/when/what/version) tied to purposes?"
        - "Can a user withdraw consent in-product without contacting support?"
    severity: "high"
    sources:
      - citation: "GDPR Art. 7"
      - citation: "GDPR Recitals 32, 42, 43"

  - id: "GDPR-ART8-CHILD-CONSENT-ISS"
    title: "Children's consent for information society services (if applicable) is handled correctly"
    scope:
      applies_to: ["product", "product_ui"]
      roles: ["controller"]
      condition: "Only if entity_profile.offers_information_society_services_directly_to_children == true and entity_profile.relies_on_consent == true"
    requirement:
      type: "multi_obligation"
      obligations:
        - key: "age_threshold_configured"
          description: "Age threshold is set to the applicable Member State age (13–16)."
        - key: "reasonable_efforts_to_verify_parental_authorisation"
          description: "Where required, controller makes reasonable efforts to verify holder of parental responsibility."
        - key: "child_friendly_information"
          description: "Information provided to children is in clear, age-appropriate language."
    evidence_hints:
      required:
        - "age_gate_or_age_assurance_design"
      artifacts:
        - "age_gate_or_age_assurance_design"
        - "parental_consent_flow"
        - "privacy_notice_child_version (if used)"
      questions:
        - "Do you allow sign-up or use by under-16s (or under local threshold) without parental authorisation?"
    severity: "high"
    sources:
      - citation: "GDPR Art. 8"
      - citation: "GDPR Recital 38"

  - id: "GDPR-ART9-SPECIAL-CATEGORIES"
    title: "Special category data processing has an Art. 9(2) condition and safeguards (if applicable)"
    scope:
      applies_to: ["product", "org"]
      roles: ["controller", "processor"]
      condition: "Only if entity_profile.processes_special_categories == true"
    requirement:
      type: "mapping_required"
      description: "For each special category processing activity, document the Art. 9(2) condition and safeguards."
      fields:
        - name: "purpose"
        - name: "special_category_data_types"
        - name: "art9_condition" # e.g., explicit_consent, employment_law, vital_interests, substantial_public_interest, healthcare, etc.
        - name: "additional_safeguards" # minimisation, access restriction, encryption, separation, etc.
    evidence_hints:
      required:
        - "ROPA"
        - "risk_assessment_or_DPIA"
      artifacts:
        - "ROPA"
        - "DPIA"
        - "risk_register"
        - "security_controls"
      checks:
        - "Is explicit consent used where needed, and recorded separately from other consents?"
        - "Are access controls and audit logs stronger for special category fields?"
    severity: "high"
    sources:
      - citation: "GDPR Art. 9"
      - citation: "GDPR Recitals 51, 52"

  - id: "GDPR-ART10-CRIMINAL-OFFENCE-DATA"
    title: "Criminal offence/conviction data processing is authorised and controlled (if applicable)"
    scope:
      applies_to: ["product", "org"]
      roles: ["controller", "processor"]
      condition: "Only if entity_profile.processes_criminal_offence_data == true"
    requirement:
      type: "decision_and_documentation"
      must_include:
        - "identification_of_criminal_offence_data_categories"
        - "legal_authority_or_union_member_state_law_basis"
        - "appropriate_safeguards_and_access_controls"
        - "retention_limits"
    evidence_hints:
      required:
        - "ROPA"
        - "legal_basis_memo_for_art10"
      artifacts:
        - "ROPA"
        - "legal_basis_memo_for_art10"
        - "access_control_policy"
        - "retention_schedule"
    severity: "high"
    sources:
      - citation: "GDPR Art. 10"
      - citation: "GDPR Recital 50"

  - id: "GDPR-ART11-NO-IDENTIFICATION"
    title: "Where identification is not required, organisation documents how Art. 11 is applied (if applicable)"
    scope:
      applies_to: ["org", "product"]
      roles: ["controller"]
      condition: "Only if entity_profile.can_identify_data_subjects == false"
    requirement:
      type: "multi_obligation"
      obligations:
        - key: "no_additional_data_collected_for_identification"
          description: "Controller does not maintain or acquire additional information solely to identify data subjects for compliance."
        - key: "ability_to_demonstrate_inability_to_identify"
          description: "Controller can demonstrate it is not in a position to identify the data subject."
        - key: "inform_data_subject_where_possible"
          description: "Where possible, controller informs data subjects that it cannot identify them (including consequences for rights)."
    evidence_hints:
      required:
        - "art11_rationale"
      artifacts:
        - "art11_rationale"
        - "architecture_overview"
        - "privacy_notice"
      questions:
        - "Do you store only aggregated/anonymised data, or do you still have identifiers (email, IP, device IDs)?"
    severity: "medium"
    sources:
      - citation: "GDPR Art. 11"
      - citation: "GDPR Recital 57"

  # ------------------------------------------------------------
  # Transparency: Art. 12–14
  # ------------------------------------------------------------
  - id: "GDPR-ART12-TRANSPARENCY"
    title: "Data subject communications and rights handling meet Art. 12 (clarity, facilitation, timelines, fees)"
    scope:
      applies_to: ["privacy_notice", "product_ui", "org"]
      roles: ["controller"]
    requirement:
      type: "multi_obligation"
      obligations:
        - key: "clear_and_accessible_information"
          description: "Information is concise, transparent, intelligible, easily accessible, and in clear language."
        - key: "rights_facilitation"
          description: "Controller facilitates the exercise of data subject rights (incl. electronic means where appropriate)."
        - key: "identity_verification_is_proportionate"
          description: "Identity verification is reasonable and proportionate to the risk."
        - key: "timelines_managed"
          description: "Responses without undue delay and within 1 month; extensions (up to 2 months) are tracked and communicated with reasons."
        - key: "free_of_charge_default"
          description: "Information and actions are free of charge by default; any fees/refusals are limited to manifestly unfounded/excessive requests and are documented."
        - key: "communication_of_actions_taken"
          description: "Controller informs data subject of actions taken (or reasons for refusal) and the possibility of complaint."
    evidence_hints:
      required:
        - "DSAR_procedure"
        - "request_intake_and_tracking_workflow"
      artifacts:
        - "DSAR_procedure"
        - "ticketing_workflow"
        - "DSAR_templates"
        - "in_product_rights_portal (if available)"
        - "privacy_policy"
      checks:
        - "Is there a defined intake channel and ownership for requests?"
        - "Is there a timer/SLAs to ensure 1-month response and extension notice?"
        - "Is there a documented policy for manifestly unfounded/excessive requests?"
    severity: "high"
    sources:
      - citation: "GDPR Art. 12"
      - citation: "GDPR Recitals 58–60"

  - id: "GDPR-ART13-NOTICE-DIRECT"
    title: "Privacy notice covers mandatory disclosures when personal data is collected from the data subject"
    scope:
      applies_to: ["privacy_notice"]
      roles: ["controller"]
      condition: "Only if entity_profile.collects_personal_data_from_data_subject == true"
    requirement:
      type: "section_presence"
      must_include_sections:
        - "controller_identity_and_contact"
        - "representative_contact (if applicable)"
        - "dpo_contact (if applicable)"
        - "purposes_and_legal_bases"
        - "legitimate_interests (if applicable)"
        - "recipients_or_categories"
        - "international_transfers_and_safeguards (if applicable)"
        - "retention_periods"
        - "data_subject_rights"
        - "right_to_withdraw_consent (if applicable)"
        - "right_to_object (if applicable)"
        - "right_to_lodge_complaint"
        - "whether_provision_is_statutory_or_contractual"
        - "automated_decision_making_and_profiling (if applicable)"
    evidence_hints:
      required:
        - "privacy_policy"
      artifacts: ["privacy_policy", "ROPA", "data_inventory"]
      search_terms: ["controller", "purposes", "legal basis", "recipients", "transfer", "retention", "rights", "complaint", "automated", "object"]
    severity: "high"
    sources:
      - citation: "GDPR Art. 13"
      - citation: "GDPR Recital 60"

  - id: "GDPR-ART13-TIMING-AT-COLLECTION"
    title: "Art. 13 information is provided at the time of collection"
    scope:
      applies_to: ["product_ui", "privacy_notice", "org"]
      roles: ["controller"]
      condition: "Only if entity_profile.collects_personal_data_from_data_subject == true"
    requirement:
      type: "process_required"
      must_include:
        - "notice_presented_at_or_before_collection_points (signup/forms/checkout/support/chat/etc.)"
        - "link_or_accessible_layered_notice_in_context"
        - "versioning_or_change_management_for_notice_text"
    evidence_hints:
      required:
        - "collection_points_inventory"
        - "notice_at_collection_evidence"
      artifacts:
        - "collection_points_inventory"
        - "notice_at_collection_evidence (screenshots/copies)"
        - "privacy_policy"
        - "product_copy_repository (if used)"
      questions:
        - "List every UI/API touchpoint where personal data is first collected; show where the notice is displayed or linked."
    severity: "high"
    sources:
      - citation: "GDPR Art. 13(1)"
      - citation: "GDPR Recital 61"

  - id: "GDPR-ART14-NOTICE-INDIRECT"
    title: "Privacy notice covers mandatory disclosures when personal data is not obtained from the data subject"
    scope:
      applies_to: ["privacy_notice"]
      roles: ["controller"]
      condition: "Only if entity_profile.obtains_personal_data_not_from_data_subject == true"
    requirement:
      type: "section_presence"
      must_include_sections:
        - "controller_identity_and_contact"
        - "representative_contact (if applicable)"
        - "dpo_contact (if applicable)"
        - "purposes_and_legal_bases"
        - "categories_of_personal_data"
        - "source_of_data"
        - "whether_from_public_sources"
        - "legitimate_interests (if applicable)"
        - "recipients_or_categories"
        - "international_transfers_and_safeguards (if applicable)"
        - "retention_periods"
        - "data_subject_rights"
        - "right_to_withdraw_consent (if applicable)"
        - "right_to_object (if applicable)"
        - "right_to_lodge_complaint"
        - "automated_decision_making_and_profiling (if applicable)"
    evidence_hints:
      required:
        - "privacy_policy"
        - "data_inventory"
      artifacts: ["privacy_policy", "data_inventory", "ROPA", "data_source_register (if used)"]
      questions:
        - "What are the sources of personal data (customers, partners, public sources, data brokers)?"
    severity: "high"
    sources:
      - citation: "GDPR Art. 14(1)–(2)"
      - citation: "GDPR Recital 61"

  - id: "GDPR-ART14-TIMING"
    title: "Art. 14 information is provided within required timelines for indirect collection"
    scope:
      applies_to: ["org", "product", "privacy_notice"]
      roles: ["controller"]
      condition: "Only if entity_profile.obtains_personal_data_not_from_data_subject == true"
    requirement:
      type: "multi_obligation"
      obligations:
        - key: "within_reasonable_period_max_one_month"
          description: "Provide Art. 14 information within a reasonable period after obtaining the data, and at the latest within one month."
        - key: "at_first_communication"
          description: "If the personal data is used to communicate with the data subject, provide the information at the latest at the time of the first communication."
        - key: "at_first_disclosure"
          description: "If the personal data is intended to be disclosed to another recipient, provide the information at the latest when the data is first disclosed."
    evidence_hints:
      required:
        - "data_source_onboarding_or_procurement_process"
        - "notice_delivery_workflow_for_indirect_data"
      artifacts:
        - "data_source_onboarding_or_procurement_process"
        - "notice_delivery_workflow_for_indirect_data"
        - "outreach_templates"
        - "logs_or_ticketing_evidence"
        - "privacy_policy"
    severity: "high"
    sources:
      - citation: "GDPR Art. 14(3)"
      - citation: "GDPR Recital 61"

  - id: "GDPR-ART14-EXEMPTIONS-5"
    title: "If relying on Art. 14(5) exemptions, the organisation documents and applies them correctly"
    scope:
      applies_to: ["org", "privacy_notice"]
      roles: ["controller"]
      condition: "Only if entity_profile.obtains_personal_data_not_from_data_subject == true and entity_profile.art14_5_exemptions_relied_on is not empty"
    requirement:
      type: "decision_and_documentation"
      must_include:
        - "which_exemption_applies (Art14(5)(a)-(d))"
        - "rationale_and_supporting_evidence"
        - "safeguards_and_measures_to_protect_data_subject_rights"
        - "where_disproportionate_effort_used: public_information_measures (e.g., publish notice)"
        - "where_law_provides: citation_to_union_or_member_state_law_and_protective_measures"
        - "where_confidentiality: description_of_professional_secrecy_basis"
    evidence_hints:
      required:
        - "art14_exemptions_memo"
      artifacts:
        - "art14_exemptions_memo"
        - "DPIA_or_risk_assessment (if relevant)"
        - "public_notice_or_transparency_page (if used)"
        - "legal_basis_register"
    severity: "high"
    sources:
      - citation: "GDPR Art. 14(5)"
      - citation: "GDPR Recital 62"

  # ------------------------------------------------------------
  # Data subject rights: Art. 15–22
  # ------------------------------------------------------------
  - id: "GDPR-ART15-ACCESS"
    title: "Right of access process exists and can be fulfilled"
    scope:
      applies_to: ["org", "product"]
      roles: ["controller"]
    requirement:
      type: "process_required"
      must_include:
        - "identity_verification"
        - "ability_to_provide_copy_of_data"
        - "ability_to_provide_processing_info"
        - "one_month_deadline_tracking"
    evidence_hints:
      artifacts: ["DSAR_procedure", "ticketing_workflow"]
    severity: "high"
    sources:
      - citation: "GDPR Art. 15; Art. 12(3)"

  - id: "GDPR-ART16-RECTIFICATION"
    title: "Right to rectification supported"
    scope:
      applies_to: ["org", "product"]
      roles: ["controller"]
    requirement:
      type: "process_required"
      must_include: ["correction_workflow", "propagation_to_downstream_systems"]
    evidence_hints:
      artifacts: ["DSAR_procedure"]
    severity: "medium"
    sources:
      - citation: "GDPR Art. 16"

  - id: "GDPR-ART17-ERASURE"
    title: "Right to erasure supported (where applicable)"
    scope:
      applies_to: ["org", "product"]
      roles: ["controller"]
    requirement:
      type: "process_required"
      must_include:
        - "deletion_workflow"
        - "exceptions_handling (legal obligations, defence of claims)"
        - "deletion_in_backups_policy"
    evidence_hints:
      artifacts: ["DSAR_procedure", "retention_schedule"]
    severity: "high"
    sources:
      - citation: "GDPR Art. 17"

  - id: "GDPR-ART18-RESTRICTION"
    title: "Right to restriction of processing supported"
    scope:
      applies_to: ["org", "product"]
      roles: ["controller"]
    requirement:
      type: "process_required"
      must_include: ["restriction_flagging", "downstream_notification"]
    severity: "medium"
    sources:
      - citation: "GDPR Art. 18"

  - id: "GDPR-ART20-PORTABILITY"
    title: "Data portability for applicable processing supported"
    scope:
      applies_to: ["product"]
      roles: ["controller"]
      condition: "Only for consent/contract processing carried out by automated means"
    requirement:
      type: "capability_required"
      must_include:
        - "export_in_structured_common_machine_readable_format"
        - "ability_to_transmit_to_another_controller (where feasible)"
    evidence_hints:
      artifacts: ["product_export_feature", "DSAR_procedure"]
    severity: "medium"
    sources:
      - citation: "GDPR Art. 20"

  - id: "GDPR-ART21-OBJECT"
    title: "Right to object supported (incl. direct marketing)"
    scope:
      applies_to: ["org", "product", "marketing"]
      roles: ["controller"]
    requirement:
      type: "process_required"
      must_include:
        - "objection_intake"
        - "direct_marketing_opt_out_immediate"
        - "legitimate_interests_override_assessment"
    severity: "high"
    sources:
      - citation: "GDPR Art. 21"

  - id: "GDPR-ART22-ADM"
    title: "Automated decision-making/profiling safeguards (if applicable)"
    scope:
      applies_to: ["product"]
      roles: ["controller"]
      condition: "Only if decisions with legal/similar significant effects are made solely by automated means"
    requirement:
      type: "safeguards_required"
      must_include:
        - "inform_users"
        - "right_to_human_intervention"
        - "ability_to_contest"
        - "explain_logic_and_consequences_at_high_level"
    severity: "high"
    sources:
      - citation: "GDPR Art. 22"

  # ------------------------------------------------------------
  # Security + breaches: Art. 32–34
  # ------------------------------------------------------------
  - id: "GDPR-ART32-SECURITY"
    title: "Appropriate technical and organisational measures (TOMs) implemented"
    scope:
      applies_to: ["org", "product"]
      roles: ["controller", "processor"]
    requirement:
      type: "control_set"
      controls:
        - "access_control_and_least_privilege"
        - "encryption_in_transit"
        - "encryption_at_rest (risk-based)"
        - "confidentiality_integrity_availability_resilience"
        - "backup_and_recovery"
        - "regular_testing_and_assessment"
    evidence_hints:
      artifacts: ["security_policy", "risk_assessment", "pen_test_reports", "access_reviews"]
    severity: "high"
    sources:
      - citation: "GDPR Art. 32"

  - id: "GDPR-ART33-BREACH-SUPERVISORY"
    title: "Breach notification to supervisory authority within 72 hours (when required)"
    scope:
      applies_to: ["org"]
      roles: ["controller"]
    requirement:
      type: "process_required"
      must_include:
        - "breach_detection_and_triage"
        - "72h_timer"
        - "notification_template (nature, categories, approx numbers, contact, consequences, measures)"
        - "breach_register"
    evidence_hints:
      artifacts: ["incident_response_plan", "breach_register", "tabletop_exercises"]
    severity: "high"
    sources:
      - citation: "GDPR Art. 33"

  - id: "GDPR-ART34-BREACH-DATA-SUBJECT"
    title: "Breach communication to data subjects when high risk"
    scope:
      applies_to: ["org"]
      roles: ["controller"]
    requirement:
      type: "process_required"
      must_include:
        - "high_risk_assessment"
        - "communication_template"
        - "exceptions_handling (e.g., encryption/mitigation)"
    evidence_hints:
      artifacts: ["incident_response_plan"]
    severity: "high"
    sources:
      - citation: "GDPR Art. 34"

  # ------------------------------------------------------------
  # Governance & documentation: Art. 24–31, 35–37
  # ------------------------------------------------------------
  - id: "GDPR-ART30-ROPA"
    title: "Records of processing activities (ROPA) maintained (where required)"
    scope:
      applies_to: ["org"]
      roles: ["controller", "processor"]
    requirement:
      type: "document_required"
      document: "ROPA"
      must_include:
        - "purposes"
        - "categories_of_data_subjects_and_data"
        - "categories_of_recipients"
        - "transfers"
        - "retention"
        - "security_measures"
    severity: "high"
    sources:
      - citation: "GDPR Art. 30"

  - id: "GDPR-ART28-DPA"
    title: "Processor agreements (DPA) include Art. 28 mandatory clauses"
    scope:
      applies_to: ["contracts"]
      roles: ["controller"]
      condition: "Only if you use processors"
    requirement:
      type: "clause_presence"
      must_include_clauses:
        - "processing_on_documented_instructions"
        - "confidentiality"
        - "security_measures"
        - "subprocessor_conditions"
        - "assistance_with_rights"
        - "assistance_with_security_DPIA"
        - "deletion_or_return_end_of_services"
        - "audits_and_information"
    evidence_hints:
      artifacts: ["DPA_template", "vendor_contracts"]
    severity: "high"
    sources:
      - citation: "GDPR Art. 28"

  - id: "GDPR-ART35-DPIA"
    title: "DPIA performed for high-risk processing (including some AI uses)"
    scope:
      applies_to: ["product"]
      roles: ["controller"]
    requirement:
      type: "process_required"
      must_include:
        - "screening_for_high_risk"
        - "DPIA_template"
        - "assessment_of_necessity_proportionality"
        - "risk_assessment"
        - "mitigation_measures"
    evidence_hints:
      artifacts: ["DPIA", "risk_register"]
      questions:
        - "Do you do large-scale profiling, special category data, systematic monitoring, or new technologies impacting individuals?"
    severity: "high"
    sources:
      - citation: "GDPR Art. 35"

  - id: "GDPR-ART37-DPO"
    title: "DPO appointed where required"
    scope:
      applies_to: ["org"]
      roles: ["controller", "processor"]
    requirement:
      type: "decision_and_documentation"
      must_include:
        - "assessment_of_DPO_requirement"
        - "appointment_details_if_required"
        - "public_contact_details"
    evidence_hints:
      artifacts: ["DPO_assessment", "privacy_notice"]
    severity: "medium"
    sources:
      - citation: "GDPR Art. 37"
