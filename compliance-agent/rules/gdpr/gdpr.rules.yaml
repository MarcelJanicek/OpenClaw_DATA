    - controller
    - processor
  condition: Only if entity_profile.public_authority_or_body is true OR (entity_profile.does_systematic_monitoring is true AND entity_profile.large_scale_processing is true) OR ((entity_profile.processes_special_categories is true OR entity_profile.processes_criminal_offence_data is true) AND entity_profile.large_scale_processing is true)
  requirement:
    type: decision_and_documentation
    must_include:
    - assessment_of_DPO_requirement (including rationale against Art. 37 triggers)
    - appointment_details_if_required (name/role, reporting line, independence)
    - public_contact_details (privacy notice and other easy-access channels)
    - scope_of_dpo_responsibility (which entities/processing are covered)
  evidence_hints:
    required:
    - dpo_requirement_assessment (documented analysis)
    - dpo_appointment_letter_or_contract (if required)
    - org_chart_or_reporting_line_showing_dpo_independence
    - published_dpo_contact_details (privacy_notice_or_website)
    artifacts:
    - dpo_requirement_assessment (documented analysis)
    - dpo_appointment_letter_or_contract (if required)
    - org_chart_or_reporting_line_showing_dpo_independence
    - published_dpo_contact_details (privacy_notice_or_website)
    questions:
    - Do your core activities involve regular and systematic monitoring on a large scale, or large-scale special category/criminal data processing?
    - Where are the DPO contact details published and how do requests reach the DPO?
    checks:
    - Confirm the organisation has documented its DPO assessment and, where required, can evidence appointment and published contact details.
  severity: medium
  sources:
  - citation: GDPR Art. 37(1)
  - citation: GDPR Art. 37(2)
  - citation: GDPR Art. 37(3)
  - citation: GDPR Art. 37(5)
  - citation: GDPR Art. 37(7)
  - citation: GDPR Recital 97
- id: GDPR-ART38-DPO-POSITION
  title: DPO is involved timely, supported, and able to operate independently without conflicts
  scope:
    applies_to:
    - org
    roles:
    - controller
    - processor
  condition: Only if a DPO is required/appointed for the organisation (see Art. 37 triggers)
  requirement:
    type: multi_obligation
    obligations:
    - key: timely_involvement
      description: The DPO is involved properly and in a timely manner in all issues relating to the protection of personal data (e.g., product changes, new processing activities, DPIAs, incidents, DSAR process design).
    - key: resources_and_access
      description: The organisation provides the DPO with necessary resources (time, budget, tools), access to personal data processing information, and access to relevant stakeholders to perform tasks.
    - key: independence_no_instructions
      description: The DPO does not receive instructions regarding the exercise of tasks; the organisation avoids interference and ensures the DPO can perform duties independently.
    - key: no_dismissal_or_penalisation
      description: The DPO is not dismissed or penalised for performing tasks (including raising concerns), and protections are documented.
    - key: reporting_to_highest_management
      description: The DPO reports directly to the highest management level and has an escalation path for unresolved privacy risks.
    - key: conflict_of_interest_managed
      description: Conflicts of interest are identified and managed (e.g., DPO does not hold a role that determines purposes/means of processing); conflict assessment is documented and reviewed.
    - key: contactability_for_data_subjects
      description: Data subjects can contact the DPO on issues related to processing of their personal data and exercise of their rights; communications are routed and tracked appropriately.
  evidence_hints:
    required:
    - dpo_job_description_and_reporting_line (shows direct reporting to highest management)
    - governance_policy_or_charter_describing_dpo_independence_and_no_instruction
    - dpo_resource_plan_or_budget_and_tooling_access_evidence
    - meeting_invites_or_change_management_gates_showing_dpo_involvement (redacted)
    - conflict_of_interest_assessment_for_dpo_role (and periodic review)
    - evidence_of_dpo_contact_channel_and_routing_workflow (e.g., inbox/ticket queue) (redacted)
    artifacts:
    - dpo_job_description_and_reporting_line (shows direct reporting to highest management)
    - governance_policy_or_charter_describing_dpo_independence_and_no_instruction
    - dpo_resource_plan_or_budget_and_tooling_access_evidence
    - meeting_invites_or_change_management_gates_showing_dpo_involvement (redacted)
    - conflict_of_interest_assessment_for_dpo_role (and periodic review)
    - evidence_of_dpo_contact_channel_and_routing_workflow (e.g., inbox/ticket queue) (redacted)
    questions:
    - How is the DPO brought into new projects/incidents/DSAR design early enough to influence outcomes?
    - What resources and access does the DPO have (people, systems, budget), and who do they report to?
    - How do you assess and prevent conflicts of interest for the DPO role?
    checks:
    - Confirm the DPO has direct reporting to highest management, documented independence, and conflict-of-interest controls.
  severity: high
  sources:
  - citation: GDPR Art. 38(1)
  - citation: GDPR Art. 38(2)
  - citation: GDPR Art. 38(3)
  - citation: GDPR Art. 38(4)
  - citation: GDPR Recital 97
- id: GDPR-ART39-DPO-TASKS
  title: DPO performs the tasks set out in Art. 39 and evidence of performance is maintained
  scope:
    applies_to:
    - org
    roles:
    - controller
    - processor
  condition: Only if a DPO is required/appointed for the organisation (see Art. 37 triggers)
  requirement:
    type: multi_obligation
    obligations:
    - key: inform_and_advise
      description: The DPO informs and advises the organisation and employees who carry out processing of their GDPR obligations and related data protection provisions.
    - key: monitor_compliance
      description: The DPO monitors compliance with the GDPR and internal policies (including assignment of responsibilities, awareness-raising and training, and audits).
    - key: advise_on_dpia
      description: The DPO provides advice where requested as regards DPIAs and monitors DPIA performance in accordance with Art. 35.
    - key: cooperate_with_sa
      description: The DPO cooperates with the supervisory authority.
    - key: act_as_contact_point
      description: The DPO acts as the contact point for the supervisory authority on issues related to processing (including prior consultation), and for data subjects where applicable.
    - key: task_recordkeeping
      description: Records/evidence are maintained showing DPO activities (advice memos, training, audits, DPIA inputs, SA interactions) and follow-up actions.
  evidence_hints:
    required:
    - dpo_annual_plan_or_activity_log (advice, audits, training, reviews)
    - dpo_guidance_or_advice_examples (redacted)
    - training_program_materials_and_completion_tracking (privacy)
    - audit_or_compliance_monitoring_reports_and_followups (redacted)
    - dpia_records_showing_dpo_involvement (redacted)
    - records_of_sa_communications_or_contact_point_handling (redacted)
    artifacts:
    - dpo_annual_plan_or_activity_log (advice, audits, training, reviews)
    - dpo_guidance_or_advice_examples (redacted)
    - training_program_materials_and_completion_tracking (privacy)
    - audit_or_compliance_monitoring_reports_and_followups (redacted)
    - dpia_records_showing_dpo_involvement (redacted)
    - records_of_sa_communications_or_contact_point_handling (redacted)
    questions:
    - What has the DPO done in the last 6–12 months (advice provided, audits, trainings, DPIA involvement), and what evidence exists?
    - How does the DPO track issues to remediation and verify follow-through?
    checks:
    - Confirm there is a documented DPO activity log/plan and evidence of advice/audits/training and DPIA involvement.
  severity: medium
  sources:
  - citation: GDPR Art. 39(1)
  - citation: GDPR Art. 39(2)
  - citation: GDPR Recital 97
- id: GDPR-ART40-CODES-OF-CONDUCT
  title: Where relying on an approved code of conduct, adherence and monitoring are documented and maintained
  scope:
    applies_to:
    - org
    - processing_activity
    - product
    roles:
    - controller
    - processor
  condition: Only if entity_profile.adheres_to_gdpr_code_of_conduct is true (i.e., you claim adherence to an approved GDPR code of conduct as a compliance or assurance mechanism)
  requirement:
    type: multi_obligation
    obligations:
    - key: code_is_approved_and_applicable
      description: The specific code of conduct is identified (name/version/scope), approved under Art. 40 (and, where relevant, extended to transfers under Art. 40(3)), and its scope is applicable to the organisation's processing.
    - key: adherence_commitment_and_internal_mapping
      description: The organisation has a documented commitment to comply with the code and a mapping from code requirements to internal controls/processes (including owners and evidence locations).
    - key: monitoring_body_and_process
      description: The monitoring body (if applicable) is identified and engagement/monitoring processes are in place (audit cadence, reporting, issue handling, withdrawal/suspension conditions).
    - key: changes_and_nonconformities_managed
      description: Processes exist to manage code updates and any nonconformities (gap remediation plans, timelines, re-assessment, and communications where required).
    - key: transparency_about_claims
      description: Public/commercial claims of code adherence are accurate, bounded to scope, and supported by current evidence; marketing/contract materials are kept consistent with actual adherence status.
  evidence_hints:
    required:
    - code_of_conduct_identification (name_version_scope_and_link)
    - evidence_of_code_approval_status (e.g., SA/EDPB register entry)
    - code_to_controls_mapping_and_owner_assignments
    - monitoring_body_engagement_evidence_or_audit_reports (redacted)
    - nonconformity_and_remediation_records (if any) (redacted)
    - public_or_contractual_claims_about_code_adherence (and review/signoff)
    artifacts:
    - code_of_conduct_text_or_reference
    - code_of_conduct_identification (name_version_scope_and_link)
    - evidence_of_code_approval_status (e.g., SA/EDPB register entry)
    - code_to_controls_mapping_and_owner_assignments
    - monitoring_body_engagement_evidence_or_audit_reports (redacted)
    - nonconformity_and_remediation_records (if any) (redacted)
    - public_or_contractual_claims_about_code_adherence (and review/signoff)
    questions:
    - Which approved GDPR code of conduct do you adhere to, and what is its scope relative to your processing?
    - How is adherence monitored (by whom, how often), and how do you handle findings/nonconformities?
    checks:
    - Confirm code adherence is scoped, evidenced, and kept current (not a one-time claim).
  severity: medium
  sources:
  - citation: GDPR Art. 40(1)
  - citation: GDPR Art. 40(2)
  - citation: GDPR Art. 40(4)
  - citation: GDPR Recital 98
- id: GDPR-ART41-MONITORING-BODIES
  title: If acting as an Art. 41 monitoring body for a code of conduct, independence and monitoring procedures are established
  scope:
    applies_to:
    - org
  roles:
  - monitoring_body
  condition: Only if entity_profile.is_art41_monitoring_body is true (i.e., the organisation is accredited to monitor compliance with an approved code of conduct)
  requirement:
    type: multi_obligation
    obligations:
    - key: accreditation_and_independence
      description: Accreditation under Art. 41 is evidenced, and governance ensures appropriate independence and expertise to monitor the code.
    - key: monitoring_procedures
      description: Documented monitoring procedures exist (assessment criteria, audit methods, decision-making, frequency, reporting, complaints handling).
    - key: enforcement_and_sanctions
      description: Procedures exist to address noncompliance (corrective actions, suspension/withdrawal of adherence, escalation to supervisory authorities where appropriate).
    - key: transparency_and_recordkeeping
      description: Monitoring outcomes and key decisions are recorded; registers/listings of adherent entities and status are maintained where required.
  evidence_hints:
    required:
    - accreditation_decision_or_certificate_as_monitoring_body
    - monitoring_body_governance_and_independence_policy
    - monitoring_procedures_and_assessment_criteria
    - sample_monitoring_reports_and_noncompliance_handling_records (redacted)
    - register_of_adherent_entities_and_status (if maintained)
    artifacts:
    - accreditation_decision_or_certificate_as_monitoring_body
    - monitoring_body_governance_and_independence_policy
    - monitoring_procedures_and_assessment_criteria
    - complaints_and_appeals_process
    - sample_monitoring_reports_and_noncompliance_handling_records (redacted)
    - register_of_adherent_entities_and_status (if maintained)
    questions:
    - What is your accredited scope as a monitoring body, and how do you ensure independence and competence?
    - How do you conduct monitoring and enforce consequences for noncompliance?
  severity: medium
  sources:
  - citation: GDPR Art. 41(1)
  - citation: GDPR Art. 41(2)
  - citation: GDPR Art. 41(4)
- id: GDPR-ART42-CERTIFICATION
  title: Where relying on GDPR certification/seals/marks, certification scope, validity, and ongoing compliance are maintained
  scope:
    applies_to:
    - org
    - product
    - system
    - processing_activity
  roles:
  - controller
  - processor
  condition: Only if entity_profile.relies_on_gdpr_certification is true (i.e., you claim or rely on GDPR certification, seals, or marks under Art. 42)
  requirement:
    type: multi_obligation
    obligations:
    - key: certification_identified_and_valid
      description: The certification/seal/mark is identified (scheme name/version/scope), is current/valid (not expired/withdrawn), and its scope matches the processing/products/systems claimed.
    - key: certification_body_and_criteria
      description: The certification body and scheme criteria are documented, and internal controls are mapped to certification requirements (including evidence locations and owners).
    - key: ongoing_compliance_and_surveillance
      description: Processes exist to maintain compliance (surveillance audits, change management triggers, recertification timeline) and to handle findings/nonconformities.
    - key: accurate_public_claims
      description: Public and contractual claims about certification are accurate, do not overstate scope, and are updated promptly if certification status changes.
  evidence_hints:
    required:
    - certification_certificate_or_attestation (with scope_and_validity)
    - certification_scheme_criteria_and_scope_statement
    - mapping_of_certification_criteria_to_controls_and_evidence
    - surveillance_audit_reports_and_corrective_action_records (redacted)
    - public_or_contractual_claims_about_certification (and review/signoff)
    artifacts:
    - certification_certificate_or_attestation (with scope_and_validity)
    - certification_scheme_criteria_and_scope_statement
    - mapping_of_certification_criteria_to_controls_and_evidence
    - surveillance_audit_reports_and_corrective_action_records (redacted)
    - change_management_policy_linking_changes_to_recertification_review
    - public_or_contractual_claims_about_certification (and review/signoff)
    questions:
    - What GDPR certification/seal/mark do you rely on, what is its scope, and is it current?
    - How do you ensure material product/system changes trigger surveillance/recertification review?
  severity: medium
  sources:
  - citation: GDPR Art. 42(1)
  - citation: GDPR Art. 42(4)
  - citation: GDPR Art. 42(7)
  - citation: GDPR Recital 100
- id: GDPR-ART43-CERTIFICATION-BODIES
  title: If acting as a GDPR certification body, accreditation and certification procedures are established and maintained
  scope:
    applies_to:
    - org
  roles:
  - certification_body
  condition: Only if entity_profile.is_art43_certification_body is true (i.e., the organisation is accredited to issue GDPR certifications/seals/marks)
  requirement:
    type: multi_obligation
    obligations:
    - key: accreditation_status
      description: Accreditation under Art. 43 is evidenced (by competent supervisory authority and/or national accreditation body) and kept current.
    - key: certification_procedures
      description: Documented certification procedures exist (application, evaluation against criteria, decision-making, issuance, surveillance, renewal/withdrawal, complaints/appeals).
    - key: independence_and_competence
      description: Governance ensures independence, impartiality, and competence (qualified personnel, conflict management, quality management).
    - key: recordkeeping_and_transparency
      description: Records of certifications issued/withdrawn and key decisions are maintained; publication/register obligations are met as applicable.
  evidence_hints:
    required:
    - accreditation_certificate_or_decision_as_certification_body
    - certification_scheme_rules_and_operating_procedures
    - competence_and_impartiality_policies (incl_conflicts_management)
    - sample_certification_case_files_and_surveillance_records (redacted)
    - register_of_certifications_issued_and_status (if maintained)
    artifacts:
    - accreditation_certificate_or_decision_as_certification_body
    - certification_scheme_rules_and_operating_procedures
    - competence_and_impartiality_policies (incl_conflicts_management)
    - complaints_and_appeals_process
    - sample_certification_case_files_and_surveillance_records (redacted)
    - register_of_certifications_issued_and_status (if maintained)
    questions:
    - What is your accredited scope as a certification body and which certification criteria do you use?
    - How do you ensure impartiality, handle complaints/appeals, and withdraw certifications when criteria are no longer met?
  severity: medium
  sources:
  - citation: GDPR Art. 43(1)
  - citation: GDPR Art. 43(2)
  - citation: GDPR Art. 43(5)
- id: GDPR-ART44-TRANSFERS-PRINCIPLE
  title: Transfers of personal data to third countries/international organisations occur only under a valid GDPR transfer mechanism (Chapter V)
  scope:
    applies_to:
    - org
    - system
    - processing_activity
    roles:
    - controller
    - processor
    - joint_controller
    condition: Only if entity_profile.transfers_outside_eea is true
  requirement:
    type: multi_obligation
    obligations:
    - key: transfer_mapping_and_inventory
      description: Transfers to third countries/international organisations are identified and mapped (including onward transfers, remote access/support, and sub-processors), and ownership is assigned.
    - key: mechanism_selected_per_transfer
      description: Each transfer is linked to at least one valid Chapter V mechanism (e.g., adequacy, Art. 46 safeguards, Art. 49 derogation) and the mechanism is documented in the vendor/transfer register.
    - key: no_unapproved_transfers
      description: Technical and contractual controls prevent transfers not covered by an approved mechanism (e.g., procurement/vendor onboarding gates, geo/egress controls, and contract review).
    - key: transparency_about_transfers
      description: Privacy notices/transfer disclosures identify third-country transfers and the mechanism/safeguards used (at the level required by Arts. 13/14 and applicable guidance).
    - key: ongoing_review
      description: Transfer mechanisms are periodically reviewed for continued validity (e.g., changes in vendors, sub-processors, locations, or legal basis) and updates are tracked.
  evidence_hints:
    required:
    - transfer_inventory_or_data_flow_map (including third_country_locations, vendors, and onward_transfers)
    - transfer_register_mapping_each_transfer_to_mechanism
    - vendor_onboarding_or_contract_review_process_including_transfer_gate
    - privacy_notice_transfer_disclosures (safeguards/mechanism summary)
    - periodic_transfer_review_records_or_change_log (redacted)
    artifacts:
    - transfer_inventory_or_data_flow_map (including third_country_locations, vendors, and onward_transfers)
    - transfer_register_mapping_each_transfer_to_mechanism
    - vendor_onboarding_or_contract_review_process_including_transfer_gate
    - privacy_notice_transfer_disclosures (safeguards/mechanism summary)
    - periodic_transfer_review_records_or_change_log (redacted)
    questions:
    - Which processing activities involve third-country transfers or remote access from outside the EEA, including by sub-processors?
    - For each transfer, what Chapter V mechanism do you rely on (adequacy, safeguards, or derogation), and where is it documented?
    - How do you prevent teams from introducing a new transfer path without legal review and an approved mechanism?
    checks:
    - Confirm there is a complete transfer inventory (including onward transfers and support access) and each transfer maps to a Chapter V mechanism.
    - Confirm change management ensures transfers remain covered when vendors/locations/sub-processors change.
  severity: high
  sources:
  - citation: GDPR Art. 44
  - citation: GDPR Recital 101
- id: GDPR-ART45-ADEQUACY
  title: Where relying on an adequacy decision, transfers are limited to covered countries/recipients and adequacy scope is documented
  scope:
    applies_to:
    - org
    - contracts
    - processing_activity
    roles:
    - controller
    - processor
    - joint_controller
    condition: Only if entity_profile.transfers_outside_eea is true AND "adequacy" is in entity_profile.transfer_mechanisms
  requirement:
    type: multi_obligation
    obligations:
    - key: adequacy_decision_identified
      description: The applicable adequacy decision is identified (country/territory/sector/scheme), and the scope conditions are documented.
    - key: recipients_within_scope
      description: Transfers are limited to recipients and processing that fall within the adequacy scope (including any participation/registration requirements).
    - key: onward_transfer_controls
      description: Contracts and vendor due diligence address onward transfers to ensure onward transfers are also covered by a valid mechanism.
    - key: monitoring_of_changes
      description: A process exists to monitor changes to adequacy status (amendment, suspension, repeal, or scope changes) and to trigger migration to an alternative mechanism if needed.
  evidence_hints:
    required:
    - documentation_identifying_adequacy_decision_and_scope
    - vendor_due_diligence_showing_recipient_is_within_adequacy_scope (if_applicable)
    - contractual_terms_or_policy_addressing_onward_transfers
    - monitoring_log_or_owner_for_adequacy_status_changes
    artifacts:
    - documentation_identifying_adequacy_decision_and_scope
    - vendor_due_diligence_showing_recipient_is_within_adequacy_scope (if_applicable)
    - contractual_terms_or_policy_addressing_onward_transfers
    - monitoring_log_or_owner_for_adequacy_status_changes
    questions:
    - Which adequacy decision do you rely on and what limitations apply (sector, scheme, conditions)?
    - How do you ensure recipients and onward transfers remain within the adequacy scope over time?
    checks:
    - Confirm adequacy reliance is scoped correctly and there is monitoring for adequacy status changes.
  severity: high
  sources:
  - citation: GDPR Art. 45(1)
  - citation: GDPR Art. 45(3)
  - citation: GDPR Recital 103
- id: GDPR-ART46-APPROPRIATE-SAFEGUARDS
  title: Where relying on appropriate safeguards (e.g., SCCs), enforceable rights and effective remedies are ensured and transfer safeguards are documented
  scope:
    applies_to:
    - org
    - contracts
    - processing_activity
    - vendors
    roles:
    - controller
    - processor
    - joint_controller
    condition: Only if entity_profile.transfers_outside_eea is true AND ("SCC" is in entity_profile.transfer_mechanisms OR "BCR" is in entity_profile.transfer_mechanisms OR "other" is in entity_profile.transfer_mechanisms)
  requirement:
    type: multi_obligation
    obligations:
    - key: safeguard_selected_and_executed
      description: The appropriate safeguard is selected per transfer and executed correctly (e.g., signed SCC module, valid BCR approval, or other Art. 46 instrument), and versions/modules are tracked.
    - key: enforceable_rights_and_remedies
      description: Documentation confirms that data subjects have enforceable rights and effective legal remedies in relation to the transfer mechanism.
    - key: supplemental_measures_where_needed
      description: Where risks to the transferred data are identified, supplementary contractual/technical/organisational measures are implemented and documented to ensure an essentially equivalent level of protection.
    - key: onward_transfer_and_subprocessor_flowdown
      description: Onward transfers and sub-processor engagements are controlled to ensure equivalent protections (flow-down clauses, approvals, and updated sub-processor lists).
    - key: transparency_and_access_to_safeguards
      description: The organisation can provide information about the safeguards used and how to obtain a copy (where required), and maintains a process to respond to data subject or regulator requests about transfer safeguards.
  evidence_hints:
    required:
    - executed_transfer_safeguard_documents (e.g., signed_SCCs_or_BCR_approval)
    - transfer_register_linking_each_transfer_to_safeguard_and_module
    - transfer_risk_assessment_or_equivalence_assessment (redacted)
    - documentation_of_supplementary_measures (technical_and_contractual)
    - subprocessor_list_and_onward_transfer_controls
    artifacts:
    - executed_transfer_safeguard_documents (e.g., signed_SCCs_or_BCR_approval)
    - transfer_register_linking_each_transfer_to_safeguard_and_module
    - transfer_risk_assessment_or_equivalence_assessment (redacted)
    - documentation_of_supplementary_measures (technical_and_contractual)
    - subprocessor_list_and_onward_transfer_controls
    - process_for_providing_safeguard_copies_or_summaries_to_data_subjects
    questions:
    - For each third-country transfer, which Art. 46 safeguard do you rely on and where is it executed/stored (SCC module, BCR, etc.)?
    - How do you assess transfer risks and decide on supplementary measures, and how are those measures implemented and verified?
    - How do you control onward transfers and sub-processors to ensure equivalent protection?
    checks:
    - Confirm the correct safeguard instrument is executed per transfer and tracked (including module/version).
    - Confirm there is evidence of a risk/equivalence assessment and documented supplementary measures when appropriate.
  severity: high
  sources:
  - citation: GDPR Art. 46(1)
  - citation: GDPR Art. 46(2)
  - citation: GDPR Art. 46(3)
  - citation: GDPR Recital 108
- id: GDPR-ART47-BCR
  title: Where relying on Binding Corporate Rules (BCRs), BCR approval, scope, and enforceable rights/remedies are documented and implemented
  scope:
    applies_to:
    - org
    - contracts
    - processing_activity
    - group_entities
    roles:
    - controller
    - processor
    - joint_controller
    condition: Only if entity_profile.transfers_outside_eea is true AND "BCR" is in entity_profile.transfer_mechanisms
  requirement:
    type: multi_obligation
    obligations:
    - key: bcrs_approved_and_in_force
      description: Approved Binding Corporate Rules (controller or processor BCRs, as applicable) are in force, with evidence of supervisory authority approval and current version control.
    - key: scope_and_entities_defined
      description: The BCR scope is documented (covered group entities, categories of transfers, processing activities, and locations) and transfer register entries map to the BCR scope.
    - key: third_party_beneficiary_rights
      description: The BCRs provide data subjects with enforceable rights and effective remedies (third-party beneficiary rights) and the organisation has a process to operationalize those rights.
    - key: complaint_handling_and_cooperation
      description: Procedures exist for handling data subject complaints and cooperating with supervisory authorities regarding BCR-covered transfers, including an identified EU contact point.
    - key: audits_and_accountability
      description: There is an audit program and accountability mechanism for BCR compliance across group entities (training, internal audits, remediation tracking, and governance oversight).
    - key: subcontracting_and_onward_transfers
      description: Onward transfers and subcontracting (including sub-processors) are controlled to ensure equivalent protections and alignment with the BCR commitments.
  evidence_hints:
    required:
    - bcr_approval_decision_and_bcr_text (current_version)
