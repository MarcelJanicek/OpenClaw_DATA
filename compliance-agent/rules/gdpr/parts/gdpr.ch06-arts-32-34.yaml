meta:
  ruleset_id: gdpr
  version: '0.2-audit'
  status: audit-grade
  evaluation_profile_schema: rules/gdpr/entity_profile.schema.yaml
  jurisdiction:
  - EU
  source:
  - name: GDPR (Regulation (EU) 2016/679)
    url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
  notes:
  - This ruleset is designed for SaaS/AI products. Some obligations vary depending on whether you are controller/processor/joint controller.
  - "v0.2-audit: GDPR-ART32-SECURITY refactored to audit-grade checklist structure with acceptance_criteria, red_flags, and EVIDENCE_CATALOG artifact IDs."
rules:
- id: GDPR-ART32-SECURITY
  title: Appropriate technical and organisational measures (TOMs) are implemented and kept effective — risk-based security for personal data processing
  scope:
    applies_to:
    - org
    - product
    - system
    - processing_activity
    roles:
    - controller
    - processor
  requirement:
    type: checklist
    logic: "ALL"
    na_mechanism: >
      Processors: all items apply. Items ART32-06 (regular testing) and ART32-07
      (processor alignment) must be addressed for every in-scope entity. Individual
      sub-controls (e.g., pseudonymisation) may be marked N/A only where documented
      risk assessment concludes the control is not appropriate — justification must
      appear in the TOM register.
    checklist:
      - id: "ART32-01"
        title: "Risk-based TOM selection: security measures are chosen and documented based on assessed risks to data subjects' rights and freedoms"
        required_by_default: true
        acceptance_criteria:
          - "A risk assessment or threat model covering personal data processing exists and is current (reviewed within last 12 months)"
          - "TOM register or control matrix maps each control to the corresponding risk(s) it addresses"
          - "State of the art, implementation costs, and nature/scope/context/purposes are considered and documented"
        red_flags:
          - "No documented risk assessment for personal data processing"
          - "TOM register exists but lacks risk-to-control mapping"
          - "Risk assessment last reviewed more than 2 years ago with no significant change trigger"

      - id: "ART32-02"
        title: "Confidentiality, integrity, availability and resilience of processing systems are ensured through implemented controls"
        required_by_default: true
        acceptance_criteria:
          - "Controls for confidentiality (access restriction, encryption), integrity (change control, audit logs), availability (redundancy, capacity), and resilience (failover, recovery) are documented in the TOM register"
          - "Hardening and secure configuration baselines are applied to personal data systems"
        red_flags:
          - "No controls documented for one or more of: confidentiality, integrity, availability, resilience"
          - "No secure configuration baseline for personal data processing systems"

      - id: "ART32-03"
        title: "Access to personal data is restricted to authorised personnel on a least-privilege basis with joiner/mover/leaver controls"
        required_by_default: true
        acceptance_criteria:
          - "RBAC or ABAC is implemented on systems holding personal data"
          - "MFA is enabled for all privileged or remote access to personal data systems"
          - "Joiner/mover/leaver process removes or modifies access within defined SLA (typically 1 business day for leavers)"
          - "Periodic access reviews are conducted (at least annually) with documented outcomes"
        red_flags:
          - "Shared accounts used for personal data access"
          - "No MFA on production personal data systems"
          - "Leaver accounts not disabled within 30 days"
          - "No access review records for personal data systems"

      - id: "ART32-04"
        title: "Encryption and/or pseudonymisation are applied where appropriate to the processing risks"
        required_by_default: true
        acceptance_criteria:
          - "Personal data is encrypted in transit (TLS 1.2+ minimum)"
          - "Personal data at rest is encrypted for high-risk datasets (special categories, financial data, health data)"
          - "Pseudonymisation or tokenisation is applied for analytics/testing where full identifiability is not required"
          - "Key management procedures exist and are documented"
        red_flags:
          - "Personal data transmitted over unencrypted channels"
          - "Special-category data stored unencrypted at rest"
          - "No key management documentation"

      - id: "ART32-05"
        title: "Availability and access to personal data can be restored in a timely manner after an incident"
        required_by_default: true
        acceptance_criteria:
          - "Backup procedures for personal data systems are documented with RPO/RTO targets"
          - "Restore tests are conducted at least annually and results are documented"
          - "Business continuity or disaster recovery plan covers personal data processing systems"
        red_flags:
          - "No backup procedures for personal data systems"
          - "No documented restore test results"
          - "RTO/RPO not defined for critical personal data systems"

      - id: "ART32-06"
        title: "Regular testing, assessing, and evaluating the effectiveness of TOMs is conducted and findings are tracked to remediation"
        required_by_default: true
        acceptance_criteria:
          - "Vulnerability scanning covers personal data systems with at minimum quarterly cadence"
          - "Penetration test or equivalent security assessment conducted at least annually (or after significant changes)"
          - "Audit or control effectiveness review is conducted periodically"
          - "All findings are tracked in a remediation register with SLA-based closure"
        red_flags:
          - "No vulnerability scanning evidence for personal data systems"
          - "No penetration test or security assessment in last 24 months"
          - "Findings tracked but not remediated; significant overdue items"

      - id: "ART32-07"
        title: "Where acting as a processor, security obligations and TOMs are aligned with controller instructions and DPA security annex; evidence can be provided to controllers"
        required_by_default: true
        acceptance_criteria:
          - "Signed DPA(s) with controllers include or reference security requirements"
          - "TOM documentation is available in a form that can be shared with controllers on request"
          - "Changes to TOMs that may affect security of controller data are communicated per DPA requirements"
        red_flags:
          - "Processor operating without signed DPA"
          - "Security annex in DPA contradicts actual TOMs without documented exception"
          - "No process for communicating material security changes to controllers"
  evidence_hints:
    required:
      - artifact_id: "GDPR-TOM-REGISTER"
      - artifact_id: "GDPR-RISK-ASSESSMENT"
      - artifact_id: "GDPR-INFOSEC-POLICY"
      - artifact_id: "GDPR-ACCESS-CONTROL-EVIDENCE"
    optional:
      - artifact_id: "GDPR-ACCESS-REVIEW-RECORDS"
      - artifact_id: "GDPR-ENCRYPTION-EVIDENCE"
      - artifact_id: "GDPR-BACKUP-RESTORE-EVIDENCE"
      - artifact_id: "GDPR-VULN-MGMT-EVIDENCE"
      - artifact_id: "GDPR-SECURITY-TESTING-REPORTS"
      - artifact_id: "GDPR-DPA-TEMPLATE"
  severity: high
  sources:
  - citation: GDPR Art. 32(1)(a)–(d) (TOMs including encryption, pseudonymisation, resilience, restore, testing)
  - citation: GDPR Art. 32(2) (risk assessment factors)
  - citation: GDPR Art. 32(3) (approved codes of conduct / certification as evidence)
  - citation: GDPR Recital 83 (risk-based security measures)
  - citation: GDPR Recital 84 (DPO and DPIA context)
- id: GDPR-ART33-BREACH-SUPERVISORY
  title: Breach notification to supervisory authority within 72 hours (when required)
  scope:
    applies_to:
    - org
    roles:
    - controller
  requirement:
    type: process_required
    must_include:
    - breach_detection_and_triage
    - 72h_timer
    - notification_template (nature, categories, approx numbers, contact, consequences, measures)
    - breach_register
  evidence_hints:
    required:
    - incident_response_plan_or_breach_response_playbook
    - breach_register (incl. timestamps: awareness/containment/assessment/notification)
    - supervisory_authority_notification_template (Art33(3) fields)
    - evidence_of_72h_notification_timer_and_escalation (e.g., ticket workflow/SLAs) (redacted)
    - tabletop_or_simulation_exercise_results_for_breach_notification (redacted)
    artifacts:
    - incident_response_plan_or_breach_response_playbook
    - breach_register (incl. timestamps: awareness/containment/assessment/notification)
    - supervisory_authority_notification_template (Art33(3) fields)
    - evidence_of_72h_notification_timer_and_escalation (e.g., ticket workflow/SLAs) (redacted)
    - tabletop_or_simulation_exercise_results_for_breach_notification (redacted)
    questions:
    - How do you determine when a personal data breach is "unlikely to result in a risk" (and thus not notified) and how is that decision documented?
    - How do you ensure you can notify the supervisory authority within 72 hours of becoming aware?
    - What information do you include in the notification and how do you update it if not all details are known initially?
    checks:
    - Confirm there is a breach register and evidence of decisions/timelines (including cases where notification was not made).
    - Confirm the notification template covers Art. 33(3)(a)-(d) items.
  severity: high
  sources:
  - citation: GDPR Art. 33(1)
  - citation: GDPR Art. 33(3)
  - citation: GDPR Art. 33(5)
  - citation: GDPR Recital 85
  - citation: GDPR Recital 87
- id: GDPR-ART34-BREACH-DATA-SUBJECT
  title: Breach communication to data subjects when high risk
  scope:
    applies_to:
    - org
    roles:
    - controller
  requirement:
    type: process_required
    must_include:
    - high_risk_assessment
    - communication_template
    - exceptions_handling (e.g., encryption/mitigation)
  evidence_hints:
    required:
    - incident_response_plan_or_breach_response_playbook
    - high_risk_assessment_methodology_and_decision_records (redacted)
    - data_subject_breach_communication_template (plain language; includes required items)
    - evidence_of_exceptions_analysis (e.g., encryption/mitigation/public_communication) (redacted)
    - sample_breach_communications_or_dry_run_outputs (redacted)
    artifacts:
    - incident_response_plan_or_breach_response_playbook
    - high_risk_assessment_methodology_and_decision_records (redacted)
    - data_subject_breach_communication_template (plain language; includes required items)
    - evidence_of_exceptions_analysis (e.g., encryption/mitigation/public_communication) (redacted)
    - sample_breach_communications_or_dry_run_outputs (redacted)
    questions:
    - How do you assess whether a breach is likely to result in a "high risk" to individuals, and who signs off?
    - How do you draft and deliver communications without undue delay (channels, localization, customer coordination)?
    - When do you rely on Art. 34(3) exceptions and how is that documented?
    checks:
    - Confirm the communication template includes Art. 34(2)(a)-(c) items and is understandable.
    - Confirm exceptions (Art. 34(3)) are documented where communications are not sent.
  severity: high
  sources:
  - citation: GDPR Art. 34(1)
  - citation: GDPR Art. 34(2)
  - citation: GDPR Art. 34(3)
  - citation: GDPR Recital 86
  - citation: GDPR Recital 88
