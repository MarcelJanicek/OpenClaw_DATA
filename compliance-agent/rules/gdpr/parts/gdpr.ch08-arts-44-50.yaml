meta:
  ruleset_id: gdpr
  version: '0.1'
  status: draft
  evaluation_profile_schema: rules/gdpr/entity_profile.schema.yaml
  jurisdiction:
  - EU
  source:
  - name: GDPR (Regulation (EU) 2016/679)
    url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
  notes:
  - This ruleset is designed for SaaS/AI products. Some obligations vary depending on whether you are controller/processor/joint controller.
rules:
- id: GDPR-ART44-TRANSFERS-PRINCIPLE
  title: Transfers of personal data to third countries/international organisations occur only under a valid GDPR transfer mechanism (Chapter V)
  scope:
    applies_to:
    - org
    - system
    - processing_activity
    roles:
    - controller
    - processor
    - joint_controller
    condition: Only if entity_profile.transfers_outside_eea is true
  requirement:
    type: multi_obligation
    obligations:
    - key: transfer_mapping_and_inventory
      description: Transfers to third countries/international organisations are identified and mapped (including onward transfers, remote access/support, and sub-processors), and ownership is assigned.
    - key: mechanism_selected_per_transfer
      description: Each transfer is linked to at least one valid Chapter V mechanism (e.g., adequacy, Art. 46 safeguards, Art. 49 derogation) and the mechanism is documented in the vendor/transfer register.
    - key: no_unapproved_transfers
      description: Technical and contractual controls prevent transfers not covered by an approved mechanism (e.g., procurement/vendor onboarding gates, geo/egress controls, and contract review).
    - key: transparency_about_transfers
      description: Privacy notices/transfer disclosures identify third-country transfers and the mechanism/safeguards used (at the level required by Arts. 13/14 and applicable guidance).
    - key: ongoing_review
      description: Transfer mechanisms are periodically reviewed for continued validity (e.g., changes in vendors, sub-processors, locations, or legal basis) and updates are tracked.
  evidence_hints:
    required:
    - transfer_inventory_or_data_flow_map (including third_country_locations, vendors, and onward_transfers)
    - transfer_register_mapping_each_transfer_to_mechanism
    - vendor_onboarding_or_contract_review_process_including_transfer_gate
    - privacy_notice_transfer_disclosures (safeguards/mechanism summary)
    - periodic_transfer_review_records_or_change_log (redacted)
    artifacts:
    - transfer_inventory_or_data_flow_map (including third_country_locations, vendors, and onward_transfers)
    - transfer_register_mapping_each_transfer_to_mechanism
    - vendor_onboarding_or_contract_review_process_including_transfer_gate
    - privacy_notice_transfer_disclosures (safeguards/mechanism summary)
    - periodic_transfer_review_records_or_change_log (redacted)
    questions:
    - Which processing activities involve third-country transfers or remote access from outside the EEA, including by sub-processors?
    - For each transfer, what Chapter V mechanism do you rely on (adequacy, safeguards, or derogation), and where is it documented?
    - How do you prevent teams from introducing a new transfer path without legal review and an approved mechanism?
    checks:
    - Confirm there is a complete transfer inventory (including onward transfers and support access) and each transfer maps to a Chapter V mechanism.
    - Confirm change management ensures transfers remain covered when vendors/locations/sub-processors change.
  severity: high
  sources:
  - citation: GDPR Art. 44
  - citation: GDPR Recital 101

- id: GDPR-ART45-ADEQUACY
  title: Where relying on an adequacy decision, transfers are limited to covered countries/recipients and adequacy scope is documented
  scope:
    applies_to:
    - org
    - contracts
    - processing_activity
    roles:
    - controller
    - processor
    - joint_controller
    condition: Only if entity_profile.transfers_outside_eea is true AND "adequacy" is in entity_profile.transfer_mechanisms
  requirement:
    type: multi_obligation
    obligations:
    - key: adequacy_decision_identified
      description: The applicable adequacy decision is identified (country/territory/sector/scheme), and the scope conditions are documented.
    - key: recipients_within_scope
      description: Transfers are limited to recipients and processing that fall within the adequacy scope (including any participation/registration requirements).
    - key: onward_transfer_controls
      description: Contracts and vendor due diligence address onward transfers to ensure onward transfers are also covered by a valid mechanism.
    - key: monitoring_of_changes
      description: A process exists to monitor changes to adequacy status (amendment, suspension, repeal, or scope changes) and to trigger migration to an alternative mechanism if needed.
  evidence_hints:
    required:
    - documentation_identifying_adequacy_decision_and_scope
    - vendor_due_diligence_showing_recipient_is_within_adequacy_scope (if_applicable)
    - contractual_terms_or_policy_addressing_onward_transfers
    - monitoring_log_or_owner_for_adequacy_status_changes
    artifacts:
    - documentation_identifying_adequacy_decision_and_scope
    - vendor_due_diligence_showing_recipient_is_within_adequacy_scope (if_applicable)
    - contractual_terms_or_policy_addressing_onward_transfers
    - monitoring_log_or_owner_for_adequacy_status_changes
    questions:
    - Which adequacy decision do you rely on and what limitations apply (sector, scheme, conditions)?
    - How do you ensure recipients and onward transfers remain within the adequacy scope over time?
    checks:
    - Confirm adequacy reliance is scoped correctly and there is monitoring for adequacy status changes.
  severity: high
  sources:
  - citation: GDPR Art. 45(1)
  - citation: GDPR Art. 45(3)
  - citation: GDPR Recital 103

- id: GDPR-ART46-APPROPRIATE-SAFEGUARDS
  title: Where relying on appropriate safeguards (e.g., SCCs), enforceable rights and effective remedies are ensured and transfer safeguards are documented
  scope:
    applies_to:
    - org
    - contracts
    - processing_activity
    - vendors
    roles:
    - controller
    - processor
    - joint_controller
    condition: Only if entity_profile.transfers_outside_eea is true AND ("SCC" is in entity_profile.transfer_mechanisms OR "BCR" is in entity_profile.transfer_mechanisms OR "other" is in entity_profile.transfer_mechanisms)
  requirement:
    type: multi_obligation
    obligations:
    - key: safeguard_selected_and_executed
      description: The appropriate safeguard is selected per transfer and executed correctly (e.g., signed SCC module, valid BCR approval, or other Art. 46 instrument), and versions/modules are tracked.
    - key: enforceable_rights_and_remedies
      description: Documentation confirms that data subjects have enforceable rights and effective legal remedies in relation to the transfer mechanism.
    - key: supplemental_measures_where_needed
      description: Where risks to the transferred data are identified, supplementary contractual/technical/organisational measures are implemented and documented to ensure an essentially equivalent level of protection.
    - key: onward_transfer_and_subprocessor_flowdown
      description: Onward transfers and sub-processor engagements are controlled to ensure equivalent protections (flow-down clauses, approvals, and updated sub-processor lists).
    - key: transparency_and_access_to_safeguards
      description: The organisation can provide information about the safeguards used and how to obtain a copy (where required), and maintains a process to respond to data subject or regulator requests about transfer safeguards.
  evidence_hints:
    required:
    - executed_transfer_safeguard_documents (e.g., signed_SCCs_or_BCR_approval)
    - transfer_register_linking_each_transfer_to_safeguard_and_module
    - transfer_risk_assessment_or_equivalence_assessment (redacted)
    - documentation_of_supplementary_measures (technical_and_contractual)
    - subprocessor_list_and_onward_transfer_controls
    artifacts:
    - executed_transfer_safeguard_documents (e.g., signed_SCCs_or_BCR_approval)
    - transfer_register_linking_each_transfer_to_safeguard_and_module
    - transfer_risk_assessment_or_equivalence_assessment (redacted)
    - documentation_of_supplementary_measures (technical_and_contractual)
    - subprocessor_list_and_onward_transfer_controls
    - process_for_providing_safeguard_copies_or_summaries_to_data_subjects
    questions:
    - For each third-country transfer, which Art. 46 safeguard do you rely on and where is it executed/stored (SCC module, BCR, etc.)?
    - How do you assess transfer risks and decide on supplementary measures, and how are those measures implemented and verified?
    - How do you control onward transfers and sub-processors to ensure equivalent protection?
    checks:
    - Confirm the correct safeguard instrument is executed per transfer and tracked (including module/version).
    - Confirm there is evidence of a risk/equivalence assessment and documented supplementary measures when appropriate.
  severity: high
  sources:
  - citation: GDPR Art. 46(1)
  - citation: GDPR Art. 46(2)
  - citation: GDPR Art. 46(3)
  - citation: GDPR Recital 108

- id: GDPR-ART47-BCR
  title: Where relying on Binding Corporate Rules (BCRs), BCR approval, scope, and enforceable rights/remedies are documented and implemented
  scope:
    applies_to:
    - org
    - contracts
    - processing_activity
    - group_entities
    roles:
    - controller
    - processor
    - joint_controller
    condition: Only if entity_profile.transfers_outside_eea is true AND "BCR" is in entity_profile.transfer_mechanisms
  requirement:
    type: multi_obligation
    obligations:
    - key: bcrs_approved_and_in_force
      description: Approved Binding Corporate Rules (controller or processor BCRs, as applicable) are in force, with evidence of supervisory authority approval and current version control.
    - key: scope_and_entities_defined
      description: The BCR scope is documented (covered group entities, categories of transfers, processing activities, and locations) and transfer register entries map to the BCR scope.
    - key: third_party_beneficiary_rights
      description: The BCRs provide data subjects with enforceable rights and effective remedies (third-party beneficiary rights) and the organisation has a process to operationalize those rights.
    - key: complaint_handling_and_cooperation
      description: Procedures exist for handling data subject complaints and cooperating with supervisory authorities regarding BCR-covered transfers, including an identified EU contact point.
    - key: audits_and_accountability
      description: There is an audit program and accountability mechanism for BCR compliance across group entities (training, internal audits, remediation tracking, and governance oversight).
    - key: subcontracting_and_onward_transfers
      description: Onward transfers and subcontracting (including sub-processors) are controlled to ensure equivalent protections and alignment with the BCR commitments.
  evidence_hints:
    required:
    - bcr_approval_decision_and_bcr_text (current_version)
    - bcr_scope_mapping_to_group_entities_and_transfers
    - process_for_data_subject_rights_and_complaints_under_bcrs
    - bcr_audit_program_and_recent_audit_reports (redacted)
    - remediation_and_governance_records_for_bcr_compliance (redacted)
    artifacts:
    - bcr_approval_decision_and_bcr_text (current_version)
    - bcr_scope_mapping_to_group_entities_and_transfers
    - bcr_scope_list_of_covered_entities_and_locations
    - process_for_data_subject_rights_and_complaints_under_bcrs
    - bcr_audit_program_and_recent_audit_reports (redacted)
    - remediation_and_governance_records_for_bcr_compliance (redacted)
    questions:
    - Are you relying on controller BCRs or processor BCRs, and which group entities/transfers are covered?
    - How do data subjects exercise enforceable rights/remedies under the BCRs, and how are complaints handled?
    - How do you audit BCR compliance across group entities and track remediation?
    checks:
    - Confirm the BCRs are approved, current, and the transfer inventory/register maps covered transfers to the BCR scope.
    - Confirm there is evidence of audits/governance to ensure BCR commitments are implemented in practice.
  severity: high
  sources:
  - citation: GDPR Art. 47(1)
  - citation: GDPR Art. 47(2)
  - citation: GDPR Art. 47(3)
  - citation: GDPR Recital 110
  - citation: GDPR Recital 111

- id: GDPR-ART48-FOREIGN-DISCLOSURE-REQUESTS
  title: Requests/orders from third-country courts/authorities to disclose personal data are handled via an EU-recognised legal basis and documented (Art. 48)
  scope:
    applies_to:
    - org
    - system
    - legal_requests
    roles:
    - controller
    - processor
    - joint_controller
    condition: Only if entity_profile.receives_foreign_disclosure_requests is true
  requirement:
    type: multi_obligation
    obligations:
    - key: no_disclosure_on_foreign_order_alone
      description: Personal data is not transferred/disclosed solely on the basis of a third-country court judgment or administrative authority decision/request.
    - key: eu_legal_basis_identified
      description: Disclosures are made only where a valid EU-recognised legal basis applies (e.g., an international agreement such as an MLAT, or another applicable GDPR legal basis/derogation), and the basis is documented per request.
    - key: legal_request_review_process
      description: A documented process exists to review foreign disclosure requests (legal review, scope minimisation, conflict of law assessment, and escalation), and to challenge/seek clarification where appropriate.
    - key: minimisation_and_security
      description: Disclosures are limited to what is necessary, subject to access controls, logged, and securely transmitted; where feasible, transparency to affected parties is considered consistent with legal constraints.
    - key: recordkeeping
      description: Records are maintained for each request and disclosure decision (request details, legal basis, scope, data disclosed, recipients, and any challenges).
  evidence_hints:
    required:
    - legal_request_handling_policy_and_playbook
    - sample_request_case_files_with_legal_basis_and_decision_log (redacted)
    - record_of_international_agreements_or_mechanisms_used (e.g., MLAT_process)
    - disclosure_logging_and_access_control_evidence
    artifacts:
    - legal_request_handling_policy_and_playbook
    - sample_request_case_files_with_legal_basis_and_decision_log (redacted)
    - record_of_international_agreements_or_mechanisms_used (e.g., MLAT_process)
    - disclosure_logging_and_access_control_evidence
    - secure_transmission_procedures_for_disclosures
    questions:
    - Do you receive foreign government/court requests for personal data, and how are they reviewed and recorded?
    - What EU-recognised legal basis is used for disclosures (international agreement, derogation, etc.), and who approves?
    checks:
    - Confirm foreign orders are not treated as sufficient on their own and each disclosure has an EU-recognised legal basis and decision record.
  severity: high
  sources:
  - citation: GDPR Art. 48
  - citation: GDPR Recital 115

- id: GDPR-ART49-DEROGATIONS
  title: Where relying on a transfer derogation (Art. 49), each transfer is assessed case-by-case, limited, and documented
  scope:
    applies_to:
    - org
    - contracts
    - processing_activity
    - system
    roles:
    - controller
    - processor
    - joint_controller
    condition: Only if entity_profile.transfers_outside_eea is true AND "derogation" is in entity_profile.transfer_mechanisms
  requirement:
    type: multi_obligation
    obligations:
    - key: derogation_selected_and_conditions_met
      description: For each transfer (or defined transfer scenario), the specific Art. 49 derogation relied upon is identified and all conditions are documented as met (e.g., explicit consent; necessity for contract; important public interest; legal claims; vital interests; register; or compelling legitimate interests under Art. 49(1) second subparagraph).
    - key: last_resort_and_non_repetitive_for_clii
      description: Where relying on compelling legitimate interests (Art. 49(1) second subparagraph), the transfer is not repetitive, concerns only a limited number of data subjects, is necessary for compelling legitimate interests not overridden by interests/rights, suitable safeguards are provided, and the supervisory authority is informed where required.
    - key: transparency_and_information
      description: Where required, data subjects are informed about the transfer and the derogation relied upon, including possible risks of transfers without appropriate safeguards.
    - key: minimisation_and_safeguards
      description: Transfers under derogations are scoped to the minimum necessary, protected in transit, and subject to access controls/logging; supplementary safeguards are applied where feasible.
    - key: documentation_and_recordkeeping
      description: A record is maintained of derogation assessments/decisions and associated transfers (including rationale, categories of data, recipients/countries, frequency, and approvals), and the transfer register is updated accordingly.
  evidence_hints:
    required:
    - derogation_assessment_template_and_completed_assessments (redacted)
    - records_of_explicit_consent_for_transfer_if_relied_upon (if_applicable)
    - contract_necessity_analysis_for_transfer_if_relied_upon (if_applicable)
    - public_interest_or_legal_claims_basis_documentation (if_applicable)
    - transfer_register_entries_tagged_as_art49_derogations
    - data_subject_information_text_about_derogation_and_risks (if_applicable)
    artifacts:
    - derogation_assessment_template_and_completed_assessments (redacted)
    - records_of_explicit_consent_for_transfer_if_relied_upon (if_applicable)
    - contract_necessity_analysis_for_transfer_if_relied_upon (if_applicable)
    - public_interest_or_legal_claims_basis_documentation (if_applicable)
    - transfer_register_entries_tagged_as_art49_derogations
    - data_subject_information_text_about_derogation_and_risks (if_applicable)
    questions:
    - Which Art. 49 derogation(s) do you rely on for which transfers, and how do you document that all conditions are met?
    - If relying on compelling legitimate interests, how do you ensure it is non-repetitive/limited and that the supervisory authority is informed where required?
    checks:
    - Confirm derogations are used as exceptions (case-by-case) with complete documentation and appropriate transparency/safeguards.
  severity: high
  sources:
  - citation: GDPR Art. 49(1)
  - citation: GDPR Art. 49(2)
  - citation: GDPR Recital 111
  - citation: GDPR Recital 113
  - citation: GDPR Recital 114
